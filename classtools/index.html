<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#173f45">
    <title>교사 전용 메인 포털 · Teacher Dashboard</title>
    <link rel="stylesheet" href="../assets/device-game.css">
    <style>
        :root {
            color-scheme: light;
            --ink: #172033;
            --muted: #5b6770;
            --paper: #fffdf7;
            --canvas: #f3eee3;
            --line: #dcd5c7;
            --brand: #173f45;
            --brand-light: #2ec4b6;
            --brand-dark: #0e292d;
            --accent: #e79437;
            --coral: #ef476f;
            --shadow: 0 20px 60px rgba(23, 32, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 320px;
            min-height: 100vh;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 8%, rgba(46, 196, 182, 0.14), transparent 32rem),
                radial-gradient(circle at 90% 92%, rgba(239, 71, 111, 0.10), transparent 34rem),
                var(--canvas);
            font-family: Pretendard, "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
        }

        main {
            width: min(100% - 32px, 1040px);
            margin: 0 auto;
            padding: 48px 0 80px;
        }

        .account-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .account-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }

        .account-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-link {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 7px 14px;
            color: var(--brand-dark);
            background: var(--paper);
            font-size: 0.85rem;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-link:hover {
            background: #ede6d8;
            transform: translateY(-1px);
        }

        .btn-signout {
            border: 1px solid #e2b4b4;
            color: #b43c36;
            background: #fff5f5;
        }

        .btn-signout:hover {
            background: #ffe3e3;
        }

        /* Profile Banner */
        .profile-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(23, 32, 51, 0.14);
            border-radius: 26px;
            padding: clamp(28px, 5vw, 42px);
            background: linear-gradient(135deg, #173f45 0%, #0d272b 100%);
            color: white;
            box-shadow: var(--shadow);
        }

        .profile-card::before {
            content: "";
            position: absolute;
            right: -60px;
            top: -60px;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(46, 196, 182, 0.22), transparent 70%);
            pointer-events: none;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: var(--brand-light);
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .teacher-title {
            margin: 0 0 20px;
            font-size: clamp(1.8rem, 4.5vw, 2.8rem);
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .teacher-title span {
            color: #ffd166;
        }

        .meta-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.1);
            color: #f1f7f6;
            font-size: 0.92rem;
            font-weight: 800;
            backdrop-filter: blur(8px);
        }

        .chip-highlight {
            border-color: rgba(255, 209, 102, 0.4);
            background: rgba(255, 209, 102, 0.15);
            color: #ffe8b3;
        }

        /* Tools Grid */
        .section-title {
            margin: 48px 0 20px;
            font-size: 1.35rem;
            font-weight: 900;
            letter-spacing: -0.03em;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 20px;
        }

        .tool-card {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 220px;
            padding: 30px;
            border: 1px solid rgba(23, 32, 51, 0.14);
            border-radius: 22px;
            background: var(--paper);
            box-shadow: 0 12px 35px rgba(23, 32, 51, 0.08);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--brand-light);
            box-shadow: 0 22px 50px rgba(23, 32, 51, 0.14);
        }

        .tool-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: #edf7f5;
            color: var(--brand);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .tool-card.seating .tool-icon {
            background: #fff4e6;
            color: #d97706;
        }

        .tool-name {
            margin: 0 0 10px;
            font-size: 1.35rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: var(--ink);
        }

        .tool-desc {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .tool-arrow {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            color: var(--brand);
            font-size: 0.95rem;
            font-weight: 900;
        }

        .tool-card.seating .tool-arrow {
            color: var(--accent);
        }

        .status-bar {
            margin-top: 36px;
            padding: 16px 20px;
            border-radius: 14px;
            background: rgba(23, 32, 51, 0.04);
            border: 1px dashed var(--line);
            color: var(--muted);
            font-size: 0.88rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        @media (max-width: 600px) {
            main {
                padding: 24px 0 50px;
            }
            .account-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="account-bar">
            <div class="account-info">
                <span>🏫 교사 관리 포털</span>
                <span id="user-email-badge" style="color: var(--muted); font-weight: 500;">(확인 중…)</span>
            </div>
            <div class="account-actions">
                <a class="btn-link" href="../index.html">🏠 메인 화면으로</a>
                <button class="btn-link btn-signout" id="sign-out-btn" type="button">로그아웃</button>
            </div>
        </div>

        <!-- 교사 정보 대시보드 배너 -->
        <section class="profile-card">
            <div class="eyebrow">TEACHER CLASSROOM DASHBOARD</div>
            <h1 class="teacher-title" id="teacher-greeting">
                <span id="school-disp">학교명</span> <span id="class-disp">학급 정보</span> · <span id="teacher-disp">교사명</span>
            </h1>
            <p style="margin: 0; color: #bde0dc; font-size: 1rem; line-height: 1.6;" id="profile-subtext">
                학급 관리 포털
            </p>
            <div class="meta-chips">
                <div class="chip chip-highlight">🏫 <span id="chip-school">학교명 불러오는 중...</span></div>
                <div class="chip">📅 <span id="chip-year">2026학년도</span></div>
                <div class="chip">🎒 <span id="chip-class">학급 정보</span></div>
                <div class="chip">👨‍🏫 <span id="chip-teacher">담당 교사</span></div>
            </div>
        </section>

        <!-- 교사 핵심 기능 버튼 영역 -->
        <h2 class="section-title">학급 관리</h2>
        <div class="tools-grid">
            <!-- 0. 스마트 학급 대시보드 (Dashboard) -->
            <a class="tool-card dashboard" href="dashboard.html" style="border-color: var(--brand-light);">
                <div>
                    <div class="tool-icon" style="background: #e6f9f5; color: #0d9488;">🖥️</div>
                    <h3 class="tool-name">스마트 학급 대시보드</h3>
                    <p class="tool-desc">
                        시간표, 급식, 체크리스트, 알림사항, 시계가 통합된 교실 전용 대시보드
                    </p>
                </div>
                <div class="tool-arrow" style="color: #0d9488;">
                    <span>대시보드 열기</span>
                    <span>→</span>
                </div>
            </a>

            <!-- 1. 학생 명단 등록 (Roster) -->
            <a class="tool-card" href="roster.html">
                <div>
                    <div class="tool-icon">📋</div>
                    <h3 class="tool-name">학생 명단 관리</h3>
                    <p class="tool-desc">
                        명단 등록 및 비밀번호 관리
                    </p>
                </div>
                <div class="tool-arrow">
                    <span>이동</span>
                    <span>→</span>
                </div>
            </a>

            <!-- 2. 교실 자리 배치 (Seating) -->
            <a class="tool-card seating" href="seating.html">
                <div>
                    <div class="tool-icon">🪑</div>
                    <h3 class="tool-name">교실 자리 배치</h3>
                    <p class="tool-desc">
                        자리 배치 및 인쇄
                    </p>
                </div>
                <div class="tool-arrow">
                    <span>이동</span>
                    <span>→</span>
                </div>
            </a>

        </div>

        <div class="status-bar">
            <span id="status-info"></span>
            <span id="student-count-info"></span>
        </div>
    </main>

    <script>
        (() => {
            'use strict';

            const schoolDisp = document.getElementById('school-disp');
            const classDisp = document.getElementById('class-disp');
            const teacherDisp = document.getElementById('teacher-disp');
            const chipSchool = document.getElementById('chip-school');
            const chipYear = document.getElementById('chip-year');
            const chipClass = document.getElementById('chip-class');
            const chipTeacher = document.getElementById('chip-teacher');
            const userEmailBadge = document.getElementById('user-email-badge');
            const statusInfo = document.getElementById('status-info');
            const studentCountInfo = document.getElementById('student-count-info');
            const signOutBtn = document.getElementById('sign-out-btn');

            async function api(path, options = {}) {
                const response = await fetch(path, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                });
                const payload = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(payload.message || '요청을 처리할 수 없습니다.');
                return payload;
            }

            function applyProfileData(data) {
                const school = data.schoolName || '학교 미설정';
                const year = data.academicYear || 2026;
                const grade = data.grade || '';
                const classNum = data.classNumber || '';
                const teacher = data.name || data.teacherName || '선생님';

                const classStr = grade && classNum ? `${grade}학년 ${classNum}반` : '학급 미설정';

                schoolDisp.textContent = school;
                classDisp.textContent = classStr;
                teacherDisp.textContent = teacher;

                chipSchool.textContent = school;
                chipYear.textContent = `${year}학년도`;
                chipClass.textContent = classStr;
                chipTeacher.textContent = `${teacher} 선생님`;
            }

            async function init() {
                try {
                    const session = await api('/api/auth/me').catch(() => ({ signedIn: false }));
                    if (!session.signedIn || session.user?.role !== 'teacher') {
                        location.replace('/');
                        return;
                    }
                    userEmailBadge.textContent = `(${session.user.email})`;

                    // 관리자 설정 교사 프로필 조회
                    const teacherProfile = await api('/api/teacher/profile').catch(() => null);

                    if (teacherProfile && teacherProfile.profile) {
                        applyProfileData(teacherProfile.profile);
                    } else {
                        // 학급 정보 API 조회 시도
                        const classData = await api('/api/teacher/class').catch(() => null);
                        if (classData && classData.classroom) {
                            applyProfileData(classData.classroom);
                            studentCountInfo.textContent = `학생 수: ${classData.classroom.students?.length || 0}명`;
                        } else {
                            // 로컬/예시 기본값
                            applyProfileData({
                                schoolName: '송화초등학교',
                                academicYear: 2026,
                                grade: 5,
                                classNumber: 2,
                                name: '김선생님'
                            });
                        }
                    }

                    // 학급 학생 수 추가 업데이트
                    const classRes = await api('/api/teacher/class').catch(() => null);
                    if (classRes && classRes.classroom) {
                        studentCountInfo.textContent = `등록된 학생 수: ${classRes.classroom.students?.length || 0}명`;
                    }
                } catch (error) {
                    statusInfo.textContent = `⚠️ 정보 로드 중 오류: ${error.message}`;
                }
            }

            signOutBtn.addEventListener('click', async () => {
                await api('/api/auth/logout', { method: 'POST', body: '{}' }).catch(() => {});
                location.replace('../index.html');
            });

            init();
        })();
    </script>
</body>
</html>
