<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#173f45">
    <title>교실 자리 배치 · Classroom Seating</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #172033;
            --muted: #5b6770;
            --paper: #fffdf7;
            --canvas: #f3eee3;
            --line: #dcd5c7;
            --brand: #173f45;
            --brand-light: #2ec4b6;
            --accent: #e79437;
            --shadow: 0 16px 45px rgba(23, 32, 51, 0.10);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-width: 320px;
            min-height: 100vh;
            color: var(--ink);
            background: var(--canvas);
            font-family: Pretendard, "Malgun Gothic", system-ui, sans-serif;
        }

        main {
            width: min(100% - 32px, 1080px);
            margin: 0 auto;
            padding: 40px 0 80px;
        }

        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .btn {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 16px;
            color: var(--brand);
            background: var(--paper);
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-primary {
            border-color: #0d272b;
            background: var(--brand);
            color: white;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            background: var(--paper);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .blackboard {
            width: min(480px, 90%);
            margin: 0 auto 32px;
            padding: 14px;
            border: 6px solid #6b4c2b;
            border-radius: 8px;
            background: #193b2d;
            color: #e5f5ec;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .seating-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .desk {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 90px;
            border: 2px solid var(--line);
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            transition: all 0.15s ease;
            font: inherit;
        }

        .desk:hover {
            border-color: var(--brand-light);
            transform: translateY(-2px);
        }

        .desk-num {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .desk-name {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--brand);
        }

        .desk.is-empty .desk-name { color: #6f7b80; }

        .desk.is-unused {
            border-style: dashed;
            border-color: #b9a58a;
            background: repeating-linear-gradient(-45deg, #f8f3ea 0 10px, #f2eadc 10px 20px);
        }

        .desk.is-unused::after {
            content: "×";
            position: absolute;
            top: 50%;
            left: 50%;
            color: #9a473a;
            font-size: 4rem;
            font-weight: 300;
            line-height: 1;
            transform: translate(-50%, -48%);
        }

        .desk.is-unused .desk-num,
        .desk.is-unused .desk-name { opacity: 0.35; }

        .desk.is-unused .desk-name { color: #7f3a30; }

        .desk.is-gender-male { border-color: #d4a62d; background: #fff8d8; }
        .desk.is-gender-female { border-color: #6b9fd1; background: #edf6ff; }
        .desk-lock {
            position: absolute;
            top: 8px;
            right: 9px;
            padding: 3px 6px;
            border-radius: 99px;
            color: #fff;
            font-size: 0.68rem;
            font-weight: 900;
            line-height: 1;
        }
        .desk-lock.male { background: #c6961d; }
        .desk-lock.female { background: #5c91c5; }

        .desk-student-lock {
            position: absolute;
            top: 8px;
            left: 9px;
            max-width: calc(100% - 76px);
            overflow: hidden;
            padding: 3px 6px;
            border-radius: 99px;
            color: #fff;
            background: #4f6d61;
            font-size: 0.68rem;
            font-weight: 900;
            line-height: 1;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .desk:focus-visible { outline: 3px solid var(--brand-light); outline-offset: 3px; }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-toggle[aria-pressed="true"] {
            border-color: #9a473a;
            color: #fff;
            background: #9a473a;
        }

        .btn-male[aria-pressed="true"] { border-color: #3f6e9e; color: #fff; background: #3f6e9e; }
        .btn-female[aria-pressed="true"] { border-color: #a85278; color: #fff; background: #a85278; }
        .btn-student-lock[aria-pressed="true"] { border-color: #4f6d61; color: #fff; background: #4f6d61; }

        .student-lock-select {
            min-height: 38px;
            min-width: 150px;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: var(--ink);
            background: var(--paper);
            font: inherit;
            font-weight: 700;
        }

        .student-picker {
            width: min(92vw, 420px);
            border: 1px solid var(--line);
            border-radius: 18px;
            color: var(--ink);
            background: var(--paper);
            box-shadow: var(--shadow);
        }

        .student-picker::backdrop { background: rgba(23, 32, 51, 0.42); }
        .student-picker form { display: grid; gap: 16px; padding: 8px; }
        .student-picker h2 { margin: 0; font-size: 1.25rem; }
        .student-picker p { margin: 0; color: var(--muted); line-height: 1.5; }
        .student-picker select { width: 100%; min-height: 44px; padding: 0 12px; border: 1px solid var(--line); border-radius: 10px; font: inherit; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }

        .seat-summary {
            margin: 0 0 18px;
            padding: 12px 14px;
            border: 1px solid #e4dacb;
            border-radius: 10px;
            color: var(--muted);
            background: #fbf7ef;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .seat-summary strong { color: var(--brand); }

        .mode-note { color: #9a473a; }

        @media (max-width: 768px) {
            .seating-grid {
                grid-template-columns: repeat(6, minmax(108px, 1fr));
                overflow-x: auto;
                padding-bottom: 8px;
            }
        }

        @page {
            size: A4 landscape;
            margin: 10mm;
        }

        @media print {
            body { min-width: 0; background: #fff; }
            main { width: 100%; margin: 0; padding: 0; }
            .header-nav,
            .card > h1,
            .seat-summary,
            .controls-row,
            .btn,
            .student-lock-select { display: none !important; }
            .card { margin: 0; padding: 0; border: 0; border-radius: 0; background: #fff; box-shadow: none; }
            .blackboard { width: min(160mm, 100%); margin: 0 auto 10mm; padding: 8mm; font-size: 16pt; }
            .seating-grid {
                grid-template-columns: repeat(auto-fit, minmax(34mm, 1fr));
                gap: 7mm;
                margin: 0;
            }
            .desk { min-height: 26mm; break-inside: avoid; box-shadow: none; }
            .desk:not(.is-occupied) { display: none !important; }
            .desk-num,
            .desk-lock,
            .desk-student-lock { display: none !important; }
            .desk-name { color: #111 !important; font-size: 16pt; }
        }
    </style>
</head>
<body>
    <main>
        <div class="header-nav">
            <div>
                <a class="btn" href="index.html">← 교사 메인으로</a>
            </div>
            <div style="font-weight: 800; color: var(--muted);" id="class-header">
                학급 정보 불러오는 중...
            </div>
        </div>

        <section class="card">
            <h1 style="margin: 0 0 16px; font-size: 1.8rem; font-weight: 900;">🪑 교실 자리 배치</h1>
            
            <!-- 칠판 위치 표시 -->
            <div class="blackboard">칠 판 (앞)</div>

            <!-- 자리 배치 배치도 그리드 -->
            <p class="seat-summary" id="seat-summary" aria-live="polite"></p>
            <div class="seating-grid" id="seating-grid" aria-label="6행 6열 자리 배치"></div>

            <div class="controls-row">
                <div class="control-group">
                    <button class="btn btn-toggle" id="unused-mode-btn" type="button" aria-pressed="false">✕ 사용 안 함 표시</button>
                    <button class="btn btn-male" id="male-lock-btn" type="button" aria-pressed="false">🔒 남학생 고정</button>
                    <button class="btn btn-female" id="female-lock-btn" type="button" aria-pressed="false">🔒 여학생 고정</button>
                    <select class="student-lock-select" id="student-lock-select" aria-label="고정할 학생 선택"><option value="">학생 선택</option></select>
                    <button class="btn btn-student-lock" id="student-lock-btn" type="button" aria-pressed="false">📌 학생 자리 고정</button>
                    <button class="btn btn-primary" id="shuffle-btn" type="button">🎲 자리 무작위 섞기</button>
                    <button class="btn" id="reset-unused-btn" type="button">↺ X 표시 모두 해제</button>
                </div>
                <button class="btn" onclick="window.print()" type="button">🖨️ 배치도 인쇄하기</button>
            </div>
        </section>
    </main>

    <dialog class="student-picker" id="student-picker">
        <form method="dialog">
            <h2 id="student-picker-title">학생 배치</h2>
            <p id="student-picker-description">이 좌석에 배치할 학생을 선택하세요.</p>
            <select id="student-picker-select" aria-label="배치할 학생 선택"></select>
            <div class="dialog-actions">
                <button class="btn" value="cancel" type="submit">취소</button>
                <button class="btn btn-primary" id="student-picker-confirm" value="confirm" type="submit">배치하기</button>
            </div>
        </form>
    </dialog>

    <dialog class="student-picker" id="student-remove-dialog">
        <form method="dialog">
            <h2>학생 배치 해제</h2>
            <p id="student-remove-description"></p>
            <div class="dialog-actions">
                <button class="btn" value="cancel" type="submit">취소</button>
                <button class="btn btn-primary" value="confirm" type="submit">배치 해제</button>
            </div>
        </form>
    </dialog>

    <script>
        (() => {
            'use strict';
            const seatingGrid = document.getElementById('seating-grid');
            const classHeader = document.getElementById('class-header');
            const shuffleBtn = document.getElementById('shuffle-btn');
            const unusedModeBtn = document.getElementById('unused-mode-btn');
            const maleLockBtn = document.getElementById('male-lock-btn');
            const femaleLockBtn = document.getElementById('female-lock-btn');
            const studentLockSelect = document.getElementById('student-lock-select');
            const studentLockBtn = document.getElementById('student-lock-btn');
            const studentPicker = document.getElementById('student-picker');
            const studentPickerSelect = document.getElementById('student-picker-select');
            const studentPickerConfirm = document.getElementById('student-picker-confirm');
            const studentRemoveDialog = document.getElementById('student-remove-dialog');
            const studentRemoveDescription = document.getElementById('student-remove-description');
            const resetUnusedBtn = document.getElementById('reset-unused-btn');
            const seatSummary = document.getElementById('seat-summary');
            const TOTAL_DESKS = 36;

            let students = [];
            let unavailableSeats = new Set();
            let genderLocks = new Map();
            let studentLocks = new Map();
            let manualAssignments = new Map();
            let manualVacantSeats = new Set();
            let unassignedStudents = new Set();
            let currentAssignments = new Map();
            let pickerSeatIndex = null;
            let pendingRemoval = null;
            let isUnusedMode = false;
            let genderLockMode = null;
            let isStudentLockMode = false;
            let storageKey = 'classroom-seating-unused-default';

            async function api(path) {
                const res = await fetch(path);
                return res.json();
            }

            function renderDesks() {
                try {
                    renderSeatGrid();
                } catch (error) {
                    console.error('Seat layout recovery:', error);
                    manualAssignments.clear();
                    manualVacantSeats.clear();
                    unassignedStudents.clear();
                    saveSeatSettings();
                    renderSeatGrid();
                }
            }

            function renderSeatGrid() {
                seatingGrid.innerHTML = '';
                const availableSeats = Array.from({ length: TOTAL_DESKS }, (_, index) => index)
                    .filter((index) => !unavailableSeats.has(index));
                const assignedSeats = buildAssignments(availableSeats);
                currentAssignments = assignedSeats;

                for (let i = 0; i < TOTAL_DESKS; i++) {
                    const isUnused = unavailableSeats.has(i);
                    const genderLock = genderLocks.get(i);
                    const studentLockNumber = studentLocks.get(i);
                    const lockedStudent = students.find((candidate) => candidate.number === studentLockNumber);
                    const student = assignedSeats.get(i);
                    const desk = document.createElement('button');
                    desk.type = 'button';
                    desk.className = `desk${student ? ' is-occupied' : ''}${isUnused ? ' is-unused' : ''}${genderLock === '남' ? ' is-gender-male' : ''}${genderLock === '여' ? ' is-gender-female' : ''}${!student && !isUnused ? ' is-empty' : ''}`;
                    desk.setAttribute('aria-label', isUnused
                        ? `${i + 1}번 좌석, 사용 안 함. 클릭하여 사용으로 전환`
                        : `${i + 1}번 좌석, ${student ? student.name : '빈자리'}${genderLock ? `, ${genderLock}학생 고정` : ''}${lockedStudent ? `, ${lockedStudent.name} 자리 고정` : ''}${isUnusedMode ? '. 클릭하여 사용 안 함으로 표시' : genderLockMode ? `. 클릭하여 ${genderLockMode}학생 고정` : isStudentLockMode ? '. 클릭하여 선택 학생 자리로 고정' : ''}`);
                    desk.title = isUnusedMode ? '클릭하여 사용 안 함(X) 표시를 전환합니다.' : genderLockMode ? `클릭하여 ${genderLockMode}학생 고정을 전환합니다.` : isStudentLockMode ? '클릭하여 선택한 학생을 이 자리에 고정합니다.' : 'X 표시, 성별 고정 또는 학생 자리 고정 버튼을 눌러 좌석을 설정할 수 있습니다.';
                    const genderBadge = student && student.gender ? `<small style="opacity:0.7; font-size:0.8rem; margin-left:3px;">(${student.gender})</small>` : '';
                    desk.innerHTML = `
                        <span class="desk-num">${i + 1}번 좌석</span>
                        <span class="desk-name">${isUnused ? '사용 안 함' : (student ? student.name + genderBadge : '빈자리')}</span>
                        ${lockedStudent && !isUnused ? `<span class="desk-student-lock">${lockedStudent.name} 고정</span>` : ''}
                        ${genderLock && !isUnused ? `<span class="desk-lock ${genderLock === '남' ? 'male' : 'female'}">${genderLock} 고정</span>` : ''}
                    `;
                    desk.addEventListener('click', () => handleDeskClick(i));
                    seatingGrid.appendChild(desk);
                }

                const activeDeskCount = TOTAL_DESKS - unavailableSeats.size;
                const unassignedCount = Math.max(0, students.length - activeDeskCount);
                const maleLocks = [...genderLocks.values()].filter((gender) => gender === '남').length;
                const femaleLocks = [...genderLocks.values()].filter((gender) => gender === '여').length;
                const studentLockCount = studentLocks.size;
                const manuallyUnassignedCount = unassignedStudents.size;
                const activeModeNote = isUnusedMode
                    ? ' <span class="mode-note">— 좌석을 클릭해 X 표시를 켜거나 끄세요.</span>'
                    : genderLockMode ? ` <span class="mode-note">— 좌석을 클릭해 ${genderLockMode}학생 고정을 켜거나 끄세요.</span>`
                    : isStudentLockMode ? ' <span class="mode-note">— 좌석을 클릭해 선택한 학생을 고정하세요.</span>' : '';
                seatSummary.innerHTML = `<strong>전체 36석</strong> · 사용 가능 ${activeDeskCount}석 · 사용 안 함 ${unavailableSeats.size}석 · 남학생 고정 ${maleLocks}석 · 여학생 고정 ${femaleLocks}석 · 학생 자리 고정 ${studentLockCount}석 · 학생 ${students.length}명${unassignedCount ? ` <span class="mode-note">(배정되지 않은 학생 ${unassignedCount}명)</span>` : ''}${manuallyUnassignedCount ? ` <span class="mode-note">(수동 배치 해제 ${manuallyUnassignedCount}명)</span>` : ''}${activeModeNote}`;
            }

            function buildAssignments(availableSeats) {
                const assignedSeats = new Map();
                const assignedStudents = new Set();
                const assignStudent = (seatIndex, studentNumber) => {
                    const student = students.find((candidate) => candidate.number === studentNumber);
                    if (!student || assignedStudents.has(student) || unassignedStudents.has(student.number)) return;
                    assignedSeats.set(seatIndex, student);
                    assignedStudents.add(student);
                };
                for (const seatIndex of availableSeats.filter((seat) => !manualVacantSeats.has(seat) && studentLocks.has(seat))) {
                    assignStudent(seatIndex, studentLocks.get(seatIndex));
                }
                for (const seatIndex of availableSeats.filter((seat) => !manualVacantSeats.has(seat) && !studentLocks.has(seat) && manualAssignments.has(seat))) {
                    assignStudent(seatIndex, manualAssignments.get(seatIndex));
                }
                for (const gender of ['남', '여']) {
                    const matchingStudents = students.filter((student) => student.gender === gender && !unassignedStudents.has(student.number));
                    for (const seatIndex of availableSeats.filter((seat) => !manualVacantSeats.has(seat) && !studentLocks.has(seat) && !manualAssignments.has(seat) && genderLocks.get(seat) === gender)) {
                        const student = matchingStudents.find((candidate) => !assignedStudents.has(candidate));
                        if (!student) continue;
                        assignedSeats.set(seatIndex, student);
                        assignedStudents.add(student);
                    }
                }
                const remainingStudents = students.filter((student) => !assignedStudents.has(student) && !unassignedStudents.has(student.number));
                for (const seatIndex of availableSeats.filter((seat) => !manualVacantSeats.has(seat) && !genderLocks.has(seat) && !studentLocks.has(seat) && !manualAssignments.has(seat))) {
                    const student = remainingStudents.shift();
                    if (student) assignedSeats.set(seatIndex, student);
                }
                return assignedSeats;
            }

            function saveSeatSettings() {
                localStorage.setItem(storageKey, JSON.stringify({
                    unavailableSeats: [...unavailableSeats],
                    genderLocks: Object.fromEntries(genderLocks),
                    studentLocks: Object.fromEntries(studentLocks),
                    manualAssignments: Object.fromEntries(manualAssignments),
                    manualVacantSeats: [...manualVacantSeats],
                    unassignedStudents: [...unassignedStudents]
                }));
            }

            function loadSeatSettings() {
                try {
                    const saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
                    const savedUnavailableSeats = Array.isArray(saved) ? saved : saved.unavailableSeats;
                    unavailableSeats = new Set((savedUnavailableSeats || []).filter((seat) => Number.isInteger(seat) && seat >= 0 && seat < TOTAL_DESKS));
                    const savedLocks = Array.isArray(saved) ? {} : saved.genderLocks;
                    genderLocks = new Map(Object.entries(savedLocks || {})
                        .map(([seat, gender]) => [Number(seat), gender])
                        .filter(([seat, gender]) => Number.isInteger(seat) && seat >= 0 && seat < TOTAL_DESKS && ['남', '여'].includes(gender) && !unavailableSeats.has(seat)));
                    const savedStudentLocks = Array.isArray(saved) ? {} : saved.studentLocks;
                    studentLocks = new Map(Object.entries(savedStudentLocks || {})
                        .map(([seat, studentNumber]) => [Number(seat), String(studentNumber)])
                        .filter(([seat, studentNumber]) => Number.isInteger(seat) && seat >= 0 && seat < TOTAL_DESKS && !unavailableSeats.has(seat) && students.some((student) => student.number === studentNumber)));
                    const savedManualAssignments = Array.isArray(saved) ? {} : saved.manualAssignments;
                    manualAssignments = new Map(Object.entries(savedManualAssignments || {})
                        .map(([seat, studentNumber]) => [Number(seat), String(studentNumber)])
                        .filter(([seat, studentNumber]) => Number.isInteger(seat) && seat >= 0 && seat < TOTAL_DESKS && !unavailableSeats.has(seat) && !studentLocks.has(seat) && students.some((student) => student.number === studentNumber)));
                    const savedManualVacantSeats = Array.isArray(saved) ? [] : saved.manualVacantSeats;
                    manualVacantSeats = new Set((savedManualVacantSeats || []).filter((seat) => Number.isInteger(seat) && seat >= 0 && seat < TOTAL_DESKS && !unavailableSeats.has(seat)));
                    const savedUnassignedStudents = Array.isArray(saved) ? [] : saved.unassignedStudents;
                    unassignedStudents = new Set((savedUnassignedStudents || []).map(String).filter((studentNumber) => students.some((student) => student.number === studentNumber)));
                } catch (_) {
                    unavailableSeats = new Set();
                    genderLocks = new Map();
                    studentLocks = new Map();
                    manualAssignments = new Map();
                    manualVacantSeats = new Set();
                    unassignedStudents = new Set();
                }
            }

            function toggleUnusedSeat(index) {
                if (unavailableSeats.has(index)) unavailableSeats.delete(index);
                else {
                    unavailableSeats.add(index);
                    genderLocks.delete(index);
                    studentLocks.delete(index);
                    manualAssignments.delete(index);
                    manualVacantSeats.delete(index);
                }
                saveSeatSettings();
                renderDesks();
            }

            function toggleGenderLock(index) {
                if (unavailableSeats.has(index) || !genderLockMode) return;
                if (genderLocks.get(index) === genderLockMode) genderLocks.delete(index);
                else {
                    genderLocks.set(index, genderLockMode);
                    studentLocks.delete(index);
                    manualAssignments.delete(index);
                    manualVacantSeats.delete(index);
                }
                saveSeatSettings();
                renderDesks();
            }

            function handleDeskClick(index) {
                if (isUnusedMode || unavailableSeats.has(index)) {
                    toggleUnusedSeat(index);
                    return;
                }
                if (genderLockMode) toggleGenderLock(index);
                else if (isStudentLockMode) toggleStudentLock(index);
                else {
                    const student = currentAssignments.get(index);
                    if (student) openStudentRemoveDialog(index, student);
                    else openStudentPicker(index);
                }
            }

            function toggleStudentLock(index) {
                const studentNumber = studentLockSelect.value;
                if (!studentNumber || unavailableSeats.has(index)) return;
                if (studentLocks.get(index) === studentNumber) studentLocks.delete(index);
                else {
                    for (const [seat, lockedNumber] of studentLocks) {
                        if (lockedNumber === studentNumber) studentLocks.delete(seat);
                    }
                    studentLocks.set(index, studentNumber);
                    genderLocks.delete(index);
                    manualAssignments.delete(index);
                    manualVacantSeats.delete(index);
                }
                saveSeatSettings();
                renderDesks();
            }

            function removeStudentFromSeat(index, student) {
                studentLocks.delete(index);
                manualAssignments.delete(index);
                manualVacantSeats.add(index);
                unassignedStudents.add(student.number);
                saveSeatSettings();
                renderDesks();
            }

            function openStudentRemoveDialog(index, student) {
                pendingRemoval = { index, student };
                studentRemoveDescription.textContent = `${student.name} 학생을 ${index + 1}번 좌석에서 배치 해제할까요?`;
                studentRemoveDialog.showModal();
            }

            function openStudentPicker(index) {
                const assignedNumbers = new Set([...currentAssignments.values()].map((student) => student.number));
                const requiredGender = genderLocks.get(index);
                const availableStudents = students.filter((student) =>
                    !assignedNumbers.has(student.number) && (!requiredGender || student.gender === requiredGender)
                );
                if (!availableStudents.length) return;
                pickerSeatIndex = index;
                studentPickerSelect.replaceChildren(...availableStudents.map((student) => new Option(`${student.number}번 ${student.name}`, student.number)));
                studentPicker.showModal();
            }

            function assignStudentToSeat() {
                if (pickerSeatIndex === null || !studentPickerSelect.value) return;
                const studentNumber = studentPickerSelect.value;
                for (const [seat, assignedNumber] of manualAssignments) {
                    if (assignedNumber === studentNumber) manualAssignments.delete(seat);
                }
                for (const [seat, assignedNumber] of studentLocks) {
                    if (assignedNumber === studentNumber) studentLocks.delete(seat);
                }
                manualAssignments.set(pickerSeatIndex, studentNumber);
                manualVacantSeats.delete(pickerSeatIndex);
                unassignedStudents.delete(studentNumber);
                genderLocks.delete(pickerSeatIndex);
                saveSeatSettings();
                renderDesks();
            }

            function setUnusedMode(nextMode) {
                isUnusedMode = nextMode;
                if (isUnusedMode) {
                    genderLockMode = null;
                    isStudentLockMode = false;
                    maleLockBtn.setAttribute('aria-pressed', 'false');
                    femaleLockBtn.setAttribute('aria-pressed', 'false');
                    studentLockBtn.setAttribute('aria-pressed', 'false');
                }
                unusedModeBtn.setAttribute('aria-pressed', String(isUnusedMode));
                unusedModeBtn.textContent = isUnusedMode ? '✕ X 표시 중지' : '✕ 사용 안 함 표시';
                renderDesks();
            }

            function setGenderLockMode(nextMode) {
                genderLockMode = genderLockMode === nextMode ? null : nextMode;
                isUnusedMode = false;
                isStudentLockMode = false;
                unusedModeBtn.setAttribute('aria-pressed', 'false');
                unusedModeBtn.textContent = '✕ 사용 안 함 표시';
                maleLockBtn.setAttribute('aria-pressed', String(genderLockMode === '남'));
                femaleLockBtn.setAttribute('aria-pressed', String(genderLockMode === '여'));
                studentLockBtn.setAttribute('aria-pressed', 'false');
                renderDesks();
            }

            function setStudentLockMode(nextMode) {
                if (nextMode && !studentLockSelect.value) return;
                isStudentLockMode = nextMode;
                isUnusedMode = false;
                genderLockMode = null;
                unusedModeBtn.setAttribute('aria-pressed', 'false');
                unusedModeBtn.textContent = '✕ 사용 안 함 표시';
                maleLockBtn.setAttribute('aria-pressed', 'false');
                femaleLockBtn.setAttribute('aria-pressed', 'false');
                studentLockBtn.setAttribute('aria-pressed', String(isStudentLockMode));
                studentLockBtn.textContent = isStudentLockMode ? '📌 학생 자리 고정 중' : '📌 학생 자리 고정';
                renderDesks();
            }

            function populateStudentLockOptions() {
                const currentValue = studentLockSelect.value;
                studentLockSelect.replaceChildren(new Option('학생 선택', ''));
                students.forEach((student) => studentLockSelect.add(new Option(`${student.number}번 ${student.name}`, student.number)));
                studentLockSelect.value = currentValue;
            }

            function shuffleStudents() {
                for (let i = students.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [students[i], students[j]] = [students[j], students[i]];
                }
                renderDesks();
            }

            async function init() {
                try {
                    const session = await api('/api/auth/me').catch(() => ({ signedIn: false }));
                    if (!session.signedIn || session.user?.role !== 'teacher') {
                        location.replace('/');
                        return;
                    }
                    const classRes = await api('/api/teacher/class').catch(() => null);
                    if (classRes && classRes.classroom) {
                        const c = classRes.classroom;
                        classHeader.textContent = `${c.schoolName} ${c.grade}학년 ${c.classNumber}반 (${c.teacherName} 선생님)`;
                        storageKey = `classroom-seating-unused-${c.id || `${c.schoolName}-${c.grade}-${c.classNumber}`}`;
                        students = (c.students || []).map(s => ({ number: s.number, name: s.name, gender: s.gender || '남' }));
                    } else {
                        classHeader.textContent = '송화초등학교 5학년 2반 (김선생님)';
                        students = [
                            { name: '김민준' }, { name: '이서연' }, { name: '박지우' }, { name: '최하늘' },
                            { name: '정예준' }, { name: '강도윤' }, { name: '조은서' }, { name: '윤하은' },
                            { name: '장민서' }, { name: '임주원' }, { name: '한지후' }, { name: '오서진' }
                        ];
                    }
                } catch (_) {
                    classHeader.textContent = '송화초등학교 5학년 2반 (김선생님)';
                }
                loadSeatSettings();
                populateStudentLockOptions();
                renderDesks();
            }

            shuffleBtn.addEventListener('click', shuffleStudents);
            unusedModeBtn.addEventListener('click', () => setUnusedMode(!isUnusedMode));
            maleLockBtn.addEventListener('click', () => setGenderLockMode('남'));
            femaleLockBtn.addEventListener('click', () => setGenderLockMode('여'));
            studentLockBtn.addEventListener('click', () => setStudentLockMode(!isStudentLockMode));
            studentLockSelect.addEventListener('change', () => {
                if (isStudentLockMode && !studentLockSelect.value) setStudentLockMode(false);
            });
            studentPicker.addEventListener('close', () => {
                if (studentPicker.returnValue === 'confirm') assignStudentToSeat();
                pickerSeatIndex = null;
            });
            studentRemoveDialog.addEventListener('close', () => {
                if (studentRemoveDialog.returnValue === 'confirm' && pendingRemoval) {
                    removeStudentFromSeat(pendingRemoval.index, pendingRemoval.student);
                }
                pendingRemoval = null;
            });
            resetUnusedBtn.addEventListener('click', () => {
                unavailableSeats.clear();
                saveSeatSettings();
                renderDesks();
            });
            init();
        })();
    </script>
</body>
</html>
