services:
  - type: web
    name: songhwaplay-arithmetic
    runtime: node
    plan: free
    rootDir: learning/basics/arithmetics
    buildCommand: npm install && npm run build
    startCommand: npm start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production

  - type: web
    name: songhwaplay-hanguksa
    runtime: node
    plan: free
    rootDir: learning/basics/hanguksa-basic
    buildCommand: npm install && npm run build
    startCommand: npm start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production
