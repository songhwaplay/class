<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>동전 무게 찾기</title>
    <style>
        body {
            background:
                linear-gradient(rgba(30, 20, 12, 0.18), rgba(18, 10, 6, 0.34)),
                url('../../assets/images/coinweighingbg.png') center / cover fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Times New Roman', serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(circle at center, rgba(255, 218, 150, 0.08), transparent 40%),
                radial-gradient(circle at center, transparent 30%, rgba(26, 12, 6, 0.44) 100%);
        }

        /* 게임 보드 프레임 */
        .game-board {
            width: 780px;
            height: 540px;
            background: url('../../assets/images/mainbg2.png') center / cover no-repeat;
            border: 6px solid #bda85d;
            box-shadow:
                0 0 0 4px #4a3c18,
                inset 0 0 32px rgba(0,0,0,0.72),
                0 12px 28px rgba(0,0,0,0.38);
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            display: none;
        }

        /* 스타트 화면 스타일 */
        .start-screen {
            width: 780px;
            height: 540px;
            background:
                linear-gradient(rgba(5,11,17,.62), rgba(5,11,17,.78)),
                url('../../assets/images/mainbg2.png') center / cover no-repeat;
            border: 6px solid #bda85d;
            box-shadow: 0 0 0 4px #4a3c18, inset 0 0 30px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            color: #bda85d;
            text-align: center;
            position: relative;
        }

        .start-title {
            font-size: 42px;
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .start-subtitle {
            font-size: 20px;
            color: #8b7941;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 공통 액션 버튼 스타일 */
        .action-btn {
            background: #d8ceb3;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.1"/></svg>');
            border: 2px solid #a39575;
            width: 120px; 
            height: 40px;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            font-weight: bold;
            color: #1a1a1a;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.6);
            cursor: pointer;
            letter-spacing: 2px;
            clip-path: polygon(2% 0%, 98% 2%, 100% 98%, 0% 100%);
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .action-btn:hover { background-color: #e8debd; }
        .action-btn:active { box-shadow: 1px 1px 2px rgba(0,0,0,0.6); transform: translate(2px, 2px); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-decide { color: #8b0000; }

        /* 난이도 설정 레이아웃 */
        .difficulty-container {
            margin-bottom: 25px;
        }
        .difficulty-label {
            font-size: 16px;
            color: #a3b6c4;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .diff-btn-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }
        .diff-btn {
            background: rgba(6, 30, 56, 0.8);
            border: 1px solid #bda85d;
            color: #bda85d;
            padding: 6px 14px;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .diff-btn:hover {
            background: #bda85d;
            color: #061e38;
        }
        .diff-btn.active {
            background: #bda85d;
            color: #061e38;
            box-shadow: 0 0 10px rgba(250, 236, 153, 0.5);
        }

        /* 시각적 볼륨 조절 모듈 스타일 */
        .volume-container {
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .volume-label {
            font-size: 15px;
            color: #a3b6c4;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .volume-interface {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .volume-bar-container {
            display: flex;
            background-color: #110904;
            border: 2px solid #54391e;
            padding: 4px 6px;
            gap: 4px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .vol-block {
            width: 22px;
            height: 16px;
            background-color: #24160c; 
            border: 1px solid #140d07;
            cursor: pointer;
            transition: background-color 0.1s;
        }
        .vol-block.active-level-1 { background: #61401b; border-color: #8c5d27; box-shadow: 0 0 4px #61401b; }
        .vol-block.active-level-2 { background: #8c5e27; border-color: #bd7e35; box-shadow: 0 0 6px #8c5e27; }
        .vol-block.active-level-3 { background: #b87c35; border-color: #e69d45; box-shadow: 0 0 8px #b87c35; }
        .vol-block.active-level-4 { background: #df9744; border-color: #fcae53; box-shadow: 0 0 10px #df9744; }
        .vol-block.active-level-5 { background: #ffaa42; border-color: #fff2cc; box-shadow: 0 0 12px #ffaa42; }

        .vol-mute-btn {
            background: linear-gradient(to bottom, #c5a059 0%, #947132 100%);
            border: 1px solid #61461b;
            color: #261603;
            padding: 4px 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .vol-mute-btn.active {
            background: linear-gradient(to bottom, #4a2f1b 0%, #1e1107 100%);
            color: #e6cb9c;
            border-color: #8a5a36;
        }

        /* 인게임 내부 MUSIC VOLUME 패널 */
        .ingame-controls-wrapper {
            position: absolute;
            top: 15px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 50;
        }
        .ingame-controls-wrapper .volume-label {
            margin-bottom: 0;
            font-size: 13px;
        }

        /* 인게임 상단 우측 동전 제어판 레이아웃 */
        .ingame-difficulty-panel {
            position: absolute;
            top: 13px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 50;
        }
        .ingame-difficulty-panel .diff-explain-label {
            font-size: 13px;
            color: #a3b6c4;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .ingame-difficulty-panel .diff-btn {
            font-size: 13px;
            padding: 4px 10px;
        }

        /* 레이아웃 구성 */
        .top-section {
            display: flex;
            justify-content: center;
            gap: 16px;
            height: 290px;
            margin-top: 30px;
        }

        .scale-area {
            width: 380px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .scale-pillar {
            position: absolute;
            bottom: 20px;
            width: 40px;
            height: 210px;
            background: linear-gradient(to right, #3e2714, #664124, #3e2714);
            border: 2px solid #201308;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            z-index: 2;
        }
        .scale-base {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 30px;
            background: linear-gradient(to right, #503117, #754b2a, #503117);
            border: 2px solid #201308;
            border-bottom: none;
            z-index: 3;
            left: 50%;
            transform: translateX(-50%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .scale-beam-container {
            position: absolute;
            top: 50px;
            width: 320px;
            height: 20px;
            z-index: 4;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .scale-beam {
            width: 100%;
            height: 12px;
            background: linear-gradient(to bottom, #a0adb5, #4f5a63);
            border: 1px solid #1a232b;
            border-radius: 4px;
            position: absolute;
            top: 4px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }
        .scale-pin {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 30px;
            background: linear-gradient(to right, #d4c084, #8b7941);
            border-radius: 4px;
            border: 1px solid #3d3215;
            z-index: 5;
        }

        .plate-wrapper {
            position: absolute;
            top: -30px;
            width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
            border-radius: 8px;
        }
        .plate-wrapper.left { left: -40px; }
        .plate-wrapper.right { right: -40px; }

        .plate-strings {
            width: 100px;
            height: 105px;
            border-left: 2px solid #6c7a89;
            border-right: 2px solid #6c7a89;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }
        
        .plate {
            width: 160px;
            height: 55px;
            background: radial-gradient(ellipse at center, #8498a8 0%, #2f4152 100%);
            border-radius: 50%;
            border: 2px solid #a3b6c4;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.8), 0 10px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 2px;
            margin-top: -20px;
            z-index: 10;
        }

        .coin-pool-container {
            width: 260px; 
            border: 2px solid #728aa0;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: repeat(4, 52px); 
            gap: 12px 8px; 
            justify-content: center;
            align-content: start;
            border-radius: 8px;
        }

        .pool-slot {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .coin {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fcec99, #dcb036, #a17812);
            border: 2px solid #85610d;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.7), 2px 3px 5px rgba(0,0,0,0.6);
            color: #fff9e6;
            text-shadow: 1px 1px 2px #543d03;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            z-index: 30;
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: none;
            user-drag: element;
            -webkit-user-drag: element;
        }
        .coin:active { transform: scale(1.05); }

        /* 동전 선택 시 외곽선 및 네온 효과 */
        .coin.selected {
            outline: 3px solid #00ffff;
            box-shadow: 0 0 15px #00ffff, inset 2px 2px 5px rgba(255,255,255,0.7);
            transform: scale(1.1);
            z-index: 45;
        }

        /* 동전이 선택되었을 때 목적지들의 피드백 하이라이트 효과 */
        .coin-selected-active .plate-wrapper:hover,
        .coin-selected-active .coin-pool-container:hover {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            cursor: pointer;
        }
        
        .decide-mode .coin { cursor: pointer; animation: pulse 1s infinite alternate; }
        .decide-mode .coin:hover { transform: scale(1.15); box-shadow: 0 0 15px #fcec99; border-color: #fcec99; z-index: 40; }

        @keyframes pulse {
            from { box-shadow: 0 0 5px #dcb036; }
            to { box-shadow: 0 0 15px #fcec99; }
        }

        /* 하단 제어 구역 구조화 디자인 및 여백 픽스 */
        .bottom-section-wrapper {
            margin-top: 10px;
            border-top: 1px solid rgba(189, 168, 93, 0.3);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .button-section {
            display: flex;
            justify-content: center;
            gap: 12px; 
            width: 680px; 
            margin-bottom: 10px;
        }
        
        .log-monitor {
            background-color: #000;
            border: 4px inset #6a3614;
            height: 94px;
            width: 680px; 
            padding: 8px 16px;
            box-sizing: border-box;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            margin-bottom: 4px; 
        }
        .log-row {
            display: flex;
            justify-content: space-between;
        }
        .log-row span { white-space: pre; }
        
        .status-msg { color: #fcec99; font-weight: bold; text-align: center; font-size: 20px; text-shadow: 0 0 5px #fcec99; display: none; }
        .decide-mode .status-msg { display: block; }
        .decide-mode .log-row { display: none; }

        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .popup-box {
            background: #d8ceb3;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.1"/></svg>');
            border: 4px solid #8b7941;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            color: #1a1a1a;
            box-sizing: border-box;
        }
        .popup-box h3 { margin-top: 0; color: #4a3c18; border-bottom: 2px dashed #8b7941; padding-bottom: 10px; letter-spacing: 1px; }
        .rules-list { font-family: 'Malgun Gothic', sans-serif; font-size: 16px; line-height: 1.8; padding-left: 20px; margin-bottom: 30px; }
        .rules-list strong { color: #8b0000; }

        .result-body {
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 18px;
            text-align: center;
            line-height: 2;
            margin-bottom: 25px;
            color: #2b2310;
        }
        .result-body strong {
            font-size: 22px;
            letter-spacing: 1px;
        }
        .text-success { color: #1e4620; }
        .text-danger { color: #8b0000; }
    
/* iPad·터치 기기 공통 보완 */
button,
input,
select,
textarea,
[onclick],
.set-card,
.point,
.piece,
.gem,
.coin,
.pole,
.disk,
.quiz-btn,
.action-btn,
.option-btn,
.small-btn,
.primary-btn,
.secondary-btn,
.danger-btn,
.tab,
.room-tab,
.seg,
.music-segment,
.vol-block,
.diff-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

@media (pointer: coarse) {
    button,
    .action-btn,
    .option-btn,
    .small-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn,
    .tab,
    .room-tab,
    .quiz-btn,
    .diff-btn {
        min-height: 44px;
    }

    input,
    select,
    textarea {
        font-size: 16px; /* iOS Safari 자동 확대 방지 */
    }

    .point,
    .set-card,
    .gem,
    .coin,
    .pole,
    .disk {
        cursor: pointer;
    }
}

.tablet-landscape-hint { display: none !important; }




/* TODAY’S FINISHERS */
.player-entry {
    width: min(420px, 100%);
    margin: 0 auto 14px;
    text-align: left;
}
.player-entry label {
    display: block;
    margin-bottom: 6px;
    color: #b4c6da;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
}
.player-name-input {
    width: 100%;
    min-height: 43px;
    padding: 9px 12px;
    border: 1px solid #8a6c2d;
    background: rgba(4, 8, 13, .82);
    color: #f3e7c4;
    text-align: center;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    font-size: 17px;
    font-weight: bold;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
}
.player-name-input:focus {
    border-color: #f0d77c;
    box-shadow: 0 0 0 2px rgba(240, 215, 124, .15);
}
.player-name-help {
    min-height: 18px;
    margin-top: 5px;
    color: #9aa7b7;
    font: 12px/1.4 "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    text-align: center;
}
.player-name-help.error { color: #e0786f; }

.finishers-panel {
    width: min(460px, 100%);
    margin: 14px auto;
    padding: 11px 13px;
    border: 1px solid rgba(198, 170, 85, .34);
    background: rgba(2, 5, 9, .54);
    color: #e7e0ce;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
}
.finishers-title {
    margin-bottom: 8px;
    color: #f0d77c;
    font: bold 13px/1.3 Georgia, "Times New Roman", serif;
    letter-spacing: 1.4px;
    text-align: center;
}
.finishers-list {
    max-height: 132px;
    overflow-y: auto;
}
.finisher-row {
    display: grid;
    grid-template-columns: 46px minmax(54px, .75fr) minmax(110px, 1.4fr);
    gap: 8px;
    align-items: center;
    padding: 5px 3px;
    border-top: 1px solid rgba(198, 170, 85, .13);
    font-size: 12px;
}
.finisher-row:first-child { border-top: 0; }
.finisher-time { color: #91a0b3; font-family: Consolas, monospace; }
.finisher-name {
    overflow: hidden;
    color: #fff0b6;
    font-weight: bold;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.finisher-difficulty {
    overflow: hidden;
    color: #cbd4df;
    text-align: right;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.finisher-empty {
    padding: 8px 4px;
    color: #8e9bab;
    font-size: 12px;
    text-align: center;
}
.result-finishers {
    margin-top: 14px;
}


/* 이름 입력·클리어 명단 컴팩트 보정 */
.player-entry {
    width: min(340px, 100%);
    margin: 0 auto 9px;
}
.player-entry label {
    margin-bottom: 4px;
    font-size: 11px;
}
.player-name-input {
    min-height: 36px;
    padding: 6px 10px;
    font-size: 16px;
}
.player-name-help {
    min-height: 15px;
    margin-top: 3px;
    font-size: 11px;
}
.finishers-panel {
    width: min(390px, 100%);
    margin: 9px auto;
    padding: 8px 10px;
}
.finishers-title {
    margin-bottom: 5px;
    font-size: 12px;
}
.finishers-list {
    max-height: 92px;
}
.finisher-row {
    grid-template-columns: 42px minmax(48px, .7fr) minmax(96px, 1.35fr);
    gap: 6px;
    padding: 3px 2px;
    font-size: 11px;
}
.finisher-empty {
    padding: 5px 3px;
    font-size: 11px;
}
.result-finishers {
    margin-top: 8px;
}


/* 동전 탭 선택 피드백 강화 */
.coin.selected {
    outline: 4px solid #55ffff !important;
    outline-offset: 3px;
    border-color: #ffffff;
    box-shadow:
        0 0 0 7px rgba(0, 255, 255, .28),
        0 0 24px 10px rgba(0, 255, 255, .80),
        inset 2px 2px 5px rgba(255,255,255,.75) !important;
    transform: translateY(-3px) scale(1.12) !important;
    z-index: 80 !important;
}

.coin.selected::after {
    content: "✓";
    position: absolute;
    top: -10px;
    right: -10px;
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    border: 2px solid #ffffff;
    background: #008c99;
    color: #ffffff;
    font: bold 14px/1 Arial, sans-serif;
    box-shadow: 0 2px 7px rgba(0,0,0,.65);
}

/* 동전을 선택하면 목적지가 hover 없이 항상 보이게 */
.coin-selected-active .plate-wrapper,
.coin-selected-active .coin-pool-container {
    cursor: pointer;
}

.coin-selected-active .plate-wrapper {
    border: 2px solid rgba(85,255,255,.75);
    background: rgba(0,255,255,.08);
    box-shadow:
        inset 0 0 18px rgba(0,255,255,.16),
        0 0 15px rgba(0,255,255,.48);
}

<script>
    let coinCount = 12;
    let fakeCoinIndex, fakeCoinWeight, currentTurn;
    let isDecideMode = false;
    let audioCtx = null;
    let currentVolume = 0.6; 
    let selectedCoin = null; // 현재 선택된 동전 추적 변수

    const bgm = document.getElementById('bgm');

    const FINISHER_GAME_ID = "coinweighing";
    const KOREAN_NAME_PATTERN = /^[가-힣]{2,6}$/;
    let playerName = "";

    function escapeFinisherHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function normalizeKoreanName(value) {
        return String(value || "").replace(/[^가-힣]/g, "").slice(0, 6);
    }

    function isValidKoreanName(value) {
        return KOREAN_NAME_PATTERN.test(String(value || ""));
    }

    function getSavedPlayerName() {
        const saved = normalizeKoreanName(localStorage.getItem("classPlayerName") || "");
        return isValidKoreanName(saved) ? saved : "";
    }

    function savePlayerName(name) {
        if (isValidKoreanName(name)) localStorage.setItem("classPlayerName", name);
    }

    function finishersHtml(records) {
        if (!Array.isArray(records) || records.length === 0) {
            return '<div class="finisher-empty">아직 오늘의 클리어 기록이 없습니다.</div>';
        }
        return records.map(record => `
            <div class="finisher-row">
                <span class="finisher-time">${escapeFinisherHtml(record.time || "--:--")}</span>
                <span class="finisher-name">${escapeFinisherHtml(record.name)}</span>
                <span class="finisher-difficulty">${escapeFinisherHtml(record.difficulty)}</span>
            </div>
        `).join("");
    }

    function renderFinishers(targetId, records) {
        const target = document.getElementById(targetId);
        if (target) target.innerHTML = finishersHtml(records);
    }

    async function loadTodayFinishers(targetId = "today-finishers-list") {
        const target = document.getElementById(targetId);
        if (target) target.innerHTML = '<div class="finisher-empty">명단을 불러오는 중...</div>';
        try {
            const data = await ClassroomFinishers.list(FINISHER_GAME_ID);
            renderFinishers(targetId, data.records || []);
            return data.records || [];
        } catch (_) {
            if (target) target.innerHTML = '<div class="finisher-empty">명단 서버에 연결하지 못했습니다.</div>';
            return [];
        }
    }

    async function registerFinisher(difficulty, rank, targetId = "result-finishers-list") {
        if (!isValidKoreanName(playerName)) return loadTodayFinishers(targetId);
        const target = document.getElementById(targetId);
        if (target) target.innerHTML = '<div class="finisher-empty">기록을 등록하는 중...</div>';
        try {
            const data = await ClassroomFinishers.save({
                gameId: FINISHER_GAME_ID,
                name: playerName,
                difficulty,
                rank
            });
            renderFinishers(targetId, data.records || []);
            renderFinishers("today-finishers-list", data.records || []);
            return data.records || [];
        } catch (_) {
            if (target) target.innerHTML = '<div class="finisher-empty">기록 서버에 연결하지 못했지만 게임 클리어는 인정됩니다.</div>';
            return [];
        }
    }

    function handlePlayerNameInput(input, forceNormalize = false) {
        if (!input || (input.dataset.composing === "true" && !forceNormalize)) return;

        const normalized = normalizeKoreanName(input.value);
        if (forceNormalize && input.value !== normalized) input.value = normalized;
        playerName = normalized;

        const valid = isValidKoreanName(playerName);
        const help = document.getElementById("player-name-help");
        const startButton = document.getElementById("start-game-button");

        if (help) {
            help.textContent = valid
                ? `${playerName} 이름으로 시작합니다.`
                : "한글 이름을 2~6자로 입력하세요.";
            help.classList.toggle("error", !valid && playerName.length > 0);
        }
        if (startButton) startButton.disabled = !valid;

        document.querySelectorAll("[data-difficulty-button]").forEach(button => {
            button.disabled = !valid;
        });

        if (valid) savePlayerName(playerName);
    }

    function bindKoreanNameInput(input) {
        if (!input || input.dataset.nameBound === "true") return;
        input.dataset.nameBound = "true";

        input.addEventListener("compositionstart", () => {
            input.dataset.composing = "true";
        });

        input.addEventListener("compositionend", () => {
            input.dataset.composing = "false";
            handlePlayerNameInput(input, true);
        });

        input.addEventListener("input", () => {
            handlePlayerNameInput(input, false);
        });

        input.addEventListener("blur", () => {
            handlePlayerNameInput(input, true);
        });
    }

    function initializePlayerEntry() {
        playerName = getSavedPlayerName();
        const input = document.getElementById("player-name");
        const entry = document.querySelector(".player-entry");
        const startButton = document.getElementById("start-game-button");

        if (input) {
            input.value = playerName;
            bindKoreanNameInput(input);
            handlePlayerNameInput(input, true);
        }

        if (playerName && entry) {
            entry.style.display = "none";
        }

        if (playerName && startButton) {
            startButton.disabled = false;
            startButton.textContent = `${playerName} START`;
        }

        loadTodayFinishers();
    }

    function setVolume(vol) {
        currentVolume = vol;
        if(bgm) {
            bgm.volume = vol;
        }
        
        for (let i = 1; i <= 5; i++) {
            const sBlock = document.getElementById(`start-vb-${i}`);
            const gBlock = document.getElementById(`game-vb-${i}`);
            if(sBlock) sBlock.className = 'vol-block';
            if(gBlock) gBlock.className = 'vol-block';
        }
        
        const sMute = document.getElementById('startMuteBtn');
        const gMute = document.getElementById('gameMuteBtn');
        
        if (vol === 0) {
            if(sMute) sMute.classList.add('active');
            if(gMute) gMute.classList.add('active');
        } else {
            if(sMute) sMute.classList.remove('active');
            if(gMute) gMute.classList.remove('active');
            
            const activeCount = Math.round(vol * 5);
            for (let i = 1; i <= activeCount; i++) {
                const sb = document.getElementById(`start-vb-${i}`);
                const gb = document.getElementById(`game-vb-${i}`);
                if(sb) sb.classList.add(`active-level-${i}`);
                if(gb) gb.classList.add(`active-level-${i}`);
            }
        }
    }

    function setGlobalDifficulty(count, isStartScreen) {
        if (!isStartScreen && document.getElementById('game-board').style.display === 'block') {
            const confirmReset = confirm("현재 진행 중인 판을 리셋하고 동전 개수를 변경하시겠습니까?");
            if (!confirmReset) return;
        }

        coinCount = count;
        
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        
        document.querySelectorAll(`.diff-btn`).forEach(btn => {
            if(btn.getAttribute('onclick').includes(`(${count},`)) {
                btn.classList.add('active');
            }
        });

        if(document.getElementById('game-board').style.display === 'block') {
            initGame();
        }
    }

    function startGame() {
        if (!isValidKoreanName(playerName)) {
            const input = document.getElementById("player-name");
            if (input) input.focus();
            return;
        }
        if (bgm && bgm.paused) {
            bgm.volume = currentVolume;
            bgm.play().catch(e => console.log("BGM 재생 차단:", e));
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext && !audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-board').style.display = 'block';
        initGame();
    }

    function playCoinSound() {
        try {
            if (!audioCtx) return;
            
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(987.77, audioCtx.currentTime);
            
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(1318.51, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            
            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc1.start();
            osc2.start();
            
            osc1.stop(audioCtx.currentTime + 0.4);
            osc2.stop(audioCtx.currentTime + 0.4);
        } catch (e) {
            console.log("효과음 재생 실패:", e);
        }
    }

    function initGame() {
        fakeCoinIndex = Math.floor(Math.random() * coinCount);
        fakeCoinWeight = Math.random() > 0.5 ? 1.2 : 0.8;
        currentTurn = 1;
        isDecideMode = false;
        clearSelection();

        document.getElementById('weigh-btn').disabled = false;
        document.getElementById('log-1-content').innerText = "";
        document.getElementById('log-2-content').innerText = "";
        document.getElementById('log-3-content').innerText = "";
        
        document.getElementById('game-board').classList.remove('decide-mode');
        document.getElementById('decide-btn').innerText = "DECIDE";
        document.getElementById('decide-btn').style.backgroundColor = "";
        document.getElementById('decide-btn').style.color = "#8b0000";
        
        resetScaleAnimation();
        
        const pool = document.getElementById('coin-pool');
        const leftPlate = document.getElementById('left-plate');
        const rightPlate = document.getElementById('right-plate');
        
        pool.innerHTML = '';
        leftPlate.innerHTML = '';
        rightPlate.innerHTML = '';

        for (let i = 0; i < coinCount; i++) {
            const poolSlot = document.createElement('div');
            poolSlot.className = 'pool-slot';
            poolSlot.id = `pool-slot-${i}`;
            pool.appendChild(poolSlot);

            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.id = `coin-${i}`;
            coin.innerText = i + 1;
            coin.dataset.index = i;
            
            // 탭/클릭 동작 바인딩
            coin.onclick = function(e) {
                e.stopPropagation(); // 영역 전체 클릭 방지
                if (isDecideMode) {
                    checkAnswer(parseInt(this.dataset.index));
                } else {
                    handleCoinSelection(this);
                }
            };
            
            coin.draggable = !window.matchMedia('(pointer: coarse)').matches;
            coin.ondragstart = function(ev) {
                if (isDecideMode) { ev.preventDefault(); return; } 
                ev.dataTransfer.setData("text", ev.target.id);
            };

            // 모바일에서는 드래그 대신 동전 톡 → 목적지 톡 방식 사용

            poolSlot.appendChild(coin);
        }
    }

    // 동전 클릭 시 상태 처리 (선택 토글)
    function handleCoinSelection(coinEl) {
        if (selectedCoin === coinEl) {
            clearSelection();
        } else {
            if (selectedCoin) {
                selectedCoin.classList.remove('selected');
            }
            selectedCoin = coinEl;
            selectedCoin.classList.add('selected');
            document.getElementById('game-board').classList.add('coin-selected-active');
        }
    }

    // 선택 상태 전면 초기화
    function clearSelection() {
        if (selectedCoin) {
            selectedCoin.classList.remove('selected');
        }
        selectedCoin = null;
        document.getElementById('game-board').classList.remove('coin-selected-active');
    }

    // 영역 클릭 시 동전 배치 기능 (Select & Move 핵심 로직)
    function handleZoneClick(zoneType, event) {
        if (!selectedCoin) return;
        event.stopPropagation();

        const coinIdx = parseInt(selectedCoin.dataset.index);
        const poolSlot = document.getElementById(`pool-slot-${coinIdx}`);

        if (zoneType === 'left') {
            const plate = document.getElementById('left-plate');
            plate.appendChild(selectedCoin);
            sortCoinsInPlate(plate);
        } else if (zoneType === 'right') {
            const plate = document.getElementById('right-plate');
            plate.appendChild(selectedCoin);
            sortCoinsInPlate(plate);
        } else if (zoneType === 'pool') {
            if (poolSlot) {
                poolSlot.appendChild(selectedCoin);
            }
        }

        clearSelection();
        resetScaleAnimation();
        playCoinSound();
    }

    // 크롬북 터치 직접 드래그앤드랍 대응을 위한 Touch Event 핸들러
    function bindTouchDragEvents(coin) {
        let offsetX = 0, offsetY = 0;
        let originalParent = null;

        coin.addEventListener('touchstart', function(e) {
            if (isDecideMode) return;
            const touch = e.touches[0];
            const rect = coin.getBoundingClientRect();
            
            offsetX = touch.clientX - rect.left;
            offsetY = touch.clientY - rect.top;
            originalParent = coin.parentElement;
            
            coin.style.position = 'fixed';
            coin.style.zIndex = '1000';
            moveAt(touch.clientX, touch.clientY);
        }, { passive: false });

        coin.addEventListener('touchmove', function(e) {
            if (isDecideMode) return;
            e.preventDefault();
            const touch = e.touches[0];
            moveAt(touch.clientX, touch.clientY);
        }, { passive: false });

        function moveAt(pageX, pageY) {
            coin.style.left = (pageX - offsetX) + 'px';
            coin.style.top = (pageY - offsetY) + 'px';
        }

        coin.addEventListener('touchend', function(e) {
            if (isDecideMode) return;
            coin.style.position = '';
            coin.style.zIndex = '';
            coin.style.left = '';
            coin.style.top = '';

            const touch = e.changedTouches[0];
            
            coin.style.display = 'none';
            const elementUnder = document.elementFromPoint(touch.clientX, touch.clientY);
            coin.style.display = 'flex';

            if (!elementUnder) {
                originalParent.appendChild(coin);
                return;
            }

            const leftPlateArea = elementUnder.closest('#left-wrapper') || elementUnder.closest('#left-plate');
            const rightPlateArea = elementUnder.closest('#right-wrapper') || elementUnder.closest('#right-plate');
            const poolArea = elementUnder.closest('#coin-pool');

            if (leftPlateArea) {
                const plate = document.getElementById('left-plate');
                plate.appendChild(coin);
                sortCoinsInPlate(plate);
            } else if (rightPlateArea) {
                const plate = document.getElementById('right-plate');
                plate.appendChild(coin);
                sortCoinsInPlate(plate);
            } else if (poolArea || elementUnder.classList.contains('coin-pool-container')) {
                const coinIdx = parseInt(coin.dataset.index);
                const targetSlot = document.getElementById(`pool-slot-${coinIdx}`);
                if (targetSlot) targetSlot.appendChild(coin);
            } else {
                originalParent.appendChild(coin);
            }

            clearSelection();
            resetScaleAnimation();
            playCoinSound();
        });
    }

    function allowDrop(ev) { ev.preventDefault(); }
    
    function sortCoinsInPlate(plate) {
        const coins = Array.from(plate.querySelectorAll('.coin'));
        coins.sort((a, b) => parseInt(a.dataset.index) - parseInt(b.dataset.index));
        coins.forEach(coin => plate.appendChild(coin)); 
    }

    function dropToZone(ev, zoneType) {
        if (isDecideMode) return;
        ev.preventDefault();
        
        const data = ev.dataTransfer.getData("text");
        const coin = document.getElementById(data);
        if (!coin) return;
        
        const coinIdx = parseInt(coin.dataset.index);

        if (zoneType === 'pool') {
            const targetSlot = document.getElementById(`pool-slot-${coinIdx}`);
            if (targetSlot && targetSlot.children.length === 0) {
                targetSlot.appendChild(coin);
                resetScaleAnimation();
                playCoinSound();
            }
        } else {
            const plate = document.getElementById(`${zoneType}-plate`);
            if (plate) {
                plate.appendChild(coin);
                sortCoinsInPlate(plate);
                resetScaleAnimation();
                playCoinSound();
            }
        }
        clearSelection();
    }

    function clearPlates() {
        if (isDecideMode) return;
        let moved = false;

        for (let i = 0; i < coinCount; i++) {
            const coin = document.getElementById(`coin-${i}`);
            if (coin && coin.parentElement.id !== `pool-slot-${i}`) {
                const targetSlot = document.getElementById(`pool-slot-${i}`);
                targetSlot.appendChild(coin);
                moved = true;
            }
        }
        
        if (moved) {
            clearSelection();
            resetScaleAnimation();
            playCoinSound();
        }
    }

    function resetScaleAnimation() {
        document.getElementById('beam-container').style.transform = 'rotate(0deg)';
        document.getElementById('left-wrapper').style.transform = 'translateY(0px)';
        document.getElementById('right-wrapper').style.transform = 'translateY(0px)';
    }

    function weighCoins() {
        if (currentTurn > 3 || isDecideMode) return;

        const leftCoins = Array.from(document.getElementById('left-plate').querySelectorAll('.coin'));
        const rightCoins = Array.from(document.getElementById('right-plate').querySelectorAll('.coin'));

        if (leftCoins.length !== rightCoins.length) { 
            showModalLayout("⚠️ 판별 경고", `<div class="result-body">양쪽 접시 위의 동전 개수가 일치하지 않습니다.<br>천칭의 수평을 맞춘 후 다시 작동시켜 주십시오.</div>`, false);
            return; 
        }
        if (leftCoins.length === 0) return; 

        let wL = 0, wR = 0;
        for (let c of leftCoins) wL += (parseInt(c.dataset.index) === fakeCoinIndex) ? fakeCoinWeight : 1.0;
        for (let c of rightCoins) wR += (parseInt(c.dataset.index) === fakeCoinIndex) ? fakeCoinWeight : 1.0;

        wL = parseFloat(wL.toFixed(1));
        wR = parseFloat(wR.toFixed(1));

        const beam = document.getElementById('beam-container');
        const leftWrap = document.getElementById('left-wrapper');
        const rightWrap = document.getElementById('right-wrapper');
        
        let resultSymbol = "";

        if (wL === wR) {
            beam.style.transform = 'rotate(0deg)';
            leftWrap.style.transform = 'translateY(0px)';
            rightWrap.style.transform = 'translateY(0px)';
            resultSymbol = "=";
        } else if (wL > wR) {
            beam.style.transform = 'rotate(-12deg)';
            leftWrap.style.transform = 'translateY(35px)';
            rightWrap.style.transform = 'translateY(-35px)';
            resultSymbol = ">";
        } else {
            beam.style.transform = 'rotate(12deg)';
            leftWrap.style.transform = 'translateY(-35px)';
            rightWrap.style.transform = 'translateY(35px)';
            resultSymbol = "<";
        }

        const leftStr = leftCoins.map(c => c.innerText).sort((a,b)=>a-b).join(' ');
        const rightStr = rightCoins.map(c => c.innerText).sort((a,b)=>a-b).join(' ');
        
        const logContent = `${leftStr}     ${resultSymbol}     ${rightStr}`;
        document.getElementById(`log-${currentTurn}-content`).innerText = logContent;

        currentTurn++;
        if (currentTurn > 3) {
            document.getElementById('weigh-btn').disabled = true;
        }
    }

    function toggleDecideMode() {
        isDecideMode = !isDecideMode;
        const btn = document.getElementById('decide-btn');
        const board = document.getElementById('game-board');
        clearSelection();
        
        if (isDecideMode) {
            board.classList.add('decide-mode');
            btn.innerText = "CANCEL";
            btn.style.backgroundColor = "#8b0000";
            btn.style.color = "#fff";
        } else {
            board.classList.remove('decide-mode');
            btn.innerText = "DECIDE";
            btn.style.backgroundColor = "";
            btn.style.color = "#8b0000";
        }
    }

    function showModalLayout(title, innerHTML, isGameOver = false) {
        const wrapper = document.getElementById('popup-content-wrapper');
        
        wrapper.innerHTML = `
            <h3 style="text-align: center;">${title}</h3>
            ${innerHTML}
            <div style="text-align: center;">
                <button class="action-btn" onclick="${isGameOver ? 'restartGame()' : 'closeModal()'}">
                    ${isGameOver ? 'NEW GAME' : 'CLOSE'}
                </button>
            </div>
        `;

        document.getElementById('rules-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('rules-overlay').style.display = 'none';
    }

    function restartGame() {
        closeModal();
        initGame();
    }

    function openRules() {
        const rulesHTML = `
            <ul class="rules-list">
                <li>동전 가운데 단 하나만 무게가 다른 <strong>가짜 동전</strong>입니다.</li>
                <li>가짜 동전은 정상 동전보다 <strong>무겁거나 가벼울 수 있습니다.</strong></li>
                <li>동전을 <strong>톡 누른 뒤</strong> 왼쪽 접시, 오른쪽 접시 또는 동전 보관함을 톡 누르면 이동합니다.</li>
                <li>양쪽 접시에는 반드시 <strong>같은 개수</strong>의 동전을 올려야 합니다.</li>
                <li><strong>WEIGH</strong> 버튼으로 최대 세 번까지 무게를 비교할 수 있습니다.</li>
                <li>판단이 끝나면 <strong>DECIDE</strong>를 누른 뒤 가짜라고 생각하는 동전을 선택하십시오.</li>
            </ul>
            <div style="margin-top:14px; padding-top:10px; border-top:1px solid rgba(140,117,53,.35); color:#6f6041; font-size:12px; line-height:1.55; text-align:center;">
                이 퍼즐은 고전 게임 <strong>『대항해시대Ⅲ』</strong>에 등장하는 동전 무게 찾기 이벤트에서 착안해 교육용으로 재구성했습니다.
            </div>
        `;

        showModalLayout("GAME RULES", rulesHTML, false);
    }

    function checkAnswer(selectedIndex) {
        if (!isDecideMode) return;

        const selectedNumber = selectedIndex + 1;
        const fakeNumber = fakeCoinIndex + 1;
        const weightType = fakeCoinWeight > 1 ? "무거운" : "가벼운";
        const weightClass = fakeCoinWeight > 1 ? "text-danger" : "text-success";

        if (selectedIndex === fakeCoinIndex) {
            const successHTML = `
                <div class="result-body">
                    선택한 <strong>${selectedNumber}번 동전</strong>이 가짜 동전입니다.<br>
                    이 동전은 정상 동전보다
                    <strong class="${weightClass}">${weightType} 동전</strong>이었습니다.<br><br>
                    <strong class="text-success">판별에 성공했습니다!</strong>
                </div>
                <div class="finishers-panel result-finishers">
                    <div class="finishers-title">🏆 TODAY’S FINISHERS</div>
                    <div class="finishers-list" id="result-finishers-list"></div>
                </div>
            `;

            showModalLayout("✅ 판별 성공", successHTML, true);
            registerFinisher(`동전 ${coinCount}개`, coinCount);
        } else {
            const failHTML = `
                <div class="result-body">
                    선택한 <strong>${selectedNumber}번 동전</strong>은 정상 동전입니다.<br>
                    실제 가짜 동전은 <strong>${fakeNumber}번</strong>이며,<br>
                    정상 동전보다 <strong class="${weightClass}">${weightType} 동전</strong>이었습니다.<br><br>
                    <strong class="text-danger">판별에 실패했습니다.</strong>
                </div>
            `;

            showModalLayout("☠ 실패", failHTML, true);
        }
    }

    // 빈 화면(보드판 배경) 클릭 시 선택 해제 처리
    document.getElementById('game-board').addEventListener('click', function(e) {
        if (!e.target.closest('.coin') && !e.target.closest('.plate-wrapper') && !e.target.closest('.coin-pool-container')) {
            clearSelection();
        }
    });

    document.getElementById('rules-overlay').addEventListener('click', function(event) {
        if (event.target === this) closeModal();
    });

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeModal();
            clearSelection();
        }
    });

    setVolume(currentVolume);
    setGlobalDifficulty(coinCount, true);
    initializePlayerEntry();
</script>

</body>
</html>
