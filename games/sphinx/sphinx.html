<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>대항해시대3 스핑크스 퀴즈</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            padding: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Malgun Gothic', sans-serif;
            background:
                linear-gradient(rgba(30, 18, 10, 0.24), rgba(18, 10, 7, 0.48)),
                url('../../assets/images/sphinxbg.png') center / cover fixed;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(circle at center, rgba(247, 205, 120, 0.10), transparent 36%),
                radial-gradient(circle at center, transparent 25%, rgba(18, 8, 4, 0.64) 100%);
        }

        .game-frame {
            width: min(960px, 100%);
            min-height: 580px;
            display: grid;
            grid-template-columns: 315px minmax(0, 1fr);
            position: relative;
            overflow: hidden;
            border: 4px double #b4863f;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.035), transparent 25%),
                linear-gradient(180deg, rgba(52, 25, 17, 0.98), rgba(25, 12, 11, 0.99));
            box-shadow:
                0 0 0 5px #2b1809,
                0 25px 65px rgba(0,0,0,0.72),
                inset 0 0 45px rgba(0,0,0,0.55);
        }

        .game-frame::before {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(232, 196, 120, 0.18);
            pointer-events: none;
        }

        .sphinx-panel {
            min-height: 580px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 14px;
            padding: 34px 20px;
            border-right: 1px solid rgba(232, 196, 120, 0.26);
            background:
                radial-gradient(ellipse at 50% 45%, rgba(225, 169, 68, 0.20), transparent 45%),
                linear-gradient(180deg, rgba(21, 25, 30, 0.77), rgba(34, 13, 10, 0.94));
        }

        .sphinx-panel::before {
            content: "";
            position: absolute;
            width: 270px;
            height: 220px;
            border: 1px solid rgba(232, 196, 120, 0.34);
            box-shadow:
                0 0 0 8px rgba(97, 58, 20, 0.15),
                0 0 38px rgba(232, 196, 120, 0.14);
            pointer-events: none;
        }

        .sphinx-image {
            width: min(270px, 96%);
            aspect-ratio: 16 / 9;
            object-fit: cover;
            position: relative;
            z-index: 2;
            border: 1px solid #a57631;
            box-shadow:
                0 12px 22px rgba(0,0,0,0.48),
                0 0 18px rgba(232,196,120,0.15);
        }

        .sphinx-name {
            width: min(250px, 88%);
            position: relative;
            z-index: 3;
            margin-top: 2px;
            padding: 9px 12px;
            border: 1px solid #a57631;
            color: #eccb83;
            background: linear-gradient(180deg, rgba(78,32,22,0.97), rgba(37,13,11,0.99));
            text-align: center;
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 2px 3px #000;
        }

        .quiz-container {
            min-width: 0;
            min-height: 580px;
            padding: 28px 31px 23px;
            display: flex;
            flex-direction: column;
            position: relative;
            text-align: center;
        }

        .quiz-title {
            margin-bottom: 17px;
            padding-bottom: 13px;
            border-bottom: 1px solid rgba(232, 196, 120, 0.30);
            color: #ebca81;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 31px;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 3px 5px #000;
        }

        #display-area {
            flex: 1;
            min-height: 385px;
            padding: 23px 23px 20px;
            position: relative;
            color: #2b1c0e;
            border: 2px solid #906832;
            background:
                linear-gradient(rgba(246, 234, 208, 0.97), rgba(223, 199, 158, 0.98)),
                url('../../assets/images/sphinxbg.png') center / cover;
            box-shadow:
                inset 0 0 24px rgba(78, 43, 14, 0.18),
                0 10px 20px rgba(0,0,0,0.27);
        }

        #display-area::before,
        #display-area::after {
            content: "◆";
            position: absolute;
            color: #8c6228;
            font-size: 15px;
        }

        #display-area::before {
            top: 7px;
            left: 10px;
        }

        #display-area::after {
            right: 10px;
            bottom: 7px;
        }

        .question-text {
            min-height: 105px;
            margin-bottom: 23px;
            padding: 5px 10px 0;
            white-space: pre-wrap;
            text-align: left;
            word-break: keep-all;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.75;
        }

        .options-container {
            width: min(430px, 100%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 9px;
        }

        .quiz-btn {
            min-height: 43px;
            padding: 9px 12px;
            cursor: pointer;
            color: #fff4da;
            border: 1px solid #79511c;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.17), transparent),
                #674019;
            font-size: 14px;
            font-weight: bold;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.22),
                0 3px 5px rgba(49,24,6,0.22);
            transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .quiz-btn:hover {
            border-color: #dfae53;
            background-color: #8b5b22;
            transform: translateY(-2px);
        }

        .quiz-btn:active {
            transform: translateY(1px);
        }

        .confirm-btn {
            width: min(180px, 100%);
            max-width: none;
            margin: 20px auto 0;
            display: block;
        }

        .volume-control {
            margin-top: 15px;
            padding: 10px 12px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            color: #c9a86f;
            border: 1px solid rgba(232, 196, 120, 0.20);
            background: rgba(0,0,0,0.22);
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.7px;
        }

        .vol-btn {
            padding: 5px 11px;
            cursor: pointer;
            color: #edcf91;
            border: 1px solid #856027;
            background: #3a1813;
            font-size: 11px;
            font-weight: bold;
        }

        .vol-bar {
            display: flex;
            gap: 3px;
        }

        .bar-segment {
            width: 18px;
            height: 16px;
            padding: 0;
            cursor: pointer;
            border: 1px solid #76501e;
            background: #1a100d;
        }

        .bar-segment.active-1 {
            background: #72501f;
        }

        .bar-segment.active-2 {
            background: #986522;
        }

        .bar-segment.active-3 {
            background: #bf812d;
        }

        .bar-segment.active-4 {
            background: #e29f3d;
        }

        .bar-segment.active-5 {
            background: #f3cf78;
            box-shadow: 0 0 6px rgba(243,207,120,0.45);
        }

        @media (max-width: 760px) {
            body {
                padding: 0;
                align-items: flex-start;
            }

            .game-frame {
                min-height: 100vh;
                grid-template-columns: 1fr;
                border-left: 0;
                border-right: 0;
            }

            .sphinx-panel {
                min-height: 245px;
                padding: 20px 16px 16px;
                border-right: 0;
                border-bottom: 1px solid rgba(232, 196, 120, 0.26);
            }

            .sphinx-panel::before {
                width: 245px;
                height: 175px;
            }

            .sphinx-image {
                width: 245px;
                max-height: none;
                object-fit: cover;
            }

            .sphinx-name {
                width: min(330px, 92%);
                padding: 7px 10px;
            }

            .quiz-container {
                min-height: auto;
                padding: 21px 15px 20px;
            }

            #display-area {
                min-height: 420px;
                padding: 20px 16px;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .volume-control {
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }
    
/* iPad·터치 기기 공통 보완 */
button,
input,
select,
textarea,
[onclick],
.set-card,
.point,
.piece,
.gem,
.coin,
.pole,
.disk,
.quiz-btn,
.action-btn,
.option-btn,
.small-btn,
.primary-btn,
.secondary-btn,
.danger-btn,
.tab,
.room-tab,
.seg,
.music-segment,
.vol-block,
.diff-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

@media (pointer: coarse) {
    button,
    .action-btn,
    .option-btn,
    .small-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn,
    .tab,
    .room-tab,
    .quiz-btn,
    .diff-btn {
        min-height: 44px;
    }

    input,
    select,
    textarea {
        font-size: 16px; /* iOS Safari 자동 확대 방지 */
    }

    .point,
    .set-card,
    .gem,
    .coin,
    .pole,
    .disk {
        cursor: pointer;
    }
}

.tablet-landscape-hint { display: none !important; }

@media (pointer: coarse) and (orientation: portrait) and (max-width: 900px) {
    .tablet-landscape-hint {
        display: block;
        position: fixed;
        left: 50%;
        bottom: max(10px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 10000;
        width: max-content;
        max-width: calc(100vw - 24px);
        padding: 8px 12px;
        border: 1px solid rgba(240, 215, 124, .65);
        border-radius: 7px;
        background: rgba(5, 7, 11, .90);
        color: #fff4cc;
        font: 12px/1.4 "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        text-align: center;
        box-shadow: 0 5px 18px rgba(0,0,0,.45);
        pointer-events: none;
    }
}

</head>
<body>
<audio id="bgm" src="../../assets/sound/sphinx.mp3" loop preload="auto"></audio>

<div class="game-frame">
    <aside class="sphinx-panel">
        <img class="sphinx-image" src="../../assets/images/sphinx.png" alt="스핑크스">
        <div class="sphinx-name">SPHINX</div>
    </aside>

    <div class="quiz-container">
        <div class="quiz-title">스핑크스</div>
        <div class="source-credit">문제 구성 출처: 《대항해시대 III》 스핑크스 이벤트</div>
        <div id="display-area"></div>

        <div class="volume-control">
            <span>MUSIC VOLUME</span>
            <button class="vol-btn" onclick="toggleMute()">MUTE</button>
            <div class="vol-bar">
                <div class="bar-segment" onclick="setVolume(0.2, 1)"></div>
                <div class="bar-segment" onclick="setVolume(0.4, 2)"></div>
                <div class="bar-segment" onclick="setVolume(0.6, 3)"></div>
                <div class="bar-segment" onclick="setVolume(0.8, 4)"></div>
                <div class="bar-segment" onclick="setVolume(1.0, 5)"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentStage = 0, difficulty = 5, currentAnswer = "";
    const displayArea = document.getElementById('display-area');
    const bgm = document.getElementById('bgm');

    const FINISHER_GAME_ID = "sphinx";
    const KOREAN_NAME_PATTERN = /^[가-힣]{2,6}$/;
    let playerName = "";

    function escapeFinisherHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function normalizeKoreanName(value) {
        return String(value || "").replace(/[^가-힣]/g, "").slice(0, 6);
    }

    function isValidKoreanName(value) {
        return KOREAN_NAME_PATTERN.test(String(value || ""));
    }

    function getSavedPlayerName() {
        const saved = normalizeKoreanName(localStorage.getItem("classPlayerName") || "");
        return isValidKoreanName(saved) ? saved : "";
    }

    const finisherBoard = ClassroomFinisherBoard.create({
        gameId: FINISHER_GAME_ID,
        getPlayerName: () => playerName,
        isValidPlayerName: isValidKoreanName
    });
    function loadTodayFinishers(targetId = "today-finishers-list") { return finisherBoard.load(targetId); }
    function registerFinisher(difficulty, rank, targetId = "result-finishers-list") {
        return finisherBoard.register({ difficulty, rank, targetId });
    }

    function initializePlayerEntry() {
        playerName = getSavedPlayerName();
    }
    bgm.loop = true;

    document.body.addEventListener('click', () => { if(bgm.paused) bgm.play(); }, { once: true });

    function setVolume(val, level) {
        bgm.volume = val;
        const segments = document.querySelectorAll('.bar-segment');
        segments.forEach((seg, i) => {
            seg.className = 'bar-segment';
            if (i < level) seg.classList.add('active-' + level);
        });
    }

    function toggleMute() { bgm.muted = !bgm.muted; }
    setVolume(0.6, 3);

    function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function loadQuestion() {
        if (currentStage === 0) {
            displayArea.innerHTML = `
                <div class="question-text">${playerName ? `PLAYER · ${escapeFinisherHtml(playerName)}` : "<스핑크스> 도전할 자는 이름과 실력을 밝혀라."}</div>
                <div class="player-entry">
                    <div class="player-name-help" id="player-name-help">이름이 없습니다. 메인 화면에서 이름을 먼저 저장해 주세요.</div>
                    <button class="quiz-btn" type="button" onclick="location.href='../../index.html'">메인 화면으로</button>
                </div>
                <div class="options-container">
                    <button class="quiz-btn" data-difficulty-button onclick="setDiff(5)">START GAME · BEGINNER</button>
                    <button class="quiz-btn" data-difficulty-button onclick="setDiff(10)">START GAME · ADVANCED</button>
                    <button class="quiz-btn" type="button" onclick="showSphinxRules()">HOW TO PLAY</button>
                </div>
                <div class="finishers-panel">
                    <div class="finishers-title">🏆 TODAY’S FINISHERS</div>
                    <div class="finishers-list" id="today-finishers-list"></div>
                </div>`;
            const playerEntry = document.querySelector(".player-entry");
            document.querySelectorAll("[data-difficulty-button]").forEach(button => {
                button.disabled = !isValidKoreanName(playerName);
            });
            if (playerName && playerEntry) {
                playerEntry.style.display = "none";
            }
            loadTodayFinishers();
            return;
        }

        const standardOptions = Array.from({length: difficulty}, (_, i) => `${i + 1}마리`);
        let qText = "", ans = "";

        if (currentStage === 1) {
            qText = "<스핑크스> 아침에는 4개의 다리, 낮에는 2개의 다리, 밤에는 3개의 다리로 걷는 괴물은?";
            let html = `<div class="question-text">${qText}</div><div class="options-container">`;
            ["스핑크스", "자신", "기타", "없다", "모른다", "무시한다", "도망간다"].forEach(o => html += `<button class="quiz-btn" onclick="check('${o}', '자신')">${o}</button>`);
            displayArea.innerHTML = html + `</div>`;
            return;
        } 
        
        if (currentStage === 2) {
            const x = getRandomInt(1, difficulty), y = getRandomInt(1, difficulty);
            qText = `<스핑크스> 그럼 그대에게 묻겠다.\n다리가 4개 있는 괴물과 2개 있는 괴물이 ${x + y}마리 있다. 그 다리는 합쳐서 ${4*x + 2*y}개가 있다.\n그러면 다리가 4개있는 괴물은 몇 마린가?`;
            ans = x + "마리";
        } else if (currentStage === 3) {
            const x = getRandomInt(1, difficulty), y = getRandomInt(3, difficulty);
            qText = `<스핑크스> 다시 그대에게 묻겠다.\n다리가 4개와 2개 있는 괴물의 다리를 합쳐서 ${4*x + 2*y}개가 있다. 세월이 지나서 다리 4개의 괴물은 모두 다리가 2개가 되고, 2개의 다리를 가지고 있는 것 중 2마리는 3개의 다리가 되었다. 괴물들의 다리를 모두 합치니 ${2*x + 2*(y-2) + 3*2}개가 되었다. 처음에 다리가 4개 있었던 괴물은 몇 마리였느냐?`;
            ans = x + "마리";
        } else if (currentStage === 4) {
            const x = getRandomInt(1, difficulty), y = getRandomInt(5, difficulty);
            qText = `<스핑크스> 마지막으로 그대에게 묻겠다.\n다리가 4개와 2개 있는 괴물의 다리를 합쳐서 ${4*x + 2*y}개가 있다. 세월이 지나서 4개의 다리를 가진 괴물은 모두 다리가 2개로 성장하고, 다리가 2개 있는 괴물중 4마리는 다리가 3개가 되었다. 게다가 다리가 4개였던 괴물의 2배가 되는 4개의 다리를 가지는 괴물이 새로이 태어났다. 괴물들의 다리를 다 합쳐 ${2*x + 2*(y-4) + 3*4 + 4*(2*x)}개가 있다. 그러면 처음에 다리가 4개 있었던 괴물은 몇 마리였느냐?`;
            ans = x + "마리";
        } else { showResult(true); return; }

        let html = `<div class="question-text">${qText}</div><div class="options-container">`;
        standardOptions.forEach(o => html += `<button class="quiz-btn" onclick="check('${o}', '${ans}')">${o}</button>`);
        displayArea.innerHTML = html + `</div>`;
    }

    function showSphinxRules() {
        displayArea.innerHTML = `
            <div class="question-text">HOW TO PLAY</div>
            <div style="text-align:left;line-height:1.75;margin:12px auto;max-width:620px">
                <p>스핑크스가 내는 수수께끼와 수학 문제를 차례대로 해결하는 게임입니다.</p>
                <ol>
                    <li>초급은 1~5마리, 고급은 1~10마리 범위의 수가 사용됩니다.</li>
                    <li>문제에 나온 다리의 총개수와 괴물의 수를 이용해 정답을 계산하세요.</li>
                    <li>보기 중 하나를 선택하면 즉시 정답 여부를 확인합니다.</li>
                    <li>모든 문제를 해결하면 오늘의 완료자 기록에 등록됩니다.</li>
                </ol>
            </div>
            <div class="options-container"><button class="quiz-btn" type="button" onclick="loadQuestion()">BACK</button></div>`;
    }

    function setDiff(d) {
        if (!isValidKoreanName(playerName)) {
            const input = document.getElementById("player-name");
            if (input) input.focus();
            return;
        }
        difficulty = d;
        currentStage = 1;
        loadQuestion();
    }
    function check(s, a) { if (s === a) { currentStage++; loadQuestion(); } else showResult(false); }
    function showResult(win) {
        displayArea.innerHTML = `
            <div class="question-text" style="text-align:center;">
                ${win ? "<스핑크스> 그대의 예지를 칭송하리라." : "<스핑크스> 성스러운 땅에 합당치 않은 자여! 물러가라!"}
            </div>
            ${win ? `<div class="finishers-panel result-finishers">
                <div class="finishers-title">🏆 TODAY’S FINISHERS</div>
                <div class="finishers-list" id="result-finishers-list"></div>
            </div>` : ""}
            <button class="quiz-btn confirm-btn" onclick="currentStage=0; loadQuestion();">처음으로</button>`;
        if (win) {
            const label = difficulty === 10 ? "고급 · 1~10마리" : "초급 · 1~5마리";
            registerFinisher(label, difficulty);
        }
    }

    initializePlayerEntry();
    loadQuestion();
</script>
</body>
</html>
