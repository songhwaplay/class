services:
  - type: web
    name: world-voyage-classroom
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production
      - key: TEACHER_PIN
        sync: false
      - key: DATA_DIR
        value: ./runtime
