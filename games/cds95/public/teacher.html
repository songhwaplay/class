<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CDS95 교사 도착 순위판 v23</title>
<style>
:root{--bg:#061219;--panel:#102832;--line:#9c865e;--ink:#f4e8ca;--good:#a8e7b7;--bad:#ff9d93;--accent:#f1ce73}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Malgun Gothic","Noto Sans KR",sans-serif;padding:14px}button,input,select{font:inherit;border-radius:7px;border:1px solid #887653;background:#071a22;color:#fff;padding:9px}button{background:#72552c;font-weight:800;cursor:pointer;min-height:42px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;box-shadow:0 5px 20px #0008}.hidden{display:none!important}.ok{color:var(--good)}.err{color:var(--bad)}.muted{font-size:12px;opacity:.78;line-height:1.55}.login{max-width:620px;margin:12vh auto}.loginRow{display:grid;grid-template-columns:1fr 1fr auto;gap:8px}.header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}.header h2{margin:0}.summary{display:flex;gap:8px;flex-wrap:wrap}.summary span{background:#0a2028;border:1px solid #52656a;border-radius:7px;padding:8px 11px}.layout{display:grid;grid-template-columns:minmax(310px,390px) minmax(560px,1fr);gap:12px}.setup{display:grid;gap:10px;align-content:start}.setup label{display:grid;gap:5px;font-size:12px}.startGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.publish{background:#4d6532;font-size:15px}.startRace{background:#16743f;font-size:20px;border:2px solid #8ee3ad;min-height:56px}.startRace:disabled{background:#263b32;color:#879b8e;border-color:#52635a;cursor:not-allowed}.danger{background:#713632}.missionNow{border-left:4px solid var(--accent);padding:10px;background:#081d25}.missionNow strong{display:block;color:#ffe29a;font-size:22px}.counts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}.countCard{padding:8px;border:1px solid #52656a;border-radius:7px;background:#0a2028}.rankBoard{min-height:560px}.rankHeader{display:flex;align-items:center;justify-content:space-between;gap:10px}.missionTitle{font-size:28px;color:#ffe29a;font-weight:900;margin:8px 0 14px}.rankList{display:grid;gap:8px}.rankRow{display:grid;grid-template-columns:72px 1.5fr 1fr 130px;gap:10px;align-items:center;padding:12px;border:1px solid #476068;border-radius:8px;background:#091e26}.rankNo{font-size:34px;font-weight:900;color:#f5d477;text-align:center}.rankName{font-size:22px;font-weight:900;color:#fff}.rankStart,.rankTime{font-size:13px}.waitingTitle{margin:18px 0 6px}.waiting{display:grid;grid-template-columns:1fr auto;gap:8px;padding:7px 3px;border-bottom:1px solid #324a53;font-size:13px}.empty{text-align:center;padding:30px 10px;opacity:.7}.rankBoard:fullscreen{background:#061219;padding:30px;overflow:auto}.rankBoard:fullscreen .missionTitle{font-size:42px}.rankBoard:fullscreen .rankRow{grid-template-columns:110px 1.5fr 1fr 210px;padding:20px}.rankBoard:fullscreen .rankNo{font-size:58px}.rankBoard:fullscreen .rankName{font-size:36px}.rankBoard:fullscreen .rankStart,.rankBoard:fullscreen .rankTime{font-size:23px}
@media(max-width:950px){.layout{grid-template-columns:1fr}.loginRow,.startGrid{grid-template-columns:1fr}}
</style></head><body>
<section id="login" class="panel login"><h1>CDS95 교사 화면</h1><p>학생과 같은 반 코드와 교사 PIN을 입력하세요.</p><div class="loginRow"><input id="room" value="3-1" placeholder="반 코드"><input id="pin" type="password" placeholder="교사 PIN"><button id="go">접속</button></div><p id="error" class="err"></p></section>
<main id="dash" class="hidden">
<header class="header"><div><h2><span id="roomLabel"></span> 도착 미션</h2><span id="status" class="ok">서버 연결</span></div><div class="summary"><span>수업 날짜 <b id="classClock">1492년 1월 1일 00:00</b></span><span>접속 <b id="count">0</b>명</span></div></header>
<div class="layout">
<section class="setup">
<div class="panel"><h3 style="margin-top:0">미션 설정</h3><p class="muted">도착지 한 곳과 학생이 고를 출발 도시 네 곳만 지정합니다.</p><label>도착 도시·지형<select id="target"></select></label><div class="startGrid"><label>출발 도시 1<select id="start1"></select></label><label>출발 도시 2<select id="start2"></select></label><label>출발 도시 3<select id="start3"></select></label><label>출발 도시 4<select id="start4"></select></label></div><button id="publish" class="publish">미션 준비 · 출발지 선택 시작</button><button id="startRace" class="startRace" disabled>전원 출발</button><button id="clear" class="danger">미션 종료</button><p id="missionError" class="err"></p></div>
<div id="activeMission" class="panel"><p class="muted">아직 미션이 없습니다.</p></div>
</section>
<section id="rankBoard" class="panel rankBoard"><div class="rankHeader"><h3 style="margin:0">실시간 도착 순위</h3><button id="fullRank">TV 전체화면</button></div><div id="rankMission" class="missionTitle">미션 대기 중</div><div id="rankList" class="rankList"><div class="empty">도착한 학생이 없습니다.</div></div><h3 class="waitingTitle">이동 중</h3><div id="waitingList"></div></section>
</div></main>
<script src="/socket.io/socket.io.js"></script><script>
'use strict';
const socket=io({transports:['websocket','polling']}),$=id=>document.getElementById(id);let players=[],activeMission=null,progress=[],catalog={places:[]},teacherClockActive=false,clockRate=4,clockBaseMinutes=0,clockBaseReal=Date.now();
function ack(e,p={}){return new Promise(r=>socket.emit(e,p,r))}function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function formatGameDate(m){const d=new Date(Date.UTC(1492,0,1)+Math.max(0,m||0)*60000);return `${d.getUTCFullYear()}년 ${d.getUTCMonth()+1}월 ${d.getUTCDate()}일 ${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`}function teacherMinutes(){return clockBaseMinutes+(Date.now()-clockBaseReal)/1000*clockRate*60}function resetClock(m){clockBaseMinutes=Math.max(0,Number(m)||0);clockBaseReal=Date.now();$('classClock').textContent=formatGameDate(m)}setInterval(()=>{if(!teacherClockActive)return;const m=teacherMinutes();$('classClock').textContent=formatGameDate(m);socket.emit('teacherClockSync',{gameMinutes:m})},500);
function opt(sel,v,t){const o=document.createElement('option');o.value=v;o.textContent=t;sel.append(o)}async function loadCatalog(){const r=await fetch('/api/mission-catalog');catalog=await r.json();const places=[...catalog.places].sort((a,b)=>(a.category||'').localeCompare(b.category||'','ko')||a.name.localeCompare(b.name,'ko')),ports=places.filter(p=>p.access==='port');$('target').replaceChildren();for(const p of places)opt($('target'),p.id,`[${p.category}] ${p.name}`);for(const id of ['start1','start2','start3','start4']){const e=$(id);e.replaceChildren();for(const p of ports)opt(e,p.id,p.name)}$('target').value='crimea_peninsula';$('start1').value='lisbon';$('start2').value='london';$('start3').value='istanbul';$('start4').value='original_city_111'}
function progressOf(name){return progress.find(p=>p.name===name)||{status:'assigned'}}function formatArrival(m){return Number.isFinite(m)?formatGameDate(m).replace(/^1492년 /,''):'-'}
function renderMission(){const box=$('activeMission'),startBtn=$('startRace');if(!activeMission){box.innerHTML='<p class="muted">아직 미션이 없습니다.</p>';startBtn.disabled=true;startBtn.textContent='전원 출발';return}const selected=progress.filter(p=>p.selectedStartPlaceId).length,done=progress.filter(p=>p.status==='completed').length,running=activeMission.phase==='running',allReady=players.length>0&&selected===players.length;const starts=(activeMission.startOptions||[]).map((o,i)=>`<div class="countCard"><b>${i+1}. ${esc(o.startPlace.name)}</b><br>선택 ${progress.filter(p=>p.selectedStartPlaceId===o.startPlace.id).length}명</div>`).join('');box.innerHTML=`<div class="missionNow"><span>${running?'진행 중':'출발 준비 중'} · 도착지</span><strong>${esc(activeMission.targetPlace?.name||activeMission.title)}</strong></div><div class="counts">${starts}</div><p><b>출발지 선택</b> ${selected}/${players.length}명 · <b>도착</b> ${done}/${players.length}명</p>${!running&&players.length&&!allReady?'<p class="muted">모든 학생이 출발 도시를 선택하면 전원 출발 버튼이 활성화됩니다.</p>':''}`;startBtn.disabled=running||!allReady;startBtn.textContent=running?'출발 완료':allReady?'전원 출발':'선택 완료 대기'}
function renderRanking(){const done=progress.filter(p=>p.status==='completed'&&p.finishRank).sort((a,b)=>a.finishRank-b.finishRank||a.completedAt-b.completedAt),waiting=players.map(p=>({player:p,pr:progressOf(p.name)})).filter(x=>x.pr.status!=='completed');$('rankMission').textContent=activeMission?`${activeMission.targetPlace?.name||activeMission.title} 도착`:'미션 대기 중';$('rankList').innerHTML=done.length?done.map(p=>`<div class="rankRow"><div class="rankNo">${p.finishRank}위</div><div class="rankName">${esc(p.name)}</div><div class="rankStart">${esc(p.selectedStartPlaceName||'')}</div><div class="rankTime">${formatArrival(p.completedGameMinutes)}</div></div>`).join(''):'<div class="empty">도착한 학생이 없습니다.</div>';$('waitingList').innerHTML=waiting.length?waiting.sort((a,b)=>(a.pr.selectedStartPlaceName?1:0)-(b.pr.selectedStartPlaceName?1:0)||a.player.name.localeCompare(b.player.name,'ko')).map(({player,pr})=>`<div class="waiting"><span><b>${esc(player.name)}</b> · ${esc(pr.selectedStartPlaceName||'출발지 선택 전')}</span><span>${pr.selectedStartPlaceName?(activeMission?.phase==='running'?'이동 중':'출발 준비 완료'):'출발지 선택 전'}</span></div>`).join(''):'<div class="empty">모든 학생이 도착했습니다.</div>'}
function renderAll(){$('count').textContent=players.length;renderMission();renderRanking()}
$('go').onclick=async()=>{const r=await ack('teacherJoin',{roomCode:$('room').value,pin:$('pin').value});if(!r?.ok){$('error').textContent=r?.error||'접속 실패';return}$('login').classList.add('hidden');$('dash').classList.remove('hidden');$('roomLabel').textContent=r.roomCode;activeMission=r.mission;progress=r.progress||[];clockRate=Number(r.clockRateHoursPerSecond||4);resetClock(r.classGameMinutes||0);teacherClockActive=true;renderAll()};
socket.on('connect',()=>{$('status').textContent='서버 연결';$('status').className='ok'});socket.on('disconnect',()=>{teacherClockActive=false;$('status').textContent='재연결 중';$('status').className='err'});socket.on('teacherSnapshot',s=>{players=s.players||[];activeMission=s.mission||null;progress=s.progress||[];renderAll()});socket.on('teacherMissionChanged',d=>{activeMission=d?.mission||null;renderAll()});socket.on('teacherMissionProgress',d=>{const i=progress.findIndex(p=>p.name===d.name);if(i>=0)progress[i]={name:d.name,...d.progress};else progress.push({name:d.name,...d.progress});renderAll()});
$('publish').onclick=async()=>{const payload={targetPlaceId:$('target').value,startPlaceIds:['start1','start2','start3','start4'].map(id=>$(id).value)},r=await ack('teacherPublishArrivalRace',payload);if(!r?.ok){$('missionError').textContent=r?.error||'배포 실패';return}$('missionError').textContent='학생들이 출발 도시를 선택할 때까지 기다린 뒤 전원 출발을 누르세요.';activeMission=r.mission;progress=r.progress||[];renderAll()};$('startRace').onclick=async()=>{const r=await ack('teacherStartArrivalRace',{});if(!r?.ok){$('missionError').textContent=r?.error||'출발 실패';return}$('missionError').textContent='전원이 동시에 출발했습니다.';activeMission=r.mission;progress=r.progress||progress;renderAll()};$('clear').onclick=async()=>{const r=await ack('teacherClearMission',{});if(!r?.ok){$('missionError').textContent=r?.error||'종료 실패';return}activeMission=null;progress=[];renderAll()};$('fullRank').onclick=()=>{const b=$('rankBoard');if(document.fullscreenElement)document.exitFullscreen();else b.requestFullscreen?.()};loadCatalog().catch(e=>$('error').textContent=e.message);
</script></body></html>
