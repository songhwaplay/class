<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>아발론 · 클래스 원정대</title>
<style>
:root{--ink:#f8efd8;--muted:#b9aa8e;--gold:#d8af58;--red:#b9473f;--blue:#477ea8;--panel:rgba(20,22,27,.92)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Malgun Gothic",sans-serif;background:radial-gradient(circle at 50% -15%,#665a3b 0,#202530 37%,#0d1118 78%);padding:24px}.shell{width:min(900px,100%);margin:auto}.brand{text-align:center;margin:10px 0 24px}.brand b{display:block;font:700 clamp(30px,7vw,64px) Georgia,serif;letter-spacing:.08em;color:#f3d990;text-shadow:0 3px 18px #000}.brand span{color:var(--muted);letter-spacing:.35em;font-size:12px}.card{background:var(--panel);border:1px solid #756442;border-radius:18px;padding:20px;box-shadow:0 18px 60px #0008,inset 0 0 35px #d8af5809;margin-bottom:15px}h2,h3{font-family:Georgia,"Malgun Gothic",serif;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}input,button{font:inherit;border-radius:10px;border:1px solid #756442;padding:12px}input{width:100%;background:#0b0f15;color:#fff}button{cursor:pointer;background:linear-gradient(#9b7634,#6e4c1e);color:#fff5d8;font-weight:800}button.secondary{background:#29313e}button.danger{background:#7e2e2e}button:disabled{opacity:.4;cursor:not-allowed}.hide{display:none!important}.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}.row>*{flex:1}.code{font:700 30px Georgia;color:#f3d990;letter-spacing:.14em}.status{min-height:22px;color:#e8ca88;margin-top:10px}.players{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}.player{padding:12px;border:1px solid #4c5564;border-radius:12px;background:#151a22;position:relative}.player.me{border-color:var(--gold)}.player.leader:after{content:"♛";position:absolute;right:9px;top:7px;color:var(--gold)}.player.selected{background:#37301d;border-color:#e1bc64}.missions{display:flex;justify-content:center;gap:12px;margin:15px}.mission{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:#303745;border:2px solid #687180;font-weight:900}.mission.ok{background:#346d91}.mission.fail{background:#8d3535}.role{font-size:28px;color:#f1ce76}.secret{border-left:5px solid var(--gold)}.notice{padding:11px;border-radius:10px;background:#261f13;color:#f4d99d}.checks{display:flex;flex-wrap:wrap;gap:8px}.checks label{background:#171c24;padding:10px;border-radius:10px}small{color:var(--muted)}@media(max-width:550px){body{padding:12px}.card{padding:15px}.brand{margin-top:2px}.row>*{flex-basis:100%}}
.checks input{width:auto}
</style>
</head>
<body><main class="shell"><header class="brand"><b>AVALON</b><span>클래스 원정대</span></header>
<section id="entry" class="card"><h2>원정에 합류하세요</h2><div class="grid"><input id="name" maxlength="12" placeholder="닉네임"><input id="code" inputmode="numeric" maxlength="6" placeholder="초대 코드 6자리"></div><div class="row" style="margin-top:10px"><button id="create">방 생성</button><button id="join" class="secondary">방 참가</button></div><div id="entryStatus" class="status"></div></section>
<section id="game" class="hide"><section class="card"><div class="row"><div><small>초대 코드</small><div id="roomCode" class="code"></div></div><div><small>현재 단계</small><h3 id="phaseText">대기실</h3></div></div><div id="notice" class="notice hide"></div><div id="missions" class="missions"></div></section>
<section id="secret" class="card secret hide"><small>나만 볼 수 있습니다</small><div id="role" class="role"></div><div id="vision"></div></section>
<section class="card"><h3>원정대원 <span id="count"></span></h3><div id="players" class="players"></div></section>
<section id="lobby" class="card"><h3>특수 역할</h3><div class="checks"><label><input type="checkbox" data-role="percival" checked> 퍼시벌</label><label><input type="checkbox" data-role="morgana" checked> 모르가나</label><label><input type="checkbox" data-role="mordred"> 모드레드</label><label><input type="checkbox" data-role="oberon"> 오베론</label></div><button id="start" style="margin-top:14px;width:100%">게임 시작 (5~10명)</button></section>
<section id="action" class="card hide"><h3 id="actionTitle"></h3><div id="actionBody"></div></section></section>
</main><script>
const SERVER="wss://classroom-game-hub.onrender.com",GAME="avalon",NAME_KEY="classPlayerName";let ws,myId,state,roleInfo,selected=new Set(),isHost=false,rolesReveal=[];const $=id=>document.getElementById(id),send=o=>ws?.readyState===1&&ws.send(JSON.stringify(o));
const savedName=String(localStorage.getItem(NAME_KEY)||"").trim();
$("name").value=savedName;
$("name").readOnly=true;
$("name").placeholder="메인 화면에서 이름을 먼저 저장하세요";
if(!/^[가-힣]{2,6}$/.test(savedName)){
  $("create").disabled=true;$("join").disabled=true;
  status("메인 화면에서 한글 이름을 먼저 저장해 주세요.");
}
function connect(mode){const name=String(localStorage.getItem(NAME_KEY)||"").trim(),given=$("code").value.replace(/\D/g,"");if(!/^[가-힣]{2,6}$/.test(name))return status("메인 화면에서 한글 이름을 먼저 저장해 주세요.");const roomCode=mode==="create"?String(Math.floor(100000+Math.random()*900000)):given;if(roomCode.length!==6)return status("초대 코드는 숫자 6자리입니다.");status("서버에 연결 중…");ws=new WebSocket(SERVER);ws.onopen=()=>send({type:mode==="create"?"CREATE_ROOM":"JOIN_ROOM",gameId:GAME,roomCode,name});ws.onmessage=e=>handle(JSON.parse(e.data));ws.onerror=()=>status("서버 연결에 실패했습니다.");ws.onclose=()=>state&&notice("서버 연결이 끊어졌습니다.");}
function handle(m){if(m.type==="CONNECTED")myId=m.playerId;if(m.type==="ROOM_CREATED"||m.type==="ROOM_JOINED"){isHost=m.type==="ROOM_CREATED";$("entry").classList.add("hide");$("game").classList.remove("hide");$("roomCode").textContent=m.roomCode}if(m.type==="AVALON_STATE"){const nextKey=`${m.state.phase}:${m.state.quest}:${m.state.leaderId}`;if(window.turnKey!==nextKey){selected.clear();window.turnKey=nextKey}state=m.state;render()}if(m.type==="AVALON_ROLE"){roleInfo=m.info;renderSecret()}if(m.type==="AVALON_NOTICE")notice(m.message);if(m.type==="AVALON_REVEAL"){rolesReveal=m.roles}if(m.type==="ERROR"||m.type==="ROOM_NOT_FOUND"||m.type==="ROOM_FULL")status(m.message||"방을 찾을 수 없거나 가득 찼습니다.")}
function status(t){$("entryStatus").textContent=t}function notice(t){$("notice").textContent=t;$("notice").classList.remove("hide")}
const phaseNames={lobby:"대기실",team:"원정대 구성",proposalVote:"원정대 찬반 투표",questVote:"임무 수행",assassination:"멀린 암살",ended:"게임 종료"};
function render(){if(!state)return;$("phaseText").textContent=phaseNames[state.phase]||state.phase;$("count").textContent=`${state.players.length}/10`;$("lobby").classList.toggle("hide",state.phase!=="lobby");$("start").disabled=!isHost||state.players.length<5;document.querySelectorAll("[data-role]").forEach(c=>{c.disabled=!isHost;c.checked=!!state.settings[c.dataset.role]});$("missions").innerHTML=[0,1,2,3,4].map((_,i)=>`<div class="mission ${state.results[i]?.success===true?'ok':state.results[i]?.success===false?'fail':''}">${i+1}</div>`).join("");$("players").innerHTML=state.players.map(p=>`<button class="player ${p.id===myId?'me':''} ${p.id===state.leaderId?'leader':''} ${selected.has(p.id)?'selected':''}" data-player="${p.id}">${esc(p.name)}${p.id===state.hostId?' · 방장':''}</button>`).join("");document.querySelectorAll("[data-player]").forEach(b=>b.onclick=()=>choose(b.dataset.player));renderAction()}
function renderSecret(){if(!roleInfo)return;$("secret").classList.remove("hide");const names={Merlin:"멀린",Percival:"퍼시벌",Assassin:"암살자",Morgana:"모르가나",Mordred:"모드레드",Oberon:"오베론","Loyal Servant":"충성스러운 신하","Minion of Mordred":"모드레드의 하수인"};$("role").textContent=names[roleInfo.role]||roleInfo.role;$("vision").textContent=roleInfo.visible.length?`알고 있는 인물: ${roleInfo.visible.join(", ")}`:"추가로 보이는 정보가 없습니다."}
function renderAction(){const box=$("action"),title=$("actionTitle"),body=$("actionBody");box.classList.remove("hide");body.innerHTML="";if(state.phase==="lobby"){box.classList.add("hide");return}if(state.phase==="team"){title.textContent=state.leaderId===myId?`원정대 ${state.teamSize}명 선택`:`원정대장이 ${state.teamSize}명을 고르는 중`;if(state.leaderId===myId)body.innerHTML='<button id="propose">선택 완료</button>'}else if(state.phase==="proposalVote"){title.textContent=`원정대: ${names(state.selectedTeam)}`;body.innerHTML='<div class="row"><button id="approve">찬성</button><button id="reject" class="danger">반대</button></div>'}else if(state.phase==="questVote"){title.textContent=state.selectedTeam.includes(myId)?"임무 카드를 제출하세요":"원정대가 임무를 수행 중";if(state.selectedTeam.includes(myId))body.innerHTML=`<div class="row"><button id="success">성공</button>${roleInfo?.alignment==='evil'?'<button id="failure" class="danger">실패</button>':''}</div>`}else if(state.phase==="assassination"){title.textContent=state.assassinId===myId?"멀린으로 의심되는 사람을 선택하세요":"암살자가 멀린을 찾는 중";if(state.assassinId===myId)body.innerHTML='<button id="kill" class="danger">선택한 인물 암살</button>'}else if(state.phase==="ended"){title.textContent=state.winner==="good"?"선의 세력 승리":"악의 세력 승리";body.innerHTML=rolesReveal.map(r=>`<div>${esc(r.name)} — ${esc(r.role)}</div>`).join("")+'<button onclick="location.reload()" style="margin-top:12px">새 게임</button>'}bindActions()}
function bindActions(){const on=(id,fn)=>{const el=$(id);if(el)el.onclick=fn};on("propose",()=>send({type:"AVALON_ACTION",action:"PROPOSE",team:[...selected]}));on("approve",()=>send({type:"AVALON_ACTION",action:"PROPOSAL_VOTE",approve:true}));on("reject",()=>send({type:"AVALON_ACTION",action:"PROPOSAL_VOTE",approve:false}));on("success",()=>send({type:"AVALON_ACTION",action:"QUEST_VOTE",success:true}));on("failure",()=>send({type:"AVALON_ACTION",action:"QUEST_VOTE",success:false}));on("kill",()=>{if(selected.size!==1)return notice("한 명을 선택하세요.");send({type:"AVALON_ACTION",action:"ASSASSINATE",targetId:[...selected][0]})})}
function choose(id){if(state.phase==="team"&&state.leaderId===myId){selected.has(id)?selected.delete(id):selected.size<state.teamSize&&selected.add(id);render()}else if(state.phase==="assassination"&&state.assassinId===myId){selected=new Set([id]);render()}}
function names(ids){return ids.map(id=>state.players.find(p=>p.id===id)?.name).filter(Boolean).join(", ")}function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
$("create").onclick=()=>connect("create");$("join").onclick=()=>connect("join");$("start").onclick=()=>send({type:"AVALON_ACTION",action:"START"});document.querySelectorAll("[data-role]").forEach(c=>c.onchange=()=>send({type:"AVALON_ACTION",action:"SETTINGS",settings:Object.fromEntries([...document.querySelectorAll("[data-role]")].map(x=>[x.dataset.role,x.checked]))}));
</script></body></html>
