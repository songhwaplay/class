<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>아발론 · 클래스 원정대</title>
<style>
:root{--ink:#f8efd8;--muted:#b9aa8e;--gold:#d8af58;--red:#b9473f;--blue:#477ea8;--panel:rgba(20,22,27,.92)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Malgun Gothic",sans-serif;background:radial-gradient(circle at 50% -15%,#665a3b 0,#202530 37%,#0d1118 78%);padding:24px}.shell{width:min(900px,100%);margin:auto}.brand{text-align:center;margin:10px 0 24px}.brand b{display:block;font:700 clamp(30px,7vw,64px) Georgia,serif;letter-spacing:.08em;color:#f3d990;text-shadow:0 3px 18px #000}.brand span{color:var(--muted);letter-spacing:.35em;font-size:12px}.card{background:var(--panel);border:1px solid #756442;border-radius:18px;padding:20px;box-shadow:0 18px 60px #0008,inset 0 0 35px #d8af5809;margin-bottom:15px}h2,h3{font-family:Georgia,"Malgun Gothic",serif;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}input,button{font:inherit;border-radius:10px;border:1px solid #756442;padding:12px}input{width:100%;background:#0b0f15;color:#fff}button{cursor:pointer;background:linear-gradient(#9b7634,#6e4c1e);color:#fff5d8;font-weight:800}button.secondary{background:#29313e}button.danger{background:#7e2e2e}button:disabled{opacity:.4;cursor:not-allowed}.hide{display:none!important}.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}.row>*{flex:1}.code{font:700 30px Georgia;color:#f3d990;letter-spacing:.14em}.status{min-height:22px;color:#e8ca88;margin-top:10px}.players{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}.player{padding:12px;border:1px solid #4c5564;border-radius:12px;background:#151a22;position:relative}.player.me{border-color:var(--gold)}.player.leader:after{content:"♛";position:absolute;right:9px;top:7px;color:var(--gold)}.player.selected{background:#37301d;border-color:#e1bc64}.missions{display:flex;justify-content:center;gap:12px;margin:15px}.mission{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:#303745;border:2px solid #687180;font-weight:900}.mission.ok{background:#346d91}.mission.fail{background:#8d3535}.role{font-size:28px;color:#f1ce76}.secret{border-left:5px solid var(--gold)}.notice{padding:11px;border-radius:10px;background:#261f13;color:#f4d99d}.checks{display:flex;flex-wrap:wrap;gap:8px}.checks label{background:#171c24;padding:10px;border-radius:10px}small{color:var(--muted)}@media(max-width:550px){body{padding:12px}.card{padding:15px}.brand{margin-top:2px}.row>*{flex-basis:100%}}
.checks input{width:auto}
.identityCard{touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}.identityCardInner{transition-duration:.25s}
.roundGuide{text-align:left;margin:0 0 14px;padding:14px 15px;border:1px solid #827047;border-radius:12px;background:linear-gradient(135deg,#2a281d,#171b21);color:#ece3cf;font-size:14px;line-height:1.65}.roundGuide b{color:#f2d482}.roundGuide .rule{display:block;margin-top:7px;color:#bcd4e8}.roundGuide .dangerRule{display:block;margin-top:7px;color:#f3b5ae}
.setupGuide{margin:0 0 13px;padding:12px;border-radius:10px;background:#1b2731;color:#cfe1ed;line-height:1.55}.setupGuide.custom{background:#32291a;color:#f0d49b}.roleComposition{display:grid;gap:8px;margin:13px 0}.roleSide{padding:10px 12px;border-radius:10px;background:#111820;font-size:13px;line-height:1.5}.roleSide.good{border-left:4px solid #5694c1}.roleSide.evil{border-left:4px solid #c05d55}.setupHelp{margin:10px 0;color:var(--muted);font-size:12px;line-height:1.5}.lobbyButtons{display:grid;grid-template-columns:1fr 2fr;gap:9px;margin-top:13px}@media(max-width:550px){.lobbyButtons{grid-template-columns:1fr}}
.characterPicker{margin-top:13px}.characterPickerTitle{display:block;margin-bottom:8px;color:#e6d5ad;font-size:13px;font-weight:700}.characterChoices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.characterOption{position:relative}.characterOption input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}.characterOption span{display:block;padding:11px 8px;border:1px solid #566171;border-radius:10px;background:#151b24;color:#c9d0d8;text-align:center;cursor:pointer}.characterOption input:checked+span{border-color:#e2bb61;background:#493a1e;color:#fff0bd;box-shadow:0 0 0 2px #d8af5833}.characterOption input:focus-visible+span{outline:2px solid #fff;outline-offset:2px}.characterChoiceHelp{margin:7px 0 0;color:var(--muted);font-size:11px}@media(max-width:420px){.characterChoices{grid-template-columns:1fr}}
.secret{text-align:center}.cardHint{margin:0 0 13px;color:var(--muted);font-size:13px}.identityCard{display:block;width:min(330px,88vw);aspect-ratio:5/7;margin:auto;padding:0;border:0;background:transparent;perspective:1200px}.identityCardInner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.2,.72,.2,1);transform-style:preserve-3d}.identityCard.revealed .identityCardInner{transform:rotateY(180deg)}.identityCardSide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border:5px solid #b68a3e;border-radius:20px;overflow:hidden;backface-visibility:hidden;box-shadow:0 18px 38px #000b,inset 0 0 0 2px #e8ce88}.identityCardBack{background:radial-gradient(circle,#795a27 0 4%,transparent 4.5%),repeating-conic-gradient(from 45deg,#1c2533 0 12.5%,#263446 0 25%);background-size:42px 42px,auto}.identityCardBack:before,.identityCardBack:after{content:"";position:absolute;border:2px solid #c49a4e;border-radius:50%;inset:13%}.identityCardBack:after{inset:25%;border-radius:12px;transform:rotate(45deg)}.cardBackMark{position:relative;z-index:1;font:700 64px Georgia;color:#e6c978;text-shadow:0 3px 12px #000}.cardBackTitle{position:relative;z-index:1;margin-top:8px;font:700 24px Georgia;letter-spacing:.18em;color:#f7e4ad}.identityCardFace{transform:rotateY(180deg);justify-content:flex-start;padding:18px 20px;background:radial-gradient(circle at 50% 22%,#466c89,#162332 57%,#080d14)}.identityCard.evil .identityCardFace{background:radial-gradient(circle at 50% 22%,#884842,#32191d 57%,#10090b)}.cardFaction{font-size:12px;letter-spacing:.32em;color:#c8ddec}.identityCard.evil .cardFaction{color:#efb1a7}.cardEmblem{font-size:50px;line-height:1;margin:13px 0 7px;filter:drop-shadow(0 4px 8px #000)}.cardRole{font:700 30px Georgia,"Malgun Gothic",serif;color:#ffe6a1}.cardAbility,.cardGoal{display:block;width:100%;margin-top:10px;padding:9px 10px;border-top:1px solid #ffffff38;text-align:left;font-size:13px;line-height:1.45;color:#e5e8eb}.cardGoal{margin-top:0;color:#d5e8f5}.cardVision{margin-top:auto;width:100%;padding:10px;border-radius:10px;background:#0005;text-align:left;font-size:12px;line-height:1.4;color:#fff1c9}.cardPrivacy{margin:13px 0 0;color:#a99a83;font-size:12px}
.identityCardInner{transition-duration:.25s}
.music-control{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 15px;margin:-8px 0 15px;background:rgba(12,15,20,.82);border:1px solid #756442;border-radius:14px;box-shadow:0 8px 24px #0006}.music-label{color:#d8c9a6;font-size:13px;font-weight:700;letter-spacing:1px}.music-track{min-width:96px;color:#f0d58f;font-size:12px;text-align:center}.music-mute-btn{min-height:30px;padding:5px 11px;border:1px solid #755322;background:linear-gradient(180deg,#d2a64c 0%,#8f6624 100%);color:#211707;font-weight:800}.music-mute-btn.active{background:linear-gradient(180deg,#3b2515 0%,#1a0f08 100%);color:#f1d177}.music-volume-bar{display:flex;gap:4px;padding:4px 6px;border:2px solid #5a3819;background:#160d08;box-shadow:inset 0 2px 5px #000b}.music-segment{width:23px;height:19px;padding:0;border:1px solid #6d451d;border-radius:2px;background:#27170d}.music-segment.active-1{background:#81501f}.music-segment.active-2{background:#a56525}.music-segment.active-3{background:#c77c2b}.music-segment.active-4{background:#e79437}.music-segment.active-5{background:#ffb34d;box-shadow:0 0 9px #ffb34d94}@media(max-width:550px){.music-control{gap:7px}.music-track{flex-basis:100%;order:3}.music-segment{width:20px}}
</style>
<script src="../../assets/network/game-network.js"></script>
<script src="../../assets/sound/music-control.js" defer></script>
</head>
<body><main class="shell"><header class="brand"><b>AVALON</b><span>클래스 원정대</span></header>
<section id="entry" class="card"><h2>원정에 합류하세요</h2><div class="grid"><input id="name" maxlength="12" placeholder="닉네임"><input id="code" inputmode="numeric" maxlength="4" placeholder="초대 코드 4자리"></div><div class="characterPicker"><span class="characterPickerTitle">캐릭터 스타일 선택</span><div class="characterChoices" role="radiogroup" aria-label="캐릭터 스타일"><label class="characterOption"><input type="radio" name="characterStyle" value="random" checked><span>선택하지 않음 · 랜덤</span></label><label class="characterOption"><input type="radio" name="characterStyle" value="male"><span>남성형 캐릭터</span></label><label class="characterOption"><input type="radio" name="characterStyle" value="female"><span>여성형 캐릭터</span></label></div><p class="characterChoiceHelp">선택 내용은 다른 학생에게 공개되지 않으며 역할 카드 그림에만 적용됩니다.</p></div><div class="row" style="margin-top:10px"><button id="create">방 생성</button><button id="join" class="secondary">방 참가</button></div><div id="entryStatus" class="status"></div></section>
<section id="game" class="hide"><section class="card"><div class="row"><div><small>초대 코드</small><div id="roomCode" class="code"></div></div><div><small>현재 단계</small><h3 id="phaseText">대기실</h3></div></div><div id="notice" class="notice hide"></div><div id="missions" class="missions"></div></section>
<section id="secret" class="card secret hide"><h3>나의 정체</h3><p id="cardHint" class="cardHint">카드를 누르고 있는 동안만 정체가 보입니다</p><button id="identityCard" class="identityCard" type="button" aria-expanded="false" aria-label="누르고 있는 동안 정체 카드 확인"><span class="identityCardInner"><span class="identityCardSide identityCardBack"><span class="cardBackMark">✦</span><span class="cardBackTitle">AVALON</span></span><span class="identityCardSide identityCardFace"><span id="faction" class="cardFaction"></span><span id="emblem" class="cardEmblem"></span><span id="role" class="cardRole"></span><span id="ability" class="cardAbility"></span><span id="goal" class="cardGoal"></span><span id="vision" class="cardVision"></span></span></span></button><p class="cardPrivacy">손가락이나 마우스를 떼는 즉시 카드가 자동으로 덮입니다.</p></section>
<section class="card"><h3>원정대원 <span id="count"></span></h3><div id="players" class="players"></div></section>
<section id="lobby" class="card"><h3>역할 구성</h3><div id="setupGuide" class="setupGuide"></div><div class="checks"><label><input type="checkbox" data-role="percival"> 퍼시벌</label><label><input type="checkbox" data-role="morgana"> 모르가나</label><label><input type="checkbox" data-role="mordred"> 모드레드</label><label><input type="checkbox" data-role="oberon"> 오베론</label></div><p class="setupHelp">체크를 해제하면 해당 특수 역할이 일반 신하 또는 일반 하수인으로 교체됩니다. 암살자와 멀린은 항상 포함됩니다. 퍼시벌과 모르가나는 함께 사용할 때 서로의 능력이 제대로 살아납니다.</p><div id="roleComposition" class="roleComposition"></div><div class="lobbyButtons"><button id="resetRecommended" class="secondary" type="button">추천 구성으로 되돌리기</button><button id="start" type="button">게임 시작 (5~8명)</button></div></section>
<section id="action" class="card hide"><h3 id="actionTitle"></h3><div id="actionBody"></div></section></section>
</main><audio id="bgm" preload="auto"></audio><div id="musicControl" class="music-control" aria-label="배경음악 조절"><span class="music-label">MUSIC VOLUME</span><button class="music-mute-btn" id="musicMuteBtn" type="button">MUTE</button><div class="music-volume-bar" role="group" aria-label="음악 볼륨"><button class="music-segment" type="button" data-music-level="1" aria-label="볼륨 1"></button><button class="music-segment" type="button" data-music-level="2" aria-label="볼륨 2"></button><button class="music-segment" type="button" data-music-level="3" aria-label="볼륨 3"></button><button class="music-segment" type="button" data-music-level="4" aria-label="볼륨 4"></button><button class="music-segment" type="button" data-music-level="5" aria-label="볼륨 5"></button></div><span id="musicTrack" class="music-track">대기실 음악</span></div><script>
const GAME="avalon",NAME_KEY="classPlayerName";let ws,myId,state,roleInfo,selected=new Set(),isHost=false,rolesReveal=[],avalonRoomAttempts=0;const $=id=>document.getElementById(id),send=o=>ws?.readyState===1&&ws.send(JSON.stringify(o));
const savedName=String(localStorage.getItem(NAME_KEY)||"").trim();
$("name").value=savedName;
$("name").readOnly=true;
$("name").placeholder="메인 화면에서 이름을 먼저 저장하세요";
if(!/^[가-힣]{2,6}$/.test(savedName)){
  $("create").disabled=true;$("join").disabled=true;
  status("메인 화면에서 한글 이름을 먼저 저장해 주세요.");
}
function connect(mode){const name=String(localStorage.getItem(NAME_KEY)||"").trim(),given=$("code").value.replace(/\D/g,"").slice(0,4),characterStyle=document.querySelector('input[name="characterStyle"]:checked')?.value||"random";if(!/^[가-힣]{2,6}$/.test(name))return status("메인 화면에서 한글 이름을 먼저 저장해 주세요.");const roomCode=mode==="create"?ClassroomNetwork.generateRoomCode(4):given;if(roomCode.length!==4)return status("초대 코드는 숫자 4자리입니다.");status("CONNECTING TO SERVER... · 게임 서버를 준비하고 있습니다.");ws=ClassroomNetwork.createSocket();ws.onopen=()=>send({type:mode==="create"?"CREATE_ROOM":"JOIN_ROOM",gameId:GAME,roomCode,name,characterStyle});ws.onmessage=e=>{const message=JSON.parse(e.data);if(message.type==="ROOM_EXISTS")return retryAvalonRoom();handle(message)};ws.onerror=()=>status("CONNECTION ERROR · 서버 연결에 실패했습니다.");ws.onclose=()=>state&&notice("CONNECTION LOST · 서버 연결이 끊어졌습니다.");}
function retryAvalonRoom(){if(!ws||avalonRoomAttempts>=8)return status("ROOM ERROR · 빈 방 번호를 만들지 못했습니다.");avalonRoomAttempts+=1;const roomCode=ClassroomNetwork.generateRoomCode(4),name=String(localStorage.getItem(NAME_KEY)||"").trim(),characterStyle=document.querySelector('input[name="characterStyle"]:checked')?.value||"random";status("CREATING ROOM... · 새 방 번호를 만들고 있습니다.");send({type:"CREATE_ROOM",gameId:GAME,roomCode,name,characterStyle})}
function handle(m){if(m.type==="CONNECTED")myId=m.playerId;if(m.type==="ROOM_CREATED"||m.type==="ROOM_JOINED"){isHost=m.type==="ROOM_CREATED";$("entry").classList.add("hide");$("game").classList.remove("hide");$("roomCode").textContent=m.roomCode}if(m.type==="AVALON_STATE"){const nextKey=`${m.state.phase}:${m.state.quest}:${m.state.leaderId}`;if(window.turnKey!==nextKey){selected.clear();window.turnKey=nextKey}state=m.state;render()}if(m.type==="AVALON_ROLE"){roleInfo=m.info;renderSecret()}if(m.type==="AVALON_NOTICE")notice(m.message);if(m.type==="AVALON_REVEAL")rolesReveal=m.roles;if(m.type==="ROOM_FULL")status("이 방은 최대 8명입니다. 새 방을 만들어 주세요.");else if(m.type==="ROOM_NOT_FOUND")status("초대 코드에 해당하는 방을 찾을 수 없습니다.");else if(m.type==="ERROR"){if(state)notice(m.message||"요청을 처리할 수 없습니다.");else status(m.message||"요청을 처리할 수 없습니다.")}}
function status(t){$("entryStatus").textContent=t}function notice(t){$("notice").textContent=t;$("notice").classList.remove("hide")}
const phaseNames={lobby:"대기실",team:"원정대 구성",proposalVote:"원정대 찬반 투표",questVote:"임무 수행",assassination:"멀린 암살",ended:"게임 종료"};
const ROLE_LABELS={Merlin:"멀린",Percival:"퍼시벌",Assassin:"암살자",Morgana:"모르가나",Mordred:"모드레드",Oberon:"오베론","Loyal Servant":"충성스러운 신하","Minion of Mordred":"모드레드의 하수인"};
function formatRoleList(roles){const counts={};for(const role of roles||[])counts[role]=(counts[role]||0)+1;return Object.entries(counts).map(([role,count])=>`${ROLE_LABELS[role]||role}${count>1?` ×${count}`:""}`).join(", ")}
function renderLobbySetup(){const guide=$("setupGuide"),summary=$("roleComposition"),count=state.players.length;guide.classList.toggle("custom",!!state.settingsCustomized);if(count<5)guide.textContent=`현재 ${count}명입니다. 5명이 모이면 인원수에 맞는 추천 역할 구성이 자동 적용됩니다.`;else if(state.settingsCustomized)guide.textContent="방장이 추천 역할 구성을 수정했습니다. 체크를 끄면 그 역할이 일반 신하 또는 하수인으로 교체됩니다.";else guide.textContent=`${count}인 추천 역할 구성이 자동 적용되었습니다. 그대로 시작해도 균형 있게 플레이할 수 있습니다.`;summary.innerHTML=count<5?'<div class="roleSide">5명 이상 모이면 실제 역할 구성을 미리 보여드립니다.</div>':`<div class="roleSide good"><b>선의 세력 ${state.roleSummary.good.length}명</b><br>${esc(formatRoleList(state.roleSummary.good))}</div><div class="roleSide evil"><b>악의 세력 ${state.roleSummary.evil.length}명</b><br>${esc(formatRoleList(state.roleSummary.evil))}</div>`;$("resetRecommended").disabled=!isHost||count<5;document.querySelectorAll("[data-role]").forEach(control=>{control.disabled=!isHost||count<5;control.checked=!!state.settings[control.dataset.role]})}
function render(){if(!state)return;$("phaseText").textContent=phaseNames[state.phase]||state.phase;$("count").textContent=`${state.players.length}/8`;$("lobby").classList.toggle("hide",state.phase!=="lobby");$("start").disabled=!isHost||state.players.length<5||state.players.length>8;if(state.phase==="lobby")renderLobbySetup();$("missions").innerHTML=[0,1,2,3,4].map((_,i)=>`<div class="mission ${state.results[i]?.success===true?'ok':state.results[i]?.success===false?'fail':''}">${i+1}</div>`).join("");$("players").innerHTML=state.players.map(p=>`<button class="player ${p.id===myId?'me':''} ${p.id===state.leaderId?'leader':''} ${selected.has(p.id)?'selected':''}" data-player="${p.id}">${esc(p.name)}${p.id===state.hostId?' · 방장':''}</button>`).join("");document.querySelectorAll("[data-player]").forEach(b=>b.onclick=()=>choose(b.dataset.player));renderAction()}
const ROLE_CARDS={Merlin:{name:"멀린",emblem:"✧",ability:"모드레드를 제외한 악의 세력이 누구인지 압니다. 알고 있다는 티를 내면 암살당할 수 있습니다.",goal:"임무를 3회 성공시키고, 마지막 암살에서 정체를 들키지 마세요."},Percival:{name:"퍼시벌",emblem:"♜",ability:"멀린과 모르가나 후보를 보지만 어느 쪽이 진짜 멀린인지는 알 수 없습니다.",goal:"진짜 멀린을 추리해 보호하고, 대신 암살 의심을 받도록 행동하세요."},Assassin:{name:"암살자",emblem:"⚔",ability:"악의 동료를 알며, 선이 임무 3회에 성공하면 멀린으로 의심되는 한 명을 지목합니다.",goal:"임무를 3회 실패시키거나, 마지막에 멀린을 정확히 암살하세요."},Morgana:{name:"모르가나",emblem:"☾",ability:"퍼시벌에게 진짜 멀린과 함께 멀린 후보로 보입니다.",goal:"퍼시벌을 속이고 임무를 3회 실패시키세요. 멀린 추리도 도우세요."},Mordred:{name:"모드레드",emblem:"♛",ability:"악의 동료는 당신을 알지만 멀린의 시야에는 보이지 않습니다.",goal:"멀린이 당신을 선으로 믿게 만들고 임무를 3회 실패시키세요."},Oberon:{name:"오베론",emblem:"◈",ability:"악의 세력이지만 다른 악의 동료를 모르며, 동료들도 당신을 알지 못합니다.",goal:"혼자 악의 동료를 추리하면서 임무를 3회 실패시키세요."},"Loyal Servant":{name:"충성스러운 신하",emblem:"♢",ability:"특별히 보이는 정보는 없습니다. 토론·원정대 구성·투표 기록으로 악을 찾아야 합니다.",goal:"악의 세력을 원정대에서 제외해 임무를 3회 성공시키세요."},"Minion of Mordred":{name:"모드레드의 하수인",emblem:"♠",ability:"오베론을 제외한 악의 동료를 압니다. 정체가 드러나지 않도록 협력하세요.",goal:"임무를 3회 실패시키고 암살자가 멀린을 찾도록 도우세요."}};
function roleKnowledgeText(){if(roleInfo.visible.length)return`내가 아는 인물 · ${roleInfo.visible.join(", ")}`;if(roleInfo.role==="Oberon")return"내가 아는 인물 · 없음 — 오베론은 악의 동료를 볼 수 없습니다.";if(roleInfo.role==="Loyal Servant")return"내가 아는 인물 · 없음 — 행동과 투표로 추리하세요.";return"내가 아는 인물 · 별도로 보이는 인물이 없습니다."}
function renderSecret(){if(!roleInfo)return;const card=ROLE_CARDS[roleInfo.role]||{name:roleInfo.role,emblem:"?",ability:"",goal:""},identity=$("identityCard");$("secret").classList.remove("hide");identity.classList.toggle("evil",roleInfo.alignment==="evil");identity.dataset.characterStyle=roleInfo.characterStyle||"random";identity.dataset.cardVariant=String(roleInfo.cardVariant||1);hideIdentityCard();$("faction").textContent=roleInfo.alignment==="evil"?"악의 세력":"선의 세력";$("emblem").textContent=card.emblem;$("role").textContent=card.name;$("ability").textContent=`능력 · ${card.ability}`;$("goal").textContent=`승리 목표 · ${card.goal}`;$("vision").textContent=roleKnowledgeText()}
function phaseGuide(){const questNo=state.quest+1,successes=state.results.filter(result=>result.success).length,failures=state.results.filter(result=>!result.success).length,hardQuest=state.players.length>=7&&state.quest===3,questRule=hardQuest?"이번 4번째 임무는 실패 카드가 2장 이상 나와야 실패합니다.":"이번 임무는 실패 카드가 1장만 나와도 실패합니다.";if(state.phase==="team")return state.leaderId===myId?`<b>당신이 ${questNo}번째 원정대장입니다.</b> 원정대원 ${state.teamSize}명을 선택한 뒤 ‘선택 완료’를 누르세요.<span class="rule">현재 임무 성적: 성공 ${successes}회 · 실패 ${failures}회. ${questRule}</span><span class="dangerRule">원정대 제안이 5번 연속 부결되면 즉시 악의 세력이 승리합니다. 현재 연속 부결: ${state.rejects}회.</span>`:`<b>${esc(state.players.find(player=>player.id===state.leaderId)?.name||"원정대장")}이 ${questNo}번째 원정대원을 고르고 있습니다.</b> 선택이 끝나면 모든 사람이 찬반 투표를 합니다.<span class="rule">원정대에는 정확히 ${state.teamSize}명이 들어가야 합니다. ${questRule}</span><span class="dangerRule">연속 부결 ${state.rejects}회 · 5회가 되면 악의 세력이 즉시 승리합니다.</span>`;if(state.phase==="proposalVote")return `<b>제안된 원정대를 승인할지 결정하세요.</b> 찬성이 전체 인원의 절반을 초과하면 원정대가 임무를 수행합니다. 절반 이하라면 부결되고 다음 사람이 원정대장이 됩니다.<span class="rule">제안된 원정대: ${esc(names(state.selectedTeam))}</span><span class="dangerRule">이번 제안까지 부결되어 연속 부결이 5회가 되면 악의 세력이 즉시 승리합니다. 현재 ${state.rejects}회.</span>`;if(state.phase==="questVote")return state.selectedTeam.includes(myId)?`<b>당신은 이번 임무의 원정대원입니다.</b> 카드는 다른 사람에게 공개되지 않고 실패 카드 수만 공개됩니다.${roleInfo?.alignment==="evil"?" 악의 세력은 성공 또는 실패를 선택할 수 있습니다.":" 선의 세력은 성공 카드만 제출합니다."}<span class="rule">${questRule}</span><span class="dangerRule">임무 실패가 총 3회가 되면 악의 세력이 즉시 승리합니다.</span>`:`<b>원정대원만 비밀 임무 카드를 제출하고 있습니다.</b> 잠시 기다리세요. 결과에는 누가 어떤 카드를 냈는지 공개되지 않고, 실패 카드 수만 표시됩니다.<span class="rule">${questRule}</span><span class="dangerRule">임무 실패가 총 3회가 되면 악의 세력이 즉시 승리합니다.</span>`;if(state.phase==="assassination")return roleInfo?.role==="Assassin"?`<b>선의 세력이 임무 3회에 성공했습니다.</b> 마지막 기회입니다. 멀린이라고 생각하는 한 명을 선택해 암살하세요.<span class="dangerRule">정확히 멀린을 암살하면 악의 세력이 역전 승리하고, 틀리면 선의 세력이 승리합니다.</span>`:`<b>선의 세력이 임무 3회에 성공했지만, 아직 끝나지 않았습니다.</b> 암살자가 멀린을 맞히면 악의 세력이 역전 승리합니다.<span class="rule">암살자가 멀린을 틀리게 지목하면 선의 세력이 최종 승리합니다.</span>`;return ""}
function renderAction(){const box=$("action"),title=$("actionTitle"),body=$("actionBody");box.classList.remove("hide");body.innerHTML="";if(state.phase==="lobby"){box.classList.add("hide");return}if(state.phase==="team"){title.textContent=state.leaderId===myId?`원정대 ${state.teamSize}명 선택`:`원정대장이 ${state.teamSize}명을 고르는 중`;body.innerHTML=`<div class="roundGuide">${phaseGuide()}</div>`;if(state.leaderId===myId)body.innerHTML+='<button id="propose">선택 완료</button>'}else if(state.phase==="proposalVote"){title.textContent=`원정대: ${names(state.selectedTeam)}`;body.innerHTML=`<div class="roundGuide">${phaseGuide()}</div><div class="row"><button id="approve">찬성</button><button id="reject" class="danger">반대</button></div>`}else if(state.phase==="questVote"){title.textContent=state.selectedTeam.includes(myId)?"임무 카드를 제출하세요":"원정대가 임무를 수행 중";body.innerHTML=`<div class="roundGuide">${phaseGuide()}</div>`;if(state.selectedTeam.includes(myId))body.innerHTML+=`<div class="row"><button id="success">성공</button>${roleInfo?.alignment==='evil'?'<button id="failure" class="danger">실패</button>':''}</div>`}else if(state.phase==="assassination"){const isAssassin=roleInfo?.role==="Assassin";title.textContent=isAssassin?"멀린으로 의심되는 사람을 선택하세요":"암살자가 멀린을 찾는 중";body.innerHTML=`<div class="roundGuide">${phaseGuide()}</div>`;if(isAssassin)body.innerHTML+='<button id="kill" class="danger">선택한 인물 암살</button>'}else if(state.phase==="ended"){title.textContent=state.winner==="good"?"선의 세력 승리":"악의 세력 승리";body.innerHTML=`<div class="roundGuide"><b>최종 결과가 확정되었습니다.</b> 역할을 공개하고 게임의 흐름을 함께 확인해 보세요.</div>`+rolesReveal.map(role=>`<div>${esc(role.name)} — ${esc(ROLE_LABELS[role.role]||role.role)}</div>`).join("")+'<button onclick="location.reload()" style="margin-top:12px">새 게임</button>'}bindActions()}
function bindActions(){const on=(id,fn)=>{const el=$(id);if(el)el.onclick=fn};on("propose",()=>send({type:"AVALON_ACTION",action:"PROPOSE",team:[...selected]}));on("approve",()=>send({type:"AVALON_ACTION",action:"PROPOSAL_VOTE",approve:true}));on("reject",()=>send({type:"AVALON_ACTION",action:"PROPOSAL_VOTE",approve:false}));on("success",()=>send({type:"AVALON_ACTION",action:"QUEST_VOTE",success:true}));on("failure",()=>send({type:"AVALON_ACTION",action:"QUEST_VOTE",success:false}));on("kill",()=>{if(selected.size!==1)return notice("한 명을 선택하세요.");send({type:"AVALON_ACTION",action:"ASSASSINATE",targetId:[...selected][0]})})}
function choose(id){if(state.phase==="team"&&state.leaderId===myId){selected.has(id)?selected.delete(id):selected.size<state.teamSize&&selected.add(id);render()}else if(state.phase==="assassination"&&roleInfo?.role==="Assassin"){selected=new Set([id]);render()}}
function names(ids){return ids.map(id=>state.players.find(p=>p.id===id)?.name).filter(Boolean).join(", ")}function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
$("create").onclick=()=>connect("create");$("join").onclick=()=>connect("join");$("start").onclick=()=>send({type:"AVALON_ACTION",action:"START"});$("resetRecommended").onclick=()=>send({type:"AVALON_ACTION",action:"RESET_RECOMMENDED"});
document.querySelectorAll("[data-role]").forEach(control=>control.onchange=()=>{const evilRoles=["morgana","mordred","oberon"],evilLimit=state.players.length<=6?1:2,selectedEvil=[...document.querySelectorAll("[data-role]")].filter(item=>evilRoles.includes(item.dataset.role)&&item.checked);if(evilRoles.includes(control.dataset.role)&&control.checked&&selectedEvil.length>evilLimit){control.checked=false;notice(`${state.players.length}인 게임에서는 암살자 외 특수 악 역할을 ${evilLimit}개까지만 넣을 수 있습니다.`);return}send({type:"AVALON_ACTION",action:"SETTINGS",settings:Object.fromEntries([...document.querySelectorAll("[data-role]")].map(item=>[item.dataset.role,item.checked]))})});
function showIdentityCard(){const card=$("identityCard");card.classList.add("revealed");card.setAttribute("aria-expanded","true");$("cardHint").textContent="손을 떼면 카드가 즉시 덮입니다"}
function hideIdentityCard(){const card=$("identityCard");card.classList.remove("revealed");card.setAttribute("aria-expanded","false");$("cardHint").textContent="카드를 누르고 있는 동안만 정체가 보입니다"}
const identityCard=$("identityCard");
identityCard.addEventListener("pointerdown",event=>{event.preventDefault();identityCard.setPointerCapture?.(event.pointerId);showIdentityCard()});
for(const eventName of ["pointerup","pointercancel","lostpointercapture","pointerleave"])identityCard.addEventListener(eventName,hideIdentityCard);
identityCard.addEventListener("contextmenu",event=>event.preventDefault());
identityCard.addEventListener("keydown",event=>{if(event.key===" "||event.key==="Enter"){event.preventDefault();showIdentityCard()}});
identityCard.addEventListener("keyup",event=>{if(event.key===" "||event.key==="Enter")hideIdentityCard()});
addEventListener("blur",hideIdentityCard);addEventListener("keydown",event=>{if(event.key==="Escape")hideIdentityCard()});
const AVALON_MUSIC={lobby:{src:"../../assets/sound/avalon-lobby.mp3",label:"대기실",loop:true},council:{src:"../../assets/sound/avalon-council.mp3",label:"원정대 회의",loop:true},mission:{src:"../../assets/sound/avalon-mission.mp3",label:"임무 수행",loop:true},goodVictory:{src:"../../assets/sound/avalon-good-victory.mp3",label:"선의 승리",loop:false},evilVictory:{src:"../../assets/sound/avalon-evil-victory.mp3",label:"악의 승리",loop:false}};
const bgm=$("bgm"),musicControl=$("musicControl"),musicMuteBtn=$("musicMuteBtn"),musicTrack=$("musicTrack"),musicSegments=[...document.querySelectorAll("[data-music-level]")];
let musicLevel=Math.max(1,Math.min(5,Number(localStorage.getItem("avalonMusicVolumeLevel"))||3)),musicMuted=localStorage.getItem("avalonMusicMuted")==="1",musicUnlocked=false,currentMusicKey="",musicTransition=0;
document.querySelector(".brand").insertAdjacentElement("afterend",musicControl);
function wantedMusicKey(){if(!state||state.phase==="lobby")return"lobby";if(state.phase==="team"||state.phase==="proposalVote")return"council";if(state.phase==="questVote"||state.phase==="assassination")return"mission";if(state.phase==="ended")return state.winner==="good"?"goodVictory":"evilVictory";return"lobby"}
function updateMusicControl(){musicSegments.forEach(segment=>{const level=Number(segment.dataset.musicLevel);segment.className="music-segment";if(level<=musicLevel)segment.classList.add(`active-${musicLevel}`)});musicMuteBtn.classList.toggle("active",musicMuted);musicMuteBtn.textContent=musicMuted?"UNMUTE":"MUTE";musicMuteBtn.setAttribute("aria-label",musicMuted?"배경음악 켜기":"배경음악 음소거");musicTrack.textContent=AVALON_MUSIC[wantedMusicKey()]?.label||"배경음악";bgm.muted=musicMuted;bgm.volume=musicLevel/5}
function fadeMusic(target,duration,token,done){const start=bgm.volume,started=performance.now();function step(now){if(token!==musicTransition)return;const ratio=Math.min(1,(now-started)/duration);bgm.volume=start+(target-start)*ratio;if(ratio<1)requestAnimationFrame(step);else done?.()}requestAnimationFrame(step)}
function syncBackgroundMusic(){const key=wantedMusicKey(),track=AVALON_MUSIC[key];musicTrack.textContent=track.label;if(key===currentMusicKey){bgm.loop=track.loop;if(musicUnlocked&&!musicMuted&&bgm.paused&&track.loop)bgm.play().catch(()=>{});return}currentMusicKey=key;const token=++musicTransition,change=()=>{if(token!==musicTransition)return;bgm.src=track.src;bgm.loop=track.loop;bgm.currentTime=0;bgm.volume=0;if(!musicUnlocked||musicMuted){updateMusicControl();return}bgm.play().then(()=>fadeMusic(musicLevel/5,350,token)).catch(()=>{})};if(!bgm.src||bgm.paused)change();else fadeMusic(0,250,token,()=>{bgm.pause();change()})}
function unlockBackgroundMusic(){musicUnlocked=true;syncBackgroundMusic();if(!musicMuted)bgm.play().catch(()=>{})}
function setMusicVolume(level){musicLevel=Math.max(1,Math.min(5,Number(level)||1));musicMuted=false;localStorage.setItem("avalonMusicVolumeLevel",String(musicLevel));localStorage.setItem("avalonMusicMuted","0");updateMusicControl();unlockBackgroundMusic()}
function toggleMusicMute(){unlockBackgroundMusic();musicMuted=!musicMuted;localStorage.setItem("avalonMusicMuted",musicMuted?"1":"0");updateMusicControl();if(musicMuted)bgm.pause();else{syncBackgroundMusic();bgm.play().catch(()=>{})}}
musicSegments.forEach(segment=>segment.addEventListener("click",()=>setMusicVolume(segment.dataset.musicLevel)));musicMuteBtn.addEventListener("click",toggleMusicMute);
new MutationObserver(syncBackgroundMusic).observe($("phaseText"),{childList:true,characterData:true,subtree:true});
for(const id of ["create","join"])$(id).addEventListener("pointerdown",unlockBackgroundMusic,{once:true});
updateMusicControl();syncBackgroundMusic();
</script></body></html>
