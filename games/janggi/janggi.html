<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장기</title>
<style>
:root{--bg:#090c12;--panel:#111722;--gold:#c6aa55;--gold2:#f0d77c;--red:#b9362f;--blue:#245d9b;--text:#eee6d2;--muted:#93a0b1;--wood:#d5a65c;--line:#3f2412}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Malgun Gothic",sans-serif;background:#080b10;color:var(--text)}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14px;background:linear-gradient(rgba(5,8,12,.46),rgba(5,8,12,.62)),url('../../assets/images/mainbg.png') center/cover fixed}
button,input,select{font:inherit}.hidden{display:none!important}
.shell{width:min(1100px,100%);background:linear-gradient(rgba(18,25,37,.88),rgba(8,13,20,.92)),url('../../assets/images/mainbg2.png') center/cover;border:2px solid #6b5520;box-shadow:0 20px 70px #000;padding:20px;min-height:min(760px,calc(100vh - 28px))}
.title{text-align:center;color:var(--gold2);font:700 clamp(28px,5vw,44px) Georgia,serif;letter-spacing:4px;margin:4px 0 5px}.sub{text-align:center;color:#8d7a45;font-size:13px;letter-spacing:2px;margin-bottom:18px}
.status{text-align:center;color:var(--muted);min-height:24px;margin-bottom:12px}.status.ok{color:#75d19a}.status.err{color:#e27c73}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:700px;margin:auto}.tab,.btn{border:1px solid #6b5520;background:linear-gradient(#182130,#0c1119);color:var(--gold2);padding:10px 14px;cursor:pointer;font-weight:700}.tab.active,.btn.primary{background:linear-gradient(#ecd579,#a68835);color:#181207;border-color:#f1dc86}.btn.danger{background:#351716;color:#f4c6c0;border-color:#74352e}.btn:disabled{opacity:.4;cursor:not-allowed}
.panel{max-width:700px;margin:12px auto;padding:16px;border:1px solid rgba(198,170,85,.3);background:rgba(2,5,9,.58)}
.roomcode{font:700 40px Consolas,monospace;letter-spacing:12px;text-align:center;color:var(--gold2);background:#05070b;border:1px solid #6b5520;padding:12px}.row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:10px}.codeinput{width:220px;text-align:center;font:700 28px Consolas,monospace;letter-spacing:8px;background:#05070b;border:1px solid #6b5520;color:var(--gold2);padding:8px}.setup{display:grid;grid-template-columns:180px 1fr;gap:10px;align-items:center;margin-top:14px}.setup label{color:#b8c7da;font-weight:700}.setup select{background:#080c12;color:var(--text);border:1px solid #6b5520;padding:9px}.lobby-guide{max-width:700px;margin:12px auto 0;padding:11px 14px;border:1px solid rgba(198,170,85,.28);background:rgba(2,5,9,.46);color:#d7deea;font-size:13px;line-height:1.6;text-align:center}.lobby-guide strong{color:var(--gold2)}
.music{display:flex;justify-content:center;align-items:center;gap:9px;flex-wrap:wrap;margin-top:14px}.segments{display:flex;gap:4px;padding:4px 6px;border:2px solid #5a3819;background:#160d08}.seg{width:23px;height:19px;border:1px solid #6d451d;background:#27170d;padding:0;cursor:pointer}.seg.on{background:#f0a344;box-shadow:0 0 8px #f0a344}
.gamehead{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;border-bottom:1px solid rgba(198,170,85,.3);padding-bottom:12px}.turnwrap{display:flex;flex-direction:column;align-items:center;gap:6px}.clock{min-width:118px;text-align:center;border:1px solid rgba(198,170,85,.35);background:#05080d;color:#d8e4f2;padding:5px 10px;font:700 20px Consolas,monospace;letter-spacing:1px}.clock.warning{color:#ffd36a;border-color:#b98927}.clock.danger{color:#ff8178;border-color:#a43c35;animation:clockpulse .55s infinite alternate}@keyframes clockpulse{to{box-shadow:0 0 12px rgba(224,120,111,.65)}}.chip{border:1px solid rgba(198,170,85,.28);padding:7px 10px;color:#b7c0cb;background:#090d14;font-size:12px}.turn{min-width:220px;text-align:center;border:1px solid #6b5520;padding:10px;color:var(--gold2);font-weight:800}.right{text-align:right}
.gamebody{display:grid;grid-template-columns:1fr 250px;gap:18px;margin-top:16px;align-items:start}.boardwrap{display:flex;justify-content:center}.board{position:relative;width:min(600px,92vw);aspect-ratio:9/10;background:linear-gradient(rgba(229,180,98,.93),rgba(192,137,66,.96));border:10px ridge #6c3e1c;box-shadow:inset 0 0 25px rgba(65,31,7,.45),0 15px 35px #000}
.gridline{position:absolute;background:var(--line);pointer-events:none}.vline{top:5%;bottom:5%;width:2px}.hline{left:5.55%;right:5.55%;height:2px}.palace-svg{position:absolute;left:5.55%;right:5.57%;top:5%;bottom:5%;width:88.88%;height:90%;z-index:3;pointer-events:none;overflow:visible}.palace-svg line{stroke:var(--line);stroke-width:2;vector-effect:non-scaling-stroke;stroke-linecap:square}.point{position:absolute;width:11.11%;height:10%;transform:translate(-50%,-50%);z-index:5;display:flex;align-items:center;justify-content:center;cursor:pointer}.point.move::after{content:"";width:22%;aspect-ratio:1;border-radius:50%;background:rgba(29,105,179,.78);box-shadow:0 0 0 4px rgba(255,255,255,.35)}.point.capture::after{content:"";position:absolute;width:72%;aspect-ratio:1;border:4px solid #d8352d;border-radius:50%;box-shadow:0 0 12px #d8352d}.piece{width:74%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Batang","Noto Serif KR",serif;font-weight:900;font-size:clamp(20px,4vw,38px);background:radial-gradient(circle at 35% 28%,#f6ddb0,#c98d42 62%,#744118);box-shadow:inset 0 0 0 3px rgba(255,242,199,.45),0 4px 7px rgba(0,0,0,.55);border:3px solid #6a3b18;user-select:none}.piece.cho{color:#114e91}.piece.han{color:#a51f19}.piece.selected{transform:translateY(-4px);box-shadow:0 0 0 5px #ffe16f,0 8px 16px #000}.point.last-from::before,.point.last-to::before{content:"";position:absolute;inset:8%;border-radius:50%;pointer-events:none;z-index:-1}.point.last-from::before{background:rgba(255,226,105,.32);box-shadow:0 0 0 3px rgba(255,226,105,.8),0 0 16px rgba(255,226,105,.55)}.point.last-to::before{background:rgba(255,146,61,.34);box-shadow:0 0 0 4px #ff9a3d,0 0 20px rgba(255,123,35,.78)}.piece.last-moved{animation:lastmove .9s ease-in-out infinite alternate;box-shadow:inset 0 0 0 3px rgba(255,242,199,.45),0 0 0 5px #ffcf5a,0 0 18px rgba(255,151,47,.85)}@keyframes lastmove{to{transform:translateY(-3px);filter:brightness(1.12)}}.piece.check{animation:checkpulse .7s infinite alternate}@keyframes checkpulse{to{box-shadow:0 0 0 6px #e33731,0 0 20px #e33731}}
.side{border:1px solid rgba(198,170,85,.28);background:#080c12;padding:14px}.side h3{margin:0 0 10px;color:var(--gold2);font-family:Georgia,serif}.log{height:150px;overflow:auto;background:#020304;border:2px inset #563414;padding:10px;font:12px Consolas,monospace;color:#9da9b7;line-height:1.7}.chat-title{margin:12px 0 7px;color:var(--gold2);font-weight:700;font-size:13px}.chat-log{height:130px;overflow-y:auto;background:#020304;border:1px solid #563414;padding:8px;font-size:12px;line-height:1.55;color:#d3dbe5;user-select:text}.chat-msg{margin-bottom:5px;overflow-wrap:anywhere}.chat-msg.me{color:#f0d77c}.chat-msg.other{color:#9fc6ee}.chat-row{display:grid;grid-template-columns:1fr auto;gap:6px;margin-top:7px}.chat-input{min-width:0;background:#05070b;border:1px solid #6b5520;color:var(--text);padding:8px;outline:none;user-select:text}.chat-input:focus{border-color:var(--gold2)}.chat-send{margin:0!important;width:auto!important;padding:8px 11px!important}.side .btn{width:100%;margin-top:9px}.notice{margin-top:10px;padding:10px;border:1px solid rgba(198,170,85,.25);color:#c9d1db;font-size:13px;line-height:1.6}.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:99;padding:20px}.modal.show{display:flex}.box{width:min(560px,100%);background:#d8ceb3;color:#261f13;border:3px solid #8c7535;padding:24px;line-height:1.7}.box h2{text-align:center;color:#493b17}.actions{text-align:center;margin-top:15px}
@media(max-width:820px){.shell{padding:12px}.gamebody{grid-template-columns:1fr}.side{max-width:600px;width:100%;margin:auto}.log{height:100px}.chat-log{height:110px}.gamehead{grid-template-columns:1fr}.right{text-align:center}.turn{min-width:0}.setup{grid-template-columns:1fr}.board{width:min(560px,96vw)}}

@media(max-width:620px){
    .music{display:none!important}
}

</style>
</head>
<body>
<audio id="bgm" src="../../assets/sound/janggi.mp3" loop></audio>
<div class="shell">
<section id="lobby">
<h1 class="title">장기</h1><div class="sub">온라인 1대1 대국</div>
<div id="status" class="status">방을 만들거나 입장하세요.</div>
<div class="tabs"><button id="hostTab" class="tab active" onclick="switchMode('host')">방 만들기</button><button id="joinTab" class="tab" onclick="switchMode('join')">방 입장</button></div>
<div id="hostPane" class="panel"><div class="roomcode" id="roomCode">---</div><div class="row"><button class="btn" onclick="copyCode()">방 번호 복사</button><button class="btn" onclick="newRoom()">새 번호</button></div><div class="setup"><label>내 초 차림</label><select id="choFormation">
<option value="HEHE" selected>마상마상 (기본)</option>
<option value="EHEH">상마상마</option>
<option value="HEEH">마상상마</option>
<option value="EHHE">상마마상</option>
</select></div><div class="setup"><label>한 수 제한시간</label><select id="turnTimeLimit">
<option value="15">15초</option>
<option value="30" selected>30초 (기본)</option>
<option value="45">45초</option>
<option value="60">60초</option>
<option value="90">90초</option>
</select></div></div>
<div id="joinPane" class="panel hidden"><div class="row"><input id="joinCode" class="codeinput" maxlength="3" inputmode="numeric" placeholder="3자리" oninput="this.value=this.value.replace(/\D/g,'').slice(0,3)" onkeydown="if(event.key==='Enter')joinRoom()"><button class="btn primary" onclick="joinRoom()">입장</button></div><div class="setup"><label>내 한 차림</label><select id="hanFormation" onchange="sendFormation()">
<option value="HEHE" selected>마상마상 (기본)</option>
<option value="EHEH">상마상마</option>
<option value="HEEH">마상상마</option>
<option value="EHHE">상마마상</option>
</select></div></div>
<div class="lobby-guide"><strong>방장은 초로 선공하고, 손님은 한으로 후공합니다.</strong><br>실력 차이가 있다면 장기를 덜 두는 사람이 방장을 맡아 초의 선공권을 가지세요. 차림은 각자 자기 진영만 직접 선택합니다.</div>
<div class="row"><button id="startBtn" class="btn primary" disabled onclick="startGame()">상대방 대기 중</button><button class="btn" onclick="showRules()">규칙</button></div>
<div class="music"><b>음악</b><button id="mute1" class="btn" onclick="toggleMute()">음소거</button><div class="segments"><button class="seg" onclick="setVolume(1)"></button><button class="seg" onclick="setVolume(2)"></button><button class="seg" onclick="setVolume(3)"></button><button class="seg" onclick="setVolume(4)"></button><button class="seg" onclick="setVolume(5)"></button></div></div>
</section>
<section id="game" class="hidden">
<div class="gamehead"><div><span id="roleChip" class="chip"></span></div><div class="turnwrap"><div id="turnText" class="turn">대기 중</div><div id="turnClock" class="clock">00:30</div></div><div class="right"><span id="connectionChip" class="chip">● 연결됨</span></div></div>
<div class="gamebody"><div class="boardwrap"><div id="board" class="board"></div></div><aside class="side"><h3>대국 상태</h3><div id="notice" class="notice">말을 선택하세요.</div><div id="log" class="log"></div><div class="chat-title">채팅</div><div id="chatLog" class="chat-log"><div class="chat-msg">상대방과 간단한 메시지를 주고받을 수 있습니다.</div></div><div class="chat-row"><input id="chatInput" class="chat-input" maxlength="100" autocomplete="off" placeholder="메시지 입력" onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat()}"><button class="btn chat-send" onclick="sendChat()">보내기</button></div><button class="btn danger" onclick="resign()">기권</button><button id="rematchBtn" class="btn" onclick="requestRematch()">재대국 요청</button><button class="btn" onclick="showRules()">규칙</button><div class="music"><button id="mute2" class="btn" onclick="toggleMute()">음소거</button><div class="segments"><button class="seg" onclick="setVolume(1)"></button><button class="seg" onclick="setVolume(2)"></button><button class="seg" onclick="setVolume(3)"></button><button class="seg" onclick="setVolume(4)"></button><button class="seg" onclick="setVolume(5)"></button></div></div></aside></div>
</section>
</div>
<div id="modal" class="modal" onclick="if(event.target===this)closeModal()"><div class="box"><h2 id="modalTitle"></h2><div id="modalBody"></div><div class="actions"><button class="btn primary" onclick="closeModal()">확인</button></div></div></div>
<script>
"use strict";
const $=id=>document.getElementById(id);let socket=null,myRole=null,connected=false,roomMode='host',roomCode='',selected=null,legalTargets=[],logs=[],chatMessages=[],musicStarted=false,volumeLevel=3,gameOver=false,rematchMine=false,rematchOther=false,guestFormationReady=false,turnTimerId=null,turnDeadline=0,hostCreateAttempts=0,opponentName='';
const savedPlayerName=(localStorage.getItem('classPlayerName')||'').trim();
function getPlayerName(){return savedPlayerName||((myRole==='host')?'초':'한')}
function displayPlayerLabel(side){if(side===mySide())return getPlayerName();if(opponentName)return opponentName;return sideLabel(side)}
const state={pieces:[],turn:'cho',choFormation:'HEHE',hanFormation:'HEHE',timeLimit:30,started:false,winner:null,lastMove:null};
const typeName={king:'왕',guard:'사',rook:'차',horse:'마',elephant:'상',cannon:'포',soldier:'졸'};
window.addEventListener('load',()=>{drawBoardLines();setVolume(3);const sub=document.querySelector('.sub');if(sub&&savedPlayerName)sub.textContent=`${savedPlayerName} · 온라인 1대1 대국`;switchMode('host')});document.addEventListener('pointerdown',startMusic,{once:true});
function drawBoardLines(){const b=$('board');for(let x=0;x<9;x++){let l=document.createElement('div');l.className='gridline vline';l.style.left=`${5.55+x*11.11}%`;b.appendChild(l)}for(let y=0;y<10;y++){let l=document.createElement('div');l.className='gridline hline';l.style.top=`${5+y*10}%`;b.appendChild(l)}const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('class','palace-svg');svg.setAttribute('viewBox','0 0 8 9');svg.setAttribute('preserveAspectRatio','none');[[3,0,5,2],[5,0,3,2],[3,7,5,9],[5,7,3,9]].forEach(([x1,y1,x2,y2])=>{const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',x1);line.setAttribute('y1',y1);line.setAttribute('x2',x2);line.setAttribute('y2',y2);svg.appendChild(line)});b.appendChild(svg)}
function switchMode(m){if(connected)return;resetNet();guestFormationReady=false;roomMode=m;myRole=m==='host'?'host':'guest';$('hostTab').classList.toggle('active',m==='host');$('joinTab').classList.toggle('active',m==='join');$('hostPane').classList.toggle('hidden',m!=='host');$('joinPane').classList.toggle('hidden',m!=='join');$('startBtn').disabled=true;$('startBtn').textContent=m==='host'?'상대방 대기 중':'방장 시작 대기';if(m==='host')createHost();else setStatus('3자리 방 번호를 입력하세요.','')}
const GAME_ID='janggi',GAME_SERVER_URL='wss://classroom-game-hub.onrender.com';
function resetNet(){connected=false;try{socket&&socket.close()}catch{}socket=null}
function code(){return String(100+Math.floor(Math.random()*900))}
function createHost(){roomCode=code();$('roomCode').textContent=roomCode;setStatus('방 번호 생성 중...','');openSocket('host',roomCode)}
function newRoom(){if(!connected)switchMode('host')}
function joinRoom(){let c=$('joinCode').value.trim();if(c.length!==3)return alert('3자리 방 번호를 입력하세요.');resetNet();myRole='guest';roomCode=c;setStatus(`방 ${c} 연결 중...`,'');openSocket('join',c)}
function openSocket(mode,codeValue){
 resetNet();socket=new WebSocket(GAME_SERVER_URL);
 socket.addEventListener('open',()=>socket.send(JSON.stringify({type:mode==='host'?'CREATE_ROOM':'JOIN_ROOM',gameId:GAME_ID,roomCode:codeValue,name:getPlayerName()})));
 socket.addEventListener('message',e=>{let m;try{m=JSON.parse(e.data)}catch{return}handleServerMessage(m)});
 socket.addEventListener('close',()=>{if(connected)disconnect()});
 socket.addEventListener('error',()=>setStatus('게임 서버에 연결할 수 없습니다.','err'));
}
function handleServerMessage(m){
 if(!m||!m.type)return;
 if(m.type==='ROOM_CREATED'){roomCode=m.roomCode;hostCreateAttempts=0;$('roomCode').textContent=roomCode;setStatus(`방 ${roomCode} — 상대방 접속 대기 중...`,'');return}
 if(m.type==='ROOM_EXISTS'){if(myRole==='host'&&hostCreateAttempts<10){hostCreateAttempts++;createHost()}else setStatus('빈 방 번호를 만들지 못했습니다.','err');return}
 if(m.type==='PLAYER_JOINED'&&myRole==='host'){connected=true;setStatus('상대방과 연결되었습니다.','ok');$('startBtn').disabled=true;$('startBtn').textContent='상대방 차림 확인 중';send({type:'hello',formation:$('choFormation').value,name:getPlayerName()});return}
 if(m.type==='ROOM_JOINED'&&myRole==='guest'){connected=true;setStatus('상대방과 연결되었습니다.','ok');$('startBtn').disabled=true;$('startBtn').textContent='방장 시작 대기';send({type:'hello',formation:$('hanFormation').value,name:getPlayerName()});return}
 if(m.type==='ROOM_NOT_FOUND'){setStatus('방을 찾지 못했습니다.','err');return}
 if(m.type==='ROOM_FULL'){setStatus('방이 가득 찼습니다.','err');return}
 if(m.type==='GAME_MESSAGE'){handlePacket(m.payload);return}
 if(m.type==='PLAYER_LEFT'||m.type==='ROOM_CLOSED'){disconnect()}
}
function disconnect(){connected=false;stopTurnTimer();$('connectionChip').textContent='● 연결 끊김';showModal('연결 종료','상대방과의 연결이 끊어졌습니다. 페이지를 새로고침해 주세요.')}
function send(p){try{if(!socket||socket.readyState!==WebSocket.OPEN)return false;socket.send(JSON.stringify({type:'GAME_MESSAGE',payload:p}));return true}catch{return false}}
function normalizeChatText(value){return String(value||'').replace(/[\r\n\t]+/g,' ').replace(/\s{2,}/g,' ').trim().slice(0,100)}
function sendChat(){if(!connected)return;const input=$('chatInput'),text=normalizeChatText(input.value);if(!text)return;if(!send({type:'chat',text}))return;chatMessages.push({mine:true,label:displayPlayerLabel(mySide()),text});input.value='';renderChat()}
function receiveChat(value){const text=normalizeChatText(value);if(!text)return;chatMessages.push({mine:false,label:displayPlayerLabel(otherSide()),text});renderChat()}
function renderChat(){const box=$('chatLog');if(!box)return;box.innerHTML=chatMessages.length?chatMessages.slice(-50).map(m=>`<div class="chat-msg ${m.mine?'me':'other'}"><b>${escapeHtml(m.label)}:</b> ${escapeHtml(m.text)}</div>`).join(''):'<div class="chat-msg">아직 메시지가 없습니다.</div>';box.scrollTop=box.scrollHeight}
function validFormation(value){return /^(HEHE|EHEH|HEEH|EHHE)$/.test(value)?value:'HEHE'}
function sendFormation(){if(myRole!=='guest'||!connected)return;send({type:'formation',formation:validFormation($('hanFormation').value)})}
function handlePacket(p){if(!p||!p.type)return;if(p.type==='hello'){opponentName=String(p.name||'').trim().slice(0,12);if(myRole==='host'){state.hanFormation=validFormation(p.formation);guestFormationReady=true;$('startBtn').disabled=false;$('startBtn').textContent='대국 시작';setStatus('상대방과 연결되었습니다. 각자 차림을 선택한 뒤 시작하세요.','ok')}}else if(p.type==='formation'){if(myRole==='host'){state.hanFormation=validFormation(p.formation);guestFormationReady=true;$('startBtn').disabled=false;$('startBtn').textContent='대국 시작'}}else if(p.type==='start'){Object.assign(state,p.state);gameOver=false;launch();resetTurnTimer()}else if(p.type==='move'){Object.assign(state,p.state);selected=null;legalTargets=[];logs=p.logs||logs;gameOver=!!state.winner;if(gameOver)stopTurnTimer();else resetTurnTimer();render()}else if(p.type==='timeout'){state.winner=p.winner;gameOver=true;logs.unshift(`${sideLabel(p.loser)}의 제한시간이 끝났습니다.`);stopTurnTimer();render();showEnd(`${sideLabel(state.winner)} 시간승`)}else if(p.type==='chat'){receiveChat(p.text)}else if(p.type==='resign'){state.winner=mySide();gameOver=true;stopTurnTimer();logs.unshift(`${sideLabel(otherSide())}이 기권했습니다.`);render();showEnd(`${sideLabel(state.winner)} 승리`)}else if(p.type==='rematch'){rematchOther=true;if(rematchMine)startRematch();else showModal('재대국 요청','상대방이 재대국을 요청했습니다. 재대국 버튼을 누르면 시작됩니다.')}}
function startGame(){if(myRole!=='host'||!connected||!guestFormationReady)return;state.choFormation=validFormation($('choFormation').value);state.hanFormation=validFormation(state.hanFormation);state.timeLimit=validTimeLimit($('turnTimeLimit').value);state.pieces=initialPieces(state.choFormation,state.hanFormation);state.turn='cho';state.started=true;state.winner=null;state.lastMove=null;logs=['대국 시작 — 초 선수의 차례입니다.'];send({type:'start',state:clone(state)});launch();resetTurnTimer()}
function initialPieces(choForm,hanForm){let p=[],id=0,add=(side,type,x,y)=>p.push({id:id++,side,type,x,y});const formationTypes=(form)=>{const map={H:'horse',E:'elephant'},f=/^(HEHE|EHEH|HEEH|EHHE)$/.test(form)?form:'HEHE';return [...f].map(v=>map[v])};const makeBack=(form)=>{const f=formationTypes(form);return ['rook',f[0],f[1],'guard',null,'guard',f[2],f[3],'rook']};const hanBack=makeBack(hanForm),choBack=makeBack(choForm);hanBack.forEach((t,x)=>{if(t)add('han',t,x,0)});add('han','king',4,1);add('han','cannon',1,2);add('han','cannon',7,2);[0,2,4,6,8].forEach(x=>add('han','soldier',x,3));choBack.forEach((t,x)=>{if(t)add('cho',t,x,9)});add('cho','king',4,8);add('cho','cannon',1,7);add('cho','cannon',7,7);[0,2,4,6,8].forEach(x=>add('cho','soldier',x,6));return p}
function clone(v){return JSON.parse(JSON.stringify(v))}function mySide(){return myRole==='host'?'cho':'han'}function otherSide(s=mySide()){return s==='cho'?'han':'cho'}function sideLabel(s){return s==='cho'?'초':'한'}function pieceName(p){if(p.type==='soldier')return p.side==='cho'?'졸':'병';return typeName[p.type]}function hasBatchim(word){const ch=String(word).trim().slice(-1);const code=ch.charCodeAt(0);return code>=0xAC00&&code<=0xD7A3&&(code-0xAC00)%28!==0}function subjectParticle(word){return hasBatchim(word)?'이':'가'}function objectParticle(word){return hasBatchim(word)?'을':'를'}
function validTimeLimit(v){const n=Number(v);return [15,30,45,60,90].includes(n)?n:30}
function stopTurnTimer(){if(turnTimerId){clearInterval(turnTimerId);turnTimerId=null}turnDeadline=0}
function resetTurnTimer(){stopTurnTimer();if(gameOver||!state.started)return;state.timeLimit=validTimeLimit(state.timeLimit);turnDeadline=Date.now()+state.timeLimit*1000;updateTurnClock();turnTimerId=setInterval(()=>{updateTurnClock();if(myRole==='host'&&Date.now()>=turnDeadline&&!gameOver)finishByTimeout()},100)}
function updateTurnClock(){const el=$('turnClock');if(!el)return;if(gameOver||!turnDeadline){el.textContent='--:--';el.className='clock';return}const ms=Math.max(0,turnDeadline-Date.now()),sec=Math.ceil(ms/1000);el.textContent=`00:${String(sec).padStart(2,'0')}`;el.className='clock'+(sec<=5?' danger':sec<=10?' warning':'')}
function finishByTimeout(){if(gameOver)return;const loser=state.turn,winner=otherSide(loser);state.winner=winner;gameOver=true;logs.unshift(`${sideLabel(loser)}의 제한시간이 끝났습니다.`);stopTurnTimer();send({type:'timeout',winner,loser});render();showEnd(`${sideLabel(winner)} 시간승`)}
function launch(){$('lobby').classList.add('hidden');$('game').classList.remove('hidden');$('roleChip').textContent=`${getPlayerName()} · ${sideLabel(mySide())} · ${myRole==='host'?'방장':'손님'} · ${state.timeLimit}초`;render();renderChat();setTimeout(()=>{const i=$('chatInput');if(i)i.disabled=!connected},0)}
function render(){document.querySelectorAll('.point').forEach(e=>e.remove());if(state.lastMove){const from=makePoint(state.lastMove.fromX,state.lastMove.fromY);from.classList.add('last-from');$('board').appendChild(from)}state.pieces.forEach(pc=>{let pt=makePoint(pc.x,pc.y);if(state.lastMove&&pc.id===state.lastMove.pieceId&&pc.x===state.lastMove.toX&&pc.y===state.lastMove.toY)pt.classList.add('last-to');let el=document.createElement('div');el.className=`piece ${pc.side}`;el.textContent=pieceText(pc);if(selected===pc.id)el.classList.add('selected');if(state.lastMove&&pc.id===state.lastMove.pieceId)el.classList.add('last-moved');if(pc.type==='king'&&isInCheck(pc.side,state.pieces))el.classList.add('check');el.onclick=e=>{e.stopPropagation();clickPiece(pc)};pt.appendChild(el);$('board').appendChild(pt)});legalTargets.forEach(m=>{let pt=makePoint(m.x,m.y);pt.classList.add(m.capture?'capture':'move');pt.onclick=()=>moveSelected(m.x,m.y);$('board').appendChild(pt)});$('turnText').textContent=gameOver?`${sideLabel(state.winner)} 승리`:state.turn===mySide()?'내 차례':`${sideLabel(state.turn)} 차례`;$('notice').textContent=gameOver?'대국이 종료되었습니다.':state.turn!==mySide()?'상대방의 착수를 기다리세요.':selected!==null?'이동할 위치를 선택하세요.':'움직일 말을 선택하세요.';$('log').innerHTML=logs.slice(0,12).map(x=>`<div>• ${escapeHtml(x)}</div>`).join('')}
function displayCoord(x,y){return mySide()==='han'?{x:8-x,y:9-y}:{x,y}}function makePoint(x,y){const pos=displayCoord(x,y);let d=document.createElement('div');d.className='point';d.style.left=`${5.55+pos.x*11.11}%`;d.style.top=`${5+pos.y*10}%`;return d}function pieceText(p){if(p.type==='king')return p.side==='cho'?'楚':'漢';if(p.type==='soldier')return p.side==='cho'?'卒':'兵';return {guard:'士',rook:'車',horse:'馬',elephant:'象',cannon:'包'}[p.type]}
function clickPiece(pc){if(gameOver||state.turn!==mySide())return;if(pc.side!==mySide()){if(selected!==null){let m=legalTargets.find(m=>m.x===pc.x&&m.y===pc.y);if(m)moveSelected(pc.x,pc.y)}return}selected=selected===pc.id?null:pc.id;legalTargets=selected===null?[]:legalMovesFor(pc,state.pieces,true);playSelect();render()}
function moveSelected(x,y){let pc=state.pieces.find(p=>p.id===selected);if(!pc)return;let m=legalTargets.find(m=>m.x===x&&m.y===y);if(!m)return;const fromX=pc.x,fromY=pc.y;let captured=state.pieces.find(p=>p.x===x&&p.y===y);if(captured)state.pieces=state.pieces.filter(p=>p.id!==captured.id);pc=state.pieces.find(p=>p.id===selected);pc.x=x;pc.y=y;state.lastMove={pieceId:pc.id,side:pc.side,type:pc.type,fromX,fromY,toX:x,toY:y,captured:captured?{side:captured.side,type:captured.type}:null};const moverName=pieceName(pc);if(captured){const capturedName=pieceName(captured);logs.unshift(`${sideLabel(pc.side)} ${moverName}${subjectParticle(moverName)} ${sideLabel(captured.side)} ${capturedName}${objectParticle(capturedName)} 잡았습니다.`)}else{logs.unshift(`${sideLabel(pc.side)} ${moverName}${subjectParticle(moverName)} 이동했습니다.`)}state.turn=otherSide(state.turn);selected=null;legalTargets=[];resetTurnTimer();let check=isInCheck(state.turn,state.pieces);if(check)logs.unshift(`장군! ${sideLabel(state.turn)} 왕이 공격받고 있습니다.`);if(!hasAnyLegalMove(state.turn,state.pieces)){state.winner=otherSide(state.turn);gameOver=true;stopTurnTimer();logs.unshift(check?'외통수입니다.':'움직일 수 있는 수가 없습니다.');sendState();render();showEnd(`${sideLabel(state.winner)} 승리`);return}sendState();playMove(!!captured);render()}
function sendState(){send({type:'move',state:clone(state),logs:clone(logs)})}
function legalMovesFor(pc,pieces,filterCheck){let raw=rawMoves(pc,pieces);if(!filterCheck)return raw;return raw.filter(m=>{let next=clone(pieces),mover=next.find(p=>p.id===pc.id);next=next.filter(p=>!(p.x===m.x&&p.y===m.y&&p.side!==pc.side));mover=next.find(p=>p.id===pc.id);mover.x=m.x;mover.y=m.y;return !isInCheck(pc.side,next)})}
function rawMoves(pc,p){const at=(x,y)=>p.find(q=>q.x===x&&q.y===y),inside=(x,y)=>x>=0&&x<9&&y>=0&&y<10,out=[];const add=(x,y)=>{if(!inside(x,y))return;let q=at(x,y);if(!q||q.side!==pc.side)out.push({x,y,capture:!!q})};
if(pc.type==='rook'||pc.type==='cannon'){const dirs=[[1,0],[-1,0],[0,1],[0,-1]];if(pc.type==='rook'){dirs.forEach(([dx,dy])=>{for(let n=1;;n++){let x=pc.x+dx*n,y=pc.y+dy*n;if(!inside(x,y))break;let q=at(x,y);if(!q)out.push({x,y,capture:false});else{if(q.side!==pc.side)out.push({x,y,capture:true});break}}});palaceLines(pc,p).forEach(m=>out.push(m))}else{dirs.forEach(([dx,dy])=>{let screen=false;for(let n=1;;n++){let x=pc.x+dx*n,y=pc.y+dy*n;if(!inside(x,y))break;let q=at(x,y);if(!screen){if(q){if(q.type==='cannon')break;screen=true}continue}if(!q)out.push({x,y,capture:false});else{if(q.side!==pc.side&&q.type!=='cannon')out.push({x,y,capture:true});break}}});palaceCannon(pc,p).forEach(m=>out.push(m))}}
else if(pc.type==='horse'){[[0,-1,-1,-2],[0,-1,1,-2],[1,0,2,-1],[1,0,2,1],[0,1,1,2],[0,1,-1,2],[-1,0,-2,1],[-1,0,-2,-1]].forEach(([bx,by,dx,dy])=>{if(!at(pc.x+bx,pc.y+by))add(pc.x+dx,pc.y+dy)})}
else if(pc.type==='elephant'){[[0,-1,-1,-2,-2,-3],[0,-1,1,-2,2,-3],[1,0,2,-1,3,-2],[1,0,2,1,3,2],[0,1,1,2,2,3],[0,1,-1,2,-2,3],[-1,0,-2,1,-3,2],[-1,0,-2,-1,-3,-2]].forEach(([b1x,b1y,b2x,b2y,dx,dy])=>{if(!at(pc.x+b1x,pc.y+b1y)&&!at(pc.x+b2x,pc.y+b2y))add(pc.x+dx,pc.y+dy)})}
else if(pc.type==='king'||pc.type==='guard'){palaceNeighbors(pc.x,pc.y,pc.side).forEach(([x,y])=>add(x,y))}
else if(pc.type==='soldier'){let f=pc.side==='cho'?-1:1;add(pc.x,pc.y+f);add(pc.x-1,pc.y);add(pc.x+1,pc.y);palaceForwardDiags(pc.x,pc.y,pc.side).forEach(([x,y])=>add(x,y))}return dedupe(out)}
function dedupe(a){let s=new Set;return a.filter(m=>{let k=m.x+','+m.y;if(s.has(k))return false;s.add(k);return true})}
function inPalace(x,y,side){return x>=3&&x<=5&&(side==='han'?y>=0&&y<=2:y>=7&&y<=9)}
function palaceNeighbors(x,y,side){if(!inPalace(x,y,side))return[];let r=[[x+1,y],[x-1,y],[x,y+1],[x,y-1]].filter(([a,b])=>inPalace(a,b,side));const edges=new Set(['3,0-4,1','4,1-5,0','3,2-4,1','4,1-5,2','3,7-4,8','4,8-5,7','3,9-4,8','4,8-5,9']);[[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([dx,dy])=>{let a=`${x},${y}-${x+dx},${y+dy}`,b=`${x+dx},${y+dy}-${x},${y}`;if(edges.has(a)||edges.has(b))r.push([x+dx,y+dy])});return r}
function palaceForwardDiags(x,y,side){let f=side==='cho'?-1:1,enemy=side==='cho'?'han':'cho';if(!inPalace(x,y,enemy))return[];return palaceNeighbors(x,y,enemy).filter(([nx,ny])=>ny-y===f&&Math.abs(nx-x)===1)}
function palaceLines(pc,p){let out=[],centers=[[4,1],[4,8]];for(const [cx,cy] of centers){if(!inPalace(pc.x,pc.y,cy===1?'han':'cho'))continue;let dx=Math.sign(cx-pc.x),dy=Math.sign(cy-pc.y);if(dx===0||dy===0)continue;for(let dir of [1,-1]){for(let n=1;n<=2;n++){let x=pc.x+dx*dir*n,y=pc.y+dy*dir*n;if(!inPalace(x,y,cy===1?'han':'cho'))break;let q=p.find(z=>z.x===x&&z.y===y);if(!q)out.push({x,y,capture:false});else{if(q.side!==pc.side)out.push({x,y,capture:true});break}}}}return out}
function palaceCannon(pc,p){let out=[];for(let side of ['han','cho']){if(!inPalace(pc.x,pc.y,side))continue;let paths=side==='han'?[[[3,0],[4,1],[5,2]],[[5,0],[4,1],[3,2]]]:[[[3,7],[4,8],[5,9]],[[5,7],[4,8],[3,9]]];paths.forEach(path=>{let i=path.findIndex(([x,y])=>x===pc.x&&y===pc.y);if(i<0)return;for(let dir of [-1,1]){let j=i+dir;if(j<0||j>=3)continue;let screen=p.find(q=>q.x===path[j][0]&&q.y===path[j][1]);if(!screen||screen.type==='cannon')continue;j+=dir;while(j>=0&&j<3){let [x,y]=path[j],q=p.find(z=>z.x===x&&z.y===y);if(!q)out.push({x,y,capture:false});else if(q.side!==pc.side&&q.type!=='cannon')out.push({x,y,capture:true});break}}})}return out}
function isInCheck(side,pieces){let king=pieces.find(p=>p.side===side&&p.type==='king');if(!king)return true;return pieces.filter(p=>p.side!==side).some(e=>rawMoves(e,pieces).some(m=>m.x===king.x&&m.y===king.y))}
function hasAnyLegalMove(side,pieces){return pieces.filter(p=>p.side===side).some(p=>legalMovesFor(p,pieces,true).length)}
function resign(){if(gameOver||!confirm('정말 기권하시겠습니까?'))return;state.winner=otherSide();gameOver=true;stopTurnTimer();send({type:'resign'});logs.unshift(`${sideLabel(mySide())}이 기권했습니다.`);render();showEnd(`${sideLabel(state.winner)} 승리`)}
function requestRematch(){rematchMine=true;send({type:'rematch'});if(rematchOther)startRematch();else showModal('재대국 요청','상대방의 동의를 기다리고 있습니다.')}
function startRematch(){rematchMine=rematchOther=false;closeModal();if(myRole==='host')startGame()}
function showEnd(t){showModal('대국 종료',`<p style="font-size:22px;text-align:center"><b>${t}</b></p><p>재대국 버튼을 누르면 상대방에게 요청을 보냅니다.</p>`)}
function showRules(){showModal('장기 규칙','<ul><li>방장은 초를 맡아 먼저 시작하고, 손님은 한을 맡아 후공합니다.</li><li>차림은 초와 한이 각자 자기 진영의 차림을 직접 선택합니다.</li><li>자기 말은 이동 가능한 자리로만 움직일 수 있고, 상대 말이 있는 자리로 이동하면 그 말을 잡습니다.</li><li>마와 상은 이동 경로의 길목이 다른 말에 막히면 움직일 수 없습니다.</li><li>포는 반드시 다른 말 하나를 넘어야 움직이거나 잡을 수 있으며, 포를 넘거나 포를 잡을 수 없습니다.</li><li>왕과 사는 궁성 안에서 움직이며 궁성의 대각선 길도 이용할 수 있습니다.</li><li>방장이 정한 한 수 제한시간 안에 착수해야 하며, 시간이 끝나면 시간패합니다.</li><li>자기 왕이 장군에 놓이게 되는 수는 둘 수 없습니다.</li><li>상대 왕이 장군을 피할 수 없으면 외통수로 승리합니다.</li></ul>')}
function showModal(t,b){$('modalTitle').textContent=t;$('modalBody').innerHTML=b;$('modal').classList.add('show')}function closeModal(){$('modal').classList.remove('show')}
function setStatus(t,c){$('status').textContent=t;$('status').className='status '+c}async function copyCode(){try{await navigator.clipboard.writeText(roomCode);setStatus(`방 번호 ${roomCode} 복사됨`,'ok')}catch{alert(roomCode)}}
function startMusic(){let a=$('bgm');if(!a||musicStarted)return;a.volume=volumeLevel/5*.8;a.play().then(()=>musicStarted=true).catch(()=>{})}function setVolume(n){volumeLevel=n;let a=$('bgm');a.muted=false;a.volume=n/5*.8;document.querySelectorAll('.seg').forEach((e,i)=>e.classList.toggle('on',i%5<n));['mute1','mute2'].forEach(id=>{let b=$(id);if(b)b.textContent='음소거'});startMusic()}function toggleMute(){let a=$('bgm');startMusic();a.muted=!a.muted;['mute1','mute2'].forEach(id=>{let b=$(id);if(b)b.textContent=a.muted?'음소거 해제':'음소거'})}
let ac=null;function audio(){if(!ac){let C=window.AudioContext||window.webkitAudioContext;if(C)ac=new C()}if(ac&&ac.state==='suspended')ac.resume();return ac}function tone(f,d,v=.04,delay=0){let c=audio();if(!c)return;let o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.0001,c.currentTime+delay);g.gain.exponentialRampToValueAtTime(v,c.currentTime+delay+.01);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+delay+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+d+.02)}function playSelect(){tone(760,.13,.035);tone(1140,.1,.018,.02)}function playMove(c){tone(c?240:420,.12,c?.07:.04);if(c)tone(160,.18,.05,.04)}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
