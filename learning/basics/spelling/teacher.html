<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#24150c">
    <title>한글 맞춤법 · 교사용 순위판</title>
    <link rel="stylesheet" href="../../../assets/network/multiplayer-lobby.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="teacher.css">
    <script src="../../../assets/network/game-network.js" defer></script>
    <script src="../../../assets/network/multiplayer-lobby.js" defer></script>
    <script src="questions.js" defer></script>
    <script src="questions-extra.js" defer></script>
    <script src="question-deck.js" defer></script>
    <script src="../../../assets/sound/music-control.js" defer></script>
    <script src="teacher.js" defer></script>
</head>
<body>
    <audio id="bgm" src="/learning/basics/spelling/assets/sound/bgm.mp3" loop preload="auto"></audio>
    <div class="page-shell teacher-shell">
        <header class="topbar">
            <div class="topbar-links">
                <a class="back-link" href="index.html">← 학생 화면</a>
                <a class="back-link" href="../../../index.html">메인</a>
            </div>
        </header>

        <main>
            <div class="title-block">
                <p class="eyebrow">TEACHER RANKING BOARD</p>
                <h1>한글 맞춤법</h1>
                <p class="player-greeting">학급 단체전 · 교사용 순위판</p>
            </div>

            <section id="missingScreen" class="hidden"></section>
            <section id="lobbyScreen" class="panel teacher-panel hidden" aria-labelledby="teacherLobbyTitle">
                <p class="mode-kicker">학급 단체전 준비</p>
                <h2 id="teacherLobbyTitle">학생들에게 학급 코드를 알려 주세요</h2>
                <p class="teacher-guide">학생이 모두 참가하면 ‘전원 시작’을 누르세요. 160문제 중 같은 10문제가 동시에 열립니다.</p>
                <span id="savedName" class="hidden">교사</span>

                <div id="hostPane" class="teacher-room-card">
                    <span>학급 코드</span>
                    <strong id="roomCode">----</strong>
                    <button id="copyBtn" class="secondary-button" type="button">코드 복사</button>
                    <p id="hostStatus" class="lobby-status">학급을 만드는 중입니다.</p>
                </div>

                <div class="teacher-counts">
                    <div><span>참가 학생</span><strong id="lobbyStudentCount">0명</strong></div>
                    <div><span>출제 문항</span><strong>10문제</strong></div>
                    <div><span>순위 기준</span><strong>정답 수 · 시간</strong></div>
                </div>

                <div id="lobbyPlayers" class="mp-lobby-players teacher-player-list" aria-label="참가 학생"></div>
                <p id="lobbyGuide" class="lobby-status">학생 참가를 기다리는 중입니다.</p>
                <button id="teacherStartButton" class="primary-button teacher-main-button" type="button" disabled>학생 참가 대기</button>
                <p id="teacherNotice" class="teacher-notice" role="status" aria-live="polite"></p>
            </section>

            <section id="teacherRacePanel" class="panel teacher-panel hidden" aria-labelledby="raceTitle">
                <div class="race-heading">
                    <div>
                        <p class="mode-kicker">학급 코드 <strong id="raceRoomCode">----</strong></p>
                        <h2 id="raceTitle">학급 순위</h2>
                    </div>
                    <span id="racePhaseBadge" class="phase-badge">진행 중</span>
                </div>

                <div class="teacher-counts">
                    <div><span>전체 학생</span><strong id="raceTotalCount">0명</strong></div>
                    <div><span>완료</span><strong id="raceFinishedCount">0명</strong></div>
                    <div><span>풀이 중</span><strong id="racePlayingCount">0명</strong></div>
                </div>

                <ol id="teacherRankingList" class="teacher-ranking-list" aria-label="학급 순위"></ol>
                <p id="emptyRanking" class="empty-ranking">아직 완료한 학생이 없습니다.</p>

                <div class="teacher-actions">
                    <button id="resetRaceButton" class="secondary-button" type="button">새 순위전 준비</button>
                </div>
                <p id="raceNotice" class="teacher-notice" role="status" aria-live="polite"></p>
            </section>
        </main>
    </div>
</body>
</html>
