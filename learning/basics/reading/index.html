<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3efe4">
  <title>혼자 하는 독해</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="student-app">
    <header class="student-header">
      <div><h1>독해 자습</h1></div>
      <a href="/">학습 홈</a>
    </header>
    <main class="student-main">
      <section id="dashboardView">
        <div class="practice-tabs" role="tablist"><button class="tab active" data-track="ko" type="button">국어</button><button class="tab" data-track="en" type="button">영어</button></div>
        <div id="levelList" class="level-list"></div>
      </section>
      <section id="questionView" class="question-view" hidden>
        <div class="question-topline"><button id="backButton" class="text-button" type="button">← 자습 목록</button><span id="questionLevel" class="level-chip"></span></div>
        <div class="progress-copy"><strong id="questionProgress"></strong><span id="questionTopic"></span></div>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
        <article class="reading-sheet"><div id="studentPassage" class="student-passage"></div><h2 id="studentPrompt" class="student-prompt"></h2><div id="studentChoices" class="student-choices"></div><div id="feedback" class="feedback" hidden></div><div class="answer-actions"><span id="answerStatus" role="status"></span><button id="nextButton" class="button primary" type="button" disabled>정답 확인</button></div></article>
      </section>
      <section id="resultView" class="completion-view" hidden><h2 id="resultTitle"></h2><p id="resultCopy"></p><button id="restartButton" class="button primary" type="button">목록</button></section>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
