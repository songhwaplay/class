<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="시대별 클래식 음악을 듣고 감상하는 음악 감상실">
  <title>클래식 음악 감상실</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="background.css">
  <link rel="stylesheet" href="details.css">
  <link rel="stylesheet" href="era-info.css">
</head>
<body>
  <header class="hero">
    <nav><a class="back" href="../../../">← 수업 도구</a><a href="#bank">감상 퀴즈</a><a href="#library">감상곡</a><a href="../korean-music/">국악</a></nav>
    <h1>클래식 음악 감상실</h1>
    <p class="lead">음악을 듣고 시대와 작곡가의 이야기를 만나 보세요.</p>
  </header>

  <main>
    <section class="dashboard" aria-label="나의 학습 현황">
      <div><p class="section-tag">학습 기록</p><h2>학습 현황</h2></div>
      <div class="stat"><b id="solved-count">0</b><span>푼 문제</span></div>
      <div class="stat"><b id="accuracy">—</b><span>정답률</span></div>
      <div class="stat"><b id="wrong-count">0</b><span>복습할 문제</span></div>
    </section>

    <section class="bank" id="bank">
      <div class="section-head">
        <div><p class="section-tag">LISTENING QUIZ</p><h2>오늘의 감상 퀴즈</h2><p>먼저 제시곡을 듣고 귀로 답을 찾아보세요.</p></div>
      </div>
      <div class="quiz-controls">
        <label>시대<select id="quiz-era"><option value="all">전 시대</option><option value="baroque">바로크</option><option value="classical">고전</option><option value="romantic">낭만</option><option value="modern">20세기</option></select></label>
        <label>난이도<select id="quiz-level"><option value="all">섞어서</option><option value="입문">입문</option><option value="기본">기본</option><option value="도전">도전</option></select></label>
        <label>문제 수<select id="quiz-count"><option>5</option><option selected>10</option><option>20</option></select></label>
        <button id="new-quiz" class="primary">새 문제 출제</button>
        <button id="retry-wrong" class="secondary">오답 다시 풀기</button>
      </div>
      <div id="quiz-empty" class="quiz-empty">‘새 문제 출제’를 누르면 퀴즈가 시작됩니다.</div>
      <form id="quiz-box"></form>
      <div class="quiz-actions" hidden><button id="check-answer" class="primary" type="button">채점하기</button><button id="next-quiz" class="secondary" type="button">다른 문제 풀기</button></div>
      <div id="result" aria-live="polite"></div>
    </section>

    <section id="library">
      <div class="section-head">
        <div><p class="section-tag">감상곡</p><h2>클래식 감상곡 30개</h2></div>
      </div>
      <div class="filters" aria-label="시대별 곡 선택">
        <button class="active" data-era="all">전체 30</button><button data-era="baroque">바로크</button><button data-era="classical">고전</button><button data-era="romantic">낭만</button><button data-era="modern">20세기</button>
      </div>
      <div id="era-info" class="era-info" aria-live="polite"></div>
      <div id="playlist" class="playlist"></div>
    </section>
  </main>
  <footer>클래식 음악 감상실</footer>
  <dialog id="detail-dialog" aria-labelledby="detail-title">
    <button class="dialog-close" type="button" aria-label="해설 닫기">×</button>
    <div id="detail-content"></div>
  </dialog>
  <script src="app.js"></script>
</body>
</html>
