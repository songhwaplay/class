<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>명화 감상과 퀴즈 · 송화플레이</title>
    <script src="../../assets/sound/music-control.js" defer></script>
    <style>
        :root {
            --bg-dark: #1a120b;
            --bg-card: #271b12;
            --gold-main: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #8c6d23;
            --wood-frame: #4a2e16;
            --text-main: #f5eedc;
            --text-muted: #baab94;
            --accent-red: #c0392b;
            --accent-blue: #2980b9;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2c1d11 0%, #120b06 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
        }

        /* Nav Header */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(20, 12, 6, 0.9);
            border-bottom: 2px solid var(--gold-dark);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .back-link {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }

        .header-title {
            font-family: "Georgia", serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--gold-main);
            letter-spacing: 1px;
            text-align: center;
        }

        /* Mode Selector Tabs */
        .main-modes {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px 16px 10px;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: linear-gradient(180deg, #3d2918 0%, #24160a 100%);
            border: 2px solid var(--gold-dark);
            color: var(--gold-light);
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn:hover {
            border-color: var(--gold-main);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(212, 175, 55, 0.3);
        }

        .mode-btn.active {
            background: linear-gradient(180deg, var(--gold-main) 0%, var(--gold-dark) 100%);
            color: #120b06;
            border-color: #fff;
        }

        /* Content Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }

        /* Category Filter Sub-bar */
        .category-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cat-btn:hover, .cat-btn.active {
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold-light);
            border-color: var(--gold-main);
        }

        /* Gallery Grid */
        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .art-card {
            background: var(--bg-card);
            border: 8px solid var(--wood-frame);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0,0,0,0.8);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .art-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.25), inset 0 0 5px rgba(0,0,0,0.5);
            border-color: #6b4423;
        }

        .art-thumb-wrap {
            width: 100%;
            height: 220px;
            background: #0d0804;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .art-card:hover .art-thumb {
            transform: scale(1.08);
        }

        .art-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(18, 11, 6, 0.85);
            color: var(--gold-main);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--gold-dark);
        }

        .art-info {
            padding: 14px;
            background: linear-gradient(180deg, #2a1c12 0%, #1c120a 100%);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .art-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 4px;
            line-height: 1.3;
        }

        .art-artist {
            font-size: 0.85rem;
            color: var(--gold-light);
            margin: 0 0 8px;
        }

        .art-desc-preview {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Detail Viewer Modal & Loupe Magnifier */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: var(--bg-card);
            border: 2px solid var(--gold-main);
            border-radius: 12px;
            width: 95%;
            max-width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 24px;
            padding: 24px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }

        @media (max-width: 820px) {
            .modal-box {
                grid-template-columns: 1fr;
                padding: 16px;
            }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold-main);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #fff;
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .modal-close:hover {
            transform: scale(1.1);
        }

        .loupe-container {
            position: relative;
            width: 100%;
            height: 520px;
            background: #0d0804;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
        }

        .loupe-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            padding: 8px;
        }

        /* Glassmorphism Loupe Circle */
        .loupe-lens {
            position: absolute;
            width: 340px;
            height: 340px;
            border: 5px solid var(--gold-main);
            border-radius: 50%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.45);
            pointer-events: none;
            display: none;
            background-repeat: no-repeat;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .docent-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .docent-tag {
            font-size: 0.85rem;
            color: var(--gold-main);
            font-weight: 700;
        }

        .docent-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            margin: 0;
            font-family: "Georgia", serif;
        }

        .docent-meta {
            font-size: 0.95rem;
            color: var(--gold-light);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 10px;
        }

        .docent-section {
            background: rgba(0,0,0,0.25);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--gold-main);
        }

        .docent-section h4 {
            margin: 0 0 6px;
            color: var(--gold-main);
            font-size: 0.95rem;
        }

        .docent-section p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-main);
        }

        /* Quiz Container */
        .quiz-view {
            max-width: 720px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 6px solid var(--wood-frame);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
        }

        .quiz-img-wrap {
            width: 100%;
            max-height: 320px;
            margin: 16px 0 24px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-img {
            max-width: 100%;
            max-height: 320px;
            object-fit: contain;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        @media (max-width: 500px) {
            .quiz-options { grid-template-columns: 1fr; }
        }

        .quiz-opt-btn {
            background: linear-gradient(180deg, #3d2a19 0%, #26180d 100%);
            border: 2px solid var(--gold-dark);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-opt-btn:hover {
            border-color: var(--gold-main);
            background: linear-gradient(180deg, #573c24 0%, #362213 100%);
        }

        .quiz-score-badge {
            display: inline-block;
            background: var(--gold-main);
            color: #120b06;
            padding: 4px 16px;
            border-radius: 14px;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="bgm" src="../../assets/sound/art-appreciation.mp3" autoplay loop preload="auto"></audio>

    <header class="top-bar">
        <a href="../../index.html" class="back-link">← 메인 페이지로</a>
        <div class="header-title">🎨 명화 감상</div>
        <div style="width: 100px;"></div>
    </header>

    <!-- 모드 선택 헤더 -->
    <nav class="main-modes" aria-label="감상 및 퀴즈 모드">
        <button class="mode-btn active" id="btnModeGallery" type="button">
            🏛️ 1. 명화 박물관
        </button>
        <button class="mode-btn" id="btnModeQuiz" type="button">
            ❓ 2. 명화 퀴즈
        </button>
    </nav>

    <main class="container">
        
        <!-- 1. 갤러리 감상 모드 -->
        <section id="viewGallery">
            <div class="category-bar">
                <button class="cat-btn active" data-cat="all">전체 명화 (50점)</button>
                <button class="cat-btn" data-cat="korea">🇰🇷 한국 명화 (12점)</button>
                <button class="cat-btn" data-cat="impression">🌻 인상주의·사실주의 (14점)</button>
                <button class="cat-btn" data-cat="renaissance">🏛️ 르네상스·바로크 (12점)</button>
                <button class="cat-btn" data-cat="surreal">🎨 초현실·현대미술 (12점)</button>
            </div>

            <div class="art-grid" id="artGrid"></div>
        </section>

        <!-- 2. 퀴즈 모드 -->
        <section id="viewQuiz" class="hidden">
            <div class="category-bar" style="margin-bottom: 16px;">
                <button class="cat-btn active" id="btnQuizTypeTitle" type="button">🎨 한글 제목 퀴즈</button>
                <button class="cat-btn" id="btnQuizTypeArtist" type="button">✍️ 화가 맞히기 퀴즈</button>
                <button class="cat-btn" id="btnQuizTypeEng" type="button">🔤 영어 제목 퀴즈</button>
            </div>

            <div class="quiz-view">
                <div class="quiz-score-badge" id="quizScoreBadge">점수: 0점 (1 / 20 문제)</div>
                <h3 id="quizQuestionText" style="margin: 8px 0; font-size: 1.25rem;">이 작품의 제목은 무엇일까요?</h3>
                
                <div class="quiz-img-wrap" id="quizImgWrap">
                    <img id="quizImg" class="quiz-img" src="" alt="명화 퀴즈" onerror="handleImgError(this, '명화 퀴즈', '작품 감상')">
                </div>

                <div class="quiz-options" id="quizOptions"></div>
            </div>
        </section>

    </main>

    <!-- 명화 돋보기 팝업 모달 -->
    <div class="modal-overlay" id="docentModal">
        <div class="modal-box">
            <button class="modal-close" id="btnCloseModal">&times;</button>
            
            <div class="loupe-container" id="loupeContainer">
                <img id="modalImg" class="loupe-img" src="" alt="명화 고화질" onerror="handleImgError(this, modalTitle ? modalTitle.textContent : '', modalMeta ? modalMeta.textContent : '')">
                <div id="loupeLens" class="loupe-lens"></div>
            </div>

            <div class="docent-panel">
                <span class="docent-tag" id="modalTag">르네상스</span>
                <h2 class="docent-title" id="modalTitle">모나리자</h2>
                <div class="docent-meta" id="modalMeta">레오나르도 다 빈치 · 1503년경 제작</div>
                
                <div class="docent-section">
                    <h4>💡 어린이 도슨트 관찰 팁</h4>
                    <p id="modalTip">마우스를 이미지 위에 올리면 돋보기 렌즈로 세밀한 붓터치를 확대해 볼 수 있습니다!</p>
                </div>

                <div class="docent-section">
                    <h4>📜 명화 속에 숨겨진 이야기</h4>
                    <p id="modalStory">이야기 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            // 50점 명화 데이터베이스
            const MASTERPIECES = [
                // 한국 명화 (12점)
                { id: 'k1', cat: 'korea', title: '씨름', eng: 'Ssireum (Korean Wrestling)', artist: '김홍도', year: '18세기 조선', img: '../../assets/images/art/k1.jpg', tip: '엿장수와 구경꾼들의 신발 방향을 유심히 보세요! 엿장수는 씨름판보다 엿을 파는 데 집중하고 있어요.', story: '조선시대 최고의 풍속화가 김홍도의 대표작입니다. 구경꾼들의 표정과 씨름선수들의 들배지기 기술이 생생하게 담겨 있습니다.', dTitle: ["모래판의 승부", "한판 승부", "장터의 씨름꾼"], dArtist: ["이중섭", "겸재 정선", "안견"], dEng: ["Contest in the Sand", "Village Match", "The Wrestlers' Circle"] },
                { id: 'k2', cat: 'korea', title: '서당', eng: 'Seodang (Village School)', artist: '김홍도', year: '18세기 조선', img: '../../assets/images/art/k2.jpg', tip: '훈장님에게 숙제를 못 해서 혼난 훈장이 울고 있어요! 짝꿍 친구들은 킥킥 웃고 있네요.', story: '조선시대 글방인 서당의 정겨운 일상을 담은 그림입니다. 혼나는 아이와 웃는 친구들의 유머러스한 표정이 백미입니다.', dTitle: ["훈장과 아이들", "글 읽는 아이들", "웃음 난 서당"], dArtist: ["박수근", "추사 김정희", "신윤복"], dEng: ["Lessons at Noon", "The Laughing Classroom", "Master and Pupils"] },
                { id: 'k3', cat: 'korea', title: '무동', eng: 'Mudong (Dancing Boy)', artist: '김홍도', year: '18세기 조선', img: '../../assets/images/art/k3.jpg', tip: '피리와 장구 소리에 맞춰 신나게 소매를 휘날리며 춤추는 아이의 발 동작을 보세요!', story: '삼현육각 악대 연주에 맞춰 흥겹게 춤추는 어린아이(무동)의 역동적인 모습이 돋보입니다.', dTitle: ["춤추는 아이", "풍악 속 소년", "어깨 위의 춤"], dArtist: ["겸재 정선", "안견", "신사임당"], dEng: ["Festival Performer", "Boy Above the Music", "Dance of the Village"] },
                { id: 'k4', cat: 'korea', title: '단오풍정', eng: 'Dano Scene', artist: '신윤복', year: '18세기 조선', img: '../../assets/images/art/k4.jpg', tip: '바위 뒤에 몰래 숨어서 훔쳐보는 동자승 두 명을 찾아보세요!', story: '단옷날 시냇가에서 머리를 감고 그네를 타는 여성들의 모습을 다채로운 노란색과 붉은색으로 화려하게 그렸습니다.', dTitle: ["단옷날 풍경", "그네 타는 여인들", "개울가의 단오"], dArtist: ["추사 김정희", "김홍도", "이중섭"], dEng: ["A Day by the Stream", "Women of the Festival", "Swinging in Spring"] },
                { id: 'k5', cat: 'korea', title: '미인도', eng: 'Miindo (Beauty)', artist: '신윤복', year: '19세기 조선', img: '../../assets/images/art/k5.jpg', tip: '여인의 삼작노리개와 섬세하게 정돈된 머리 모양을 관찰해보세요.', story: '조선 시대 미인의 기준과 고운 한복 자태를 표현한 한국 전통 초상화의 걸작입니다.', dTitle: ["고운 여인", "조선의 여인", "비단옷의 여인"], dArtist: ["안견", "신사임당", "박수근"], dEng: ["Lady in Silk", "The Quiet Beauty", "Portrait in Hanbok"] },
                { id: 'k6', cat: 'korea', title: '초충도 (수박과 들쥐)', eng: 'Chochungdo (Plants & Insects)', artist: '신사임당', year: '16세기 조선', img: '../../assets/images/art/k6.jpg', tip: '수박을 갉아먹는 들쥐와 주변의 나비, 패랭이꽃을 돋보기로 찾아보세요.', story: '율곡 이이의 어머니인 신사임당이 풀과 벌레, 화초를 섬세하고 다정하게 그린 한국 풀벌레 그림입니다.', dTitle: ["수박밭의 들쥐", "한밤의 수박밭", "들쥐와 수박"], dArtist: ["김홍도", "이중섭", "겸재 정선"], dEng: ["Mice in the Melon Patch", "Summer Field Visitors", "Watermelon at Night"] },
                { id: 'k7', cat: 'korea', title: '흰 소', eng: 'White Ox', artist: '이중섭', year: '1954년', img: '../../assets/images/art/k7.jpg', tip: '힘찬 붓터치와 흰 소의 역동적인 코김과 눈빛을 관찰하세요.', story: '한국 근대미술의 거장 이중섭이 민족의 기상과 시련을 강렬한 굵은 선으로 표현한 거작입니다.', dTitle: ["하얀 황소", "성난 흰 소", "고집 센 소"], dArtist: ["신윤복", "박수근", "추사 김정희"], dEng: ["The Pale Bull", "Ox in the Wind", "Strength of the Field"] },
                { id: 'k8', cat: 'korea', title: '길 떠나는 가족', eng: 'Family on the Road', artist: '이중섭', year: '1954년', img: '../../assets/images/art/k8.jpg', tip: '소를 끌고 아이들과 아내를 달구지에 태우고 따뜻한 곳으로 떠나는 가족의 서정을 느껴보세요.', story: '헤어져 있던 가족을 그리워하며 다 함께 행복하게 살기를 바란 이중섭 작가의 마음이 담긴 따뜻한 명화입니다.', dTitle: ["길 위의 가족", "떠나는 사람들", "가족의 여행"], dArtist: ["신사임당", "겸재 정선", "안견"], dEng: ["Family on a Journey", "Leaving Home", "The Road Ahead"] },
                { id: 'k9', cat: 'korea', title: '자화상', eng: 'Self-Portrait', artist: '윤두서', year: '18세기 조선', img: '../../assets/images/art/k9.jpg', tip: '눈동자의 강렬한 시선과 수염 한 올 한 올의 섬세한 묘사를 돋보기로 관찰해 보세요.', story: '조선 시대 선비 화가 윤두서가 거울을 보고 그린 자화상으로, 국보 제240호입니다. 서양 자화상 못지않은 사실적 표현이 놀랍습니다.', dTitle: ["선비의 얼굴", "거울 속의 나", "조선의 초상"], dArtist: ["김홍도", "신윤복", "겸재 정선"], dEng: ["The Scholar's Face", "Mirror Portrait", "Portrait of a Gentleman"] },
                { id: 'k10', cat: 'korea', title: '인왕제색도', eng: 'Inwangjesaekdo', artist: '겸재 정선', year: '1751년 (국보)', img: '../../assets/images/art/k10.jpg', tip: '비가 그친 후 묵직한 바위산의 짙은 먹색과 계곡의 안개를 확대해 보세요.', story: '조선 진경산수화의 개척자 정선이 비 온 뒤 서대문 인왕산의 웅장한 바위를 칠해 그린 한국 산수화의 최고 국보입니다.', dTitle: ["비 갠 인왕산", "안개 낀 인왕산", "구름 걷힌 산"], dArtist: ["박수근", "안견", "신윤복"], dEng: ["Mountain After the Storm", "Clouds over Inwang", "Rain-Washed Peaks"] },
                { id: 'k11', cat: 'korea', title: '세한도', eng: 'Sehando', artist: '추사 김정희', year: '1844년 (국보)', img: '../../assets/images/art/k11.jpg', tip: '추운 겨울에도 푸름을 잃지 않는 두 그루의 잣나무와 소나무를 보세요.', story: '유배지에서도 변함없이 의리를 지킨 제자 이상적에게 고마움을 표하며 그리 지조 있는 한국 문인화의 최고 걸작입니다.', dTitle: ["겨울의 집", "소나무와 빈집", "찬 계절의 풍경"], dArtist: ["겸재 정선", "김홍도", "신사임당"], dEng: ["House in Winter", "Pines in the Cold", "The Empty Cottage"] },
                { id: 'k12', cat: 'korea', title: '몽유도원도', eng: 'Dream Journey to Peach Blossom Land', artist: '안견', year: '1447년', img: '../../assets/images/art/k12.jpg', tip: '왼쪽의 현실 세계와 오른쪽의 환상적인 복숭아 꽃밭(도원)의 대비를 감상하세요.', story: '안평대군이 꿈에서 본 무릉도원의 풍경을 화가 안견이 3일 만에 완성한 조선 초기 대표 산수화입니다.', dTitle: ["꿈속의 도원", "복숭아꽃 마을", "구름 너머 낙원"], dArtist: ["추사 김정희", "신윤복", "이중섭"], dEng: ["Beyond the Peach Valley", "Dream of Paradise", "Journey Through Clouds"] },

                // 르네상스 & 바로크 (12점)
                { id: 'r1', cat: 'renaissance', title: '모나리자', eng: 'Mona Lisa', artist: '레오나르도 다 빈치', year: '1503년경', img: '../../assets/images/art/r1.jpg', tip: '모나리자의 눈썹과 은은한 스푸마토 미소를 확대해 보세요.', story: '세계에서 가장 유명한 초상화입니다. 윤곽선을 부드럽게 번지게 하는 스푸마토 기법으로 신비로운 미소를 완성했습니다.', dTitle: ["신비한 미소", "검은 옷의 여인", "미소 짓는 귀부인"], dArtist: ["카라바조", "미켈란젤로", "요하네스 페르메이르"], dEng: ["The Mysterious Smile", "Lady in Dark Dress", "Portrait of a Florentine Woman"] },
                { id: 'r2', cat: 'renaissance', title: '최후의 만찬', eng: 'The Last Supper', artist: '레오나르도 다 빈치', year: '1498년', img: '../../assets/images/art/r2.jpg', tip: '예수님을 중심으로 12제자들이 3명씩 짝을 이뤄 놀라는 손동작을 비교해 보세요.', story: '예수께서 "너희 중 한 사람이 나를 배신할 것이다"라고 말씀하신 순간의 극적인 반응을 담은 르네상스 불후의 명작입니다.', dTitle: ["마지막 식사", "열세 명의 식탁", "저녁의 제자들"], dArtist: ["장 오노레 프라고나르", "산드로 보티첼리", "렘브란트"], dEng: ["The Final Table", "Bread and Silence", "The Disciples at Supper"] },
                { id: 'r3', cat: 'renaissance', title: '아담의 창조 (천지창조)', eng: 'The Creation of Adam', artist: '미켈란젤로', year: '1512년', img: '../../assets/images/art/r3.jpg', tip: '하느님과 아담의 닿을 듯 말 듯 한 손가락 끝을 확대해 보세요.', story: '바티칸 시스티나 성당 천장에 미켈란젤로가 혼자 거꾸로 누워 완성한 인류 위대한 걸작 중 하나입니다.', dTitle: ["손끝의 탄생", "인간의 시작", "하늘과 인간"], dArtist: ["레오나르도 다 빈치", "요하네스 페르메이르", "디에고 벨라스케스"], dEng: ["The Touch of Life", "The First Man", "Hands of Heaven"] },
                { id: 'r4', cat: 'renaissance', title: '비너스의 탄생', eng: 'The Birth of Venus', artist: '산드로 보티첼리', year: '1485년경', img: '../../assets/images/art/r4.jpg', tip: '바람의 신 제피로스가 꽃보라를 불어 넣는 모습과 조개껍데기를 보세요.', story: '바다 거품 속에서 탄생한 사랑과 미의 신 비너스가 해안에 닿는 신화 속 아름다운 장면입니다.', dTitle: ["바다에서 온 여신", "조개 위의 여인", "봄바람의 여신"], dArtist: ["미켈란젤로", "렘브란트", "라파엘로"], dEng: ["Goddess from the Sea", "The Shell Maiden", "Winds of Spring"] },
                { id: 'r5', cat: 'renaissance', title: '진주 귀걸이를 한 소녀', eng: 'Girl with a Pearl Earring', artist: '요하네스 페르메이르', year: '1665년경', img: '../../assets/images/art/r5.jpg', tip: '소녀의 커다란 진주 귀걸이에 반사된 빛과 촉촉한 입술을 관찰하세요.', story: '북유럽의 모나리자라 불리며 빛의 마술사 페르메이르가 그린 오묘한 눈빛의 걸작입니다.', dTitle: ["푸른 터번의 소녀", "진주를 단 소녀", "뒤돌아본 소녀"], dArtist: ["산드로 보티첼리", "디에고 벨라스케스", "카라바조"], dEng: ["The Blue-Turbaned Girl", "A Girl Turning Back", "Portrait with a Pearl"] },
                { id: 'r6', cat: 'renaissance', title: '우유 짜는 하녀', eng: 'The Milkmaid', artist: '요하네스 페르메이르', year: '1658년경', img: '../../assets/images/art/r6.jpg', tip: '토기 항아리에서 따뜻하게 떨어지는 우유의 노란 질감을 보세요.', story: '창가로 들어오는 햇살 아래 차분하게 일하는 하녀의 평화로운 순간을 고요하고 따뜻하게 담았습니다.', dTitle: ["우유 따르는 여인", "부엌의 하녀", "아침을 준비하는 여인"], dArtist: ["렘브란트", "라파엘로", "장 오노레 프라고나르"], dEng: ["Morning in the Kitchen", "The Pouring Maid", "A Quiet Household"] },
                { id: 'r7', cat: 'renaissance', title: '야경 (야간 순찰)', eng: 'The Night Watch', artist: '렘브란트', year: '1642년', img: '../../assets/images/art/r7.jpg', tip: '어둠 속에서 환하게 빛나는 중앙의 어린 소녀와 대장의 장갑을 찾아보세요.', story: '명암 대조의 대가 렘브란트가 시민 민병대의 출동 순간을 생동감 넘치게 연출한 거작입니다.', dTitle: ["밤의 출동", "어둠 속의 순찰대", "대장의 명령"], dArtist: ["디에고 벨라스케스", "카라바조", "레오나르도 다 빈치"], dEng: ["The Captain's Company", "Patrol in Shadow", "The Company Moves Out"] },
                { id: 'r8', cat: 'renaissance', title: '시녀들 (라스 메니냐스)', eng: 'Las Meninas', artist: '디에고 벨라스케스', year: '1656년', img: '../../assets/images/art/r8.jpg', tip: '왼쪽에서 캔버스에 그림을 그리는 화가 벨라스케스 자신과 거울 속 국왕 부부를 찾아보세요.', story: '스페인 궁정 화가 벨라스케스가 거울과 시선의 구도를 이용해 보는 이와 화가의 관계를 재치있게 뒤흔든 서양 미술사의 공간 명작입니다.', dTitle: ["공주의 방", "왕궁의 사람들", "화가와 공주"], dArtist: ["라파엘로", "장 오노레 프라고나르", "미켈란젤로"], dEng: ["The Princess's Chamber", "Painter at Court", "Inside the Royal Room"] },
                { id: 'r9', cat: 'renaissance', title: '아테네 학당', eng: 'The School of Athens', artist: '라파엘로', year: '1511년', img: '../../assets/images/art/r9.jpg', tip: '중앙의 플라톤(손가락으로 하늘을 가리킴)과 아리스토텔레스(손바닥으로 땅을 가리킴)를 보세요.', story: '고대 그리스의 위대한 학자 50여 명이 한자리에 모여 학문을 토론하는 르네상스 조화미의 정수입니다.', dTitle: ["철학자의 전당", "현자들의 토론", "고대의 학자들"], dArtist: ["카라바조", "레오나르도 다 빈치", "산드로 보티첼리"], dEng: ["Hall of Philosophers", "The Great Debate", "Wisdom of the Ancients"] },
                { id: 'r10', cat: 'renaissance', title: '여름', eng: 'Summer', artist: '주세페 아르침볼도', year: '1563년', img: '../../assets/images/art/r10.jpg', tip: '얼굴을 이루고 있는 과일과 채소를 하나하나 돋보기로 찾아보세요! 복숭아, 체리, 옥수수가 보이나요?', story: '이탈리아 화가 아르침볼도가 여름 과일과 채소를 모아 사람 얼굴을 만든 기발한 상상력의 명화입니다. 교과서 "다르게 보기" 단원의 대표 작품이에요.', dTitle: ["과일 얼굴", "채소 초상화", "수확의 얼굴"], dArtist: ["산드로 보티첼리", "레오나르도 다 빈치", "장 오노레 프라고나르"], dEng: ["Fruit Portrait", "The Harvest Face", "Vegetables in Disguise"] },
                { id: 'r11', cat: 'renaissance', title: '그네', eng: 'The Swing', artist: '장 앙리 프라고나르', year: '1767년', img: '../../assets/images/art/r11.jpg', tip: '그네를 타며 날아가는 핑크색 신발과 수풀 속에 숨은 귀족을 보세요.', story: '18세기 스페인과 프랑스를 풍미한 화려하고 우아한 로코코 양식의 대표작입니다.', dTitle: ["공중의 여인", "정원의 그네", "분홍빛 비행"], dArtist: ["레오나르도 다 빈치", "산드로 보티첼리", "렘브란트"], dEng: ["Flight in the Garden", "The Pink Dress", "Summer in the Air"] },
                { id: 'r12', cat: 'renaissance', title: '봄 (프리마베라)', eng: 'Primavera', artist: '산드로 보티첼리', year: '1482년경', img: '../../assets/images/art/r12.jpg', tip: '수백 가지의 봄꽃들이 들판에 펼쳐진 세밀한 붓터치를 관찰해보세요.', story: '르네상스 시대 화사한 봄의 기운과 신화 속 신들을 한 폭의 병풍처럼 세련되게 그린 거작입니다.', dTitle: ["꽃의 계절", "정원의 여신들", "봄날의 축제"], dArtist: ["미켈란젤로", "렘브란트", "라파엘로"], dEng: ["Festival of Flowers", "The Garden of Goddesses", "Season of Blossoms"] },

                // 인상주의 & 사실주의 (14점)
                { id: 'i1', cat: 'impression', title: '별이 빛나는 밤', eng: 'The Starry Night', artist: '빈센트 반 고흐', year: '1889년', img: '../../assets/images/art/i1.jpg', tip: '소용돌이치는 노란 별빛과 밤하늘, 검은 사이프러스 나무의 소용돌이를 확대해 보세요.', story: '반 고흐가 생레미 병원에서 밤하늘을 바라보며 자신의 강렬한 꿈과 감정을 요동치는 붓터치로 표현한 인상파 최고 히트작입니다.', dTitle: ["별이 흐르는 밤", "별이 내리는 밤", "달이 빛나는 밤"], dArtist: ["피에르 오귀스트 르누아르", "클로드 모네", "장 프랑수아 밀레"], dEng: ["Stars over the Village", "The Turning Sky", "Night of Blue Fire"] },
                { id: 'i2', cat: 'impression', title: '해바라기', eng: 'Sunflowers', artist: '빈센트 반 고흐', year: '1888년', img: '../../assets/images/art/i2.jpg', tip: '화사한 노란색 화병 속에 활짝 핀 해바라기와 시들어가는 해바라기의 대비를 보세요.', story: '동료 화가 고갱을 기다리며 남프랑스 아를의 노란 집을 장식하기 위해 그린 따뜻한 열정의 명화입니다.', dTitle: ["노란꽃", "별바라기", "햇살꽃"], dArtist: ["오귀스트 로댕", "조르주 쇠라", "폴 세잔"], dEng: ["Golden Blossoms", "Flowers of the Sun", "Yellow Vase"] },
                { id: 'i3', cat: 'impression', title: '아를의 침실', eng: 'Bedroom in Arles', artist: '빈센트 반 고흐', year: '1888년', img: '../../assets/images/art/i3.jpg', tip: '노란 침대, 파란 벽, 두 의자의 구도와 강렬한 원색을 느껴보세요.', story: '고흐가 아를에서 머물던 아늑한 자신의 방을 그린 그림으로 휴식과 평화를 담고 있습니다.', dTitle: ["노란 침실", "화가의 방", "아를의 작은 방"], dArtist: ["클로드 모네", "장 프랑수아 밀레", "에드가 드가"], dEng: ["The Yellow Room", "A Painter's Bedroom", "Room in Provence"] },
                { id: 'i4', cat: 'impression', title: '자화상', eng: 'Self-Portrait', artist: '빈센트 반 고흐', year: '1889년', img: '../../assets/images/art/i4.jpg', tip: '고흐의 푸른 눈빛과 배경의 소용돌이치는 청록색 붓질을 관찰하세요.', story: '자신의 내면과 영혼을 있는 그대로 화폭에 담은 반 고흐의 대표 자화상입니다.', dTitle: ["화가의 얼굴", "붉은 수염의 남자", "거울 속의 화가"], dArtist: ["조르주 쇠라", "폴 세잔", "피에르 오귀스트 르누아르"], dEng: ["The Red-Bearded Painter", "Face in the Mirror", "Portrait of the Artist"] },
                { id: 'i5', cat: 'impression', title: '인상, 해돋이', eng: 'Impression, Sunrise', artist: '클로드 모네', year: '1872년', img: '../../assets/images/art/i5.jpg', tip: '붉은 붉은 태양이 바다 물결에 반사되어 번지는 빛의 찰나를 보세요.', story: '바로 이 그림의 제목에서 "인상파(Impressionism)"라는 미술 사조의 이름이 시작되었습니다!', dTitle: ["안개 속 해돋이", "붉은 해의 항구", "새벽의 인상"], dArtist: ["장 프랑수아 밀레", "에드가 드가", "오귀스트 로댕"], dEng: ["Harbor at Dawn", "Morning Through Mist", "The Orange Sun"] },
                { id: 'i6', cat: 'impression', title: '양산을 든 여인', eng: 'Woman with a Parasol', artist: '클로드 모네', year: '1875년', img: '../../assets/images/art/i6.jpg', tip: '바람에 날리는 여인의 옷자락과 아들의 모습을 눈부신 햇살 속에서 찾아보세요.', story: '사랑하는 아내 카미유와 아들 장이 언덕 위에서 바람을 맞이하는 따스한 순간의 빛을 그렸습니다.', dTitle: ["바람 속의 여인", "언덕 위의 양산", "구름 아래 산책"], dArtist: ["폴 세잔", "피에르 오귀스트 르누아르", "빈센트 반 고흐"], dEng: ["Wind on the Hill", "A Walk beneath Clouds", "The Lady in the Breeze"] },
                { id: 'i7', cat: 'impression', title: '수련', eng: 'Water Lilies', artist: '클로드 모네', year: '1916년', img: '../../assets/images/art/i7.jpg', tip: '연못 연못에 반사된 하늘과 연꽃 수련의 잔물결을 확대해 보세요.', story: '지베르니 정원에서 평생 시력을 잃어가면서도 연못 수련을 관찰하며 빛을 그린 모네의 대작입니다.', dTitle: ["물 위의 꽃", "연못의 정원", "수면의 꽃들"], dArtist: ["에드가 드가", "오귀스트 로댕", "조르주 쇠라"], dEng: ["Garden on the Water", "Flowers of the Pond", "Reflections in Bloom"] },
                { id: 'i8', cat: 'impression', title: '그랑드 자트 섬의 일요일 오후', eng: 'A Sunday on La Grande Jatte', artist: '조르주 쇠라', year: '1886년', img: '../../assets/images/art/i8.jpg', tip: '돋보기로 원숭이와 사람 옷을 확대해 보세요! 선이 아니라 수억 개의 "점(점묘법)"으로 그려졌어요!', story: '물감을 섞지 않고 순수한 점을 찍어 빛을 만든 신인상주의 점묘법의 위대한 명작입니다.', dTitle: ["섬의 일요일", "공원의 오후", "점으로 그린 휴일"], dArtist: ["피에르 오귀스트 르누아르", "빈센트 반 고흐", "장 프랑수아 밀레"], dEng: ["Sunday in the Park", "People by the River", "An Afternoon of Dots"] },
                { id: 'i9', cat: 'impression', title: '이삭 줍는 사람들', eng: 'The Gleaners', artist: '장 앙리 밀레', year: '1857년', img: '../../assets/images/art/i9.jpg', tip: '수확이 끝난 들판에서 남아있는 이삭을 줍는 세 여인의 고단하지만 숭고한 모습을 관찰하세요.', story: '농민들의 솔직하고 정직한 삶을 따스한 대지의 색감으로 담아낸 사실주의 명작입니다.', dTitle: ["들판의 세 여인", "남은 곡식", "수확 뒤의 사람들"], dArtist: ["오귀스트 로댕", "클로드 모네", "폴 세잔"], dEng: ["Women after Harvest", "Gathering the Field", "The Last Grain"] },
                { id: 'i10', cat: 'impression', title: '만종', eng: 'The Angelus', artist: '장 앙리 밀레', year: '1859년', img: '../../assets/images/art/i10.jpg', tip: '저녁 종소리에 맞춰 감사 기도를 드리는 두 부부의 모습을 보세요.', story: '하루 일을 마치고 감자의 감사 기도를 올리는 평화롭고 거룩한 농촌의 서정을 표현했습니다.', dTitle: ["저녁 기도", "종소리의 들판", "기도하는 농부"], dArtist: ["빈센트 반 고흐", "조르주 쇠라", "에드가 드가"], dEng: ["Prayer at Dusk", "The Bell across the Field", "Evening in the Farmland"] },
                { id: 'i11', cat: 'impression', title: '사과와 오렌지', eng: 'Apples and Oranges', artist: '폴 세잔', year: '1899년', img: '../../assets/images/art/i11.jpg', tip: '탁자 위 과일들이 약간 비스듬하게 각기 다른 각도(다점 시점)에서 관찰되는 것을 찾아보세요.', story: '피카소 입체파의 아버지라 불리는 세잔이 과일의 본질적인 형태와 구형을 세련되게 담아낸 정물화 명작입니다.', dTitle: ["과일이 있는 식탁", "사과와 귤", "붉은 과일과 노란 과일"], dArtist: ["클로드 모네", "장 프랑수아 밀레", "피에르 오귀스트 르누아르"], dEng: ["Fruit on a Cloth", "The Table of Fruit", "Red and Golden Fruit"] },
                { id: 'i12', cat: 'impression', title: '무대 위의 무희', eng: 'Swaying Dancer', artist: '에드가 드가', year: '1878년', img: '../../assets/images/art/i12.jpg', tip: '순간 포착 카메라 프레임처럼 생동감 넘치는 발레리나들의 움직임을 보세요.', story: '발레리나들의 무대 뒤와 순간적인 포즈를 화려하고 순간적인 구도로 그렸습니다.', dTitle: ["무대의 발레리나", "춤추는 소녀", "조명 아래 무희"], dArtist: ["조르주 쇠라", "폴 세잔", "오귀스트 로댕"], dEng: ["Ballerina in the Light", "The Dancer's Moment", "Performance in Pink"] },
                { id: 'i13', cat: 'impression', title: '물랭 드 라 갈레트의 무도회', eng: 'Dance at Le Moulin de la Galette', artist: '오귀스트 르누아르', year: '1876년', img: '../../assets/images/art/i13.jpg', tip: '나뭇잎 사이로 내리쬐는 반짝이는 햇살이 사람들의 옷과 얼굴에 일렁이는 모습을 보세요.', story: '파리 야외 무도회장에서 사람들의 웃음 소리와 행복한 빛을 담아낸 인상파의 밝은 명화입니다.', dTitle: ["파리의 무도회", "야외의 춤", "햇살 속의 파티"], dArtist: ["장 프랑수아 밀레", "에드가 드가", "빈센트 반 고흐"], dEng: ["Paris in Celebration", "Dance under the Trees", "A Sunny Gathering"] },
                { id: 'i14', cat: 'impression', title: '생각하는 사람', eng: 'The Thinker', artist: '오귀스트 로댕', year: '1904년 (조각)', img: '../../assets/images/art/i14.jpg', tip: '턱을 괴고 온몸의 근육을 굳히며 깊은 생각에 잠긴 남성의 근육 선을 보세요.', story: '세계에서 가장 인지도 높은 조각상으로, 지옥의 문 앞에서 인간의 삶과 고민을 깊이 탐구하는 모습을 형상화했습니다.', dTitle: ["깊은 생각", "앉아 있는 철학자", "고민하는 조각상"], dArtist: ["폴 세잔", "피에르 오귀스트 르누아르", "클로드 모네"], dEng: ["Seated in Silence", "Bronze in Thought", "The Solitary Figure"] },

                // 초현실주의 & 현대미술 (12점)
                { id: 's1', cat: 'surreal', title: '기억의 지속 (녹는 시계)', eng: 'The Persistence of Memory', artist: '살바도르 달리', year: '1931년', img: '../../assets/images/art/s1.jpg', tip: '나뭇가지와 탁자 위에 흐물흐물하게 녹아내린 시계들을 찾아보세요!', story: '초현실주의 대가 달리가 시간의 흐름과 꿈속의 환상을 치즈처럼 녹아내리는 시계로 창의적으로 표현했습니다.', dTitle: ["시간의 흔적", "기억의 조각", "사라지는 시간"], dArtist: ["파블로 피카소", "앙리 루소", "바실리 칸딘스키"], dEng: ["Melting Hours", "The Vanishing Clock", "Desert of Time"] },
                { id: 's2', cat: 'surreal', title: '겨울비 (골콩드)', eng: 'Golconda', artist: '르네 마그리트', year: '1953년', img: '../../assets/images/art/s2.jpg', tip: '하늘에서 빗방울처럼 땅으로 쏟아지는 중절모를 쓴 신사들을 관찰하세요.', story: '르네 마그리트가 엉뚱하고 기발한 상상력으로 일상의 익숙한 신사들을 하늘에 띄운 초현실 명작입니다.', dTitle: ["신사들의 비", "하늘에서 내려온 사람들", "중절모의 행렬"], dArtist: ["앙리 마티스", "피에트 몬드리안", "살바도르 달리"], dEng: ["Rain of Gentlemen", "Men from the Sky", "The Bowler-Hat Crowd"] },
                { id: 's3', cat: 'surreal', title: '이미지의 반역 (이것은 파이프가 아니다)', eng: 'The Treachery of Images', artist: '르네 마그리트', year: '1929년', img: '../../assets/images/art/s3.jpg', tip: '그림 아래 적힌 문구 "Ceci n\'est pas une pipe(이것은 파이프가 아니다)"를 확인해보세요.', story: '그림은 진짜 파이프가 아니라 파이프의 이미지일 뿐이라는 고정관념을 깨부순 현대 미술의 질문입니다.', dTitle: ["파이프의 거짓말", "그림과 이름", "이것은 그림이다"], dArtist: ["앙리 루소", "바실리 칸딘스키", "마르크 샤갈"], dEng: ["The Painted Pipe", "Words and Objects", "A Picture Is Not a Thing"] },
                { id: 's4', cat: 'surreal', title: '나와 마을', eng: 'I and the Village', artist: '마르크 샤갈', year: '1911년', img: '../../assets/images/art/s4.jpg', tip: '초록색 얼굴의 나와 소가 서로를 마주 보는 환상적인 꿈의 색채를 느껴보세요.', story: '샤갈이 고향 마을의 동화 같은 추억과 꿈을 환상적인 색채와 초현실 구도로 그린 초등 미술 필수 수록작입니다.', dTitle: ["초록 얼굴과 마을", "염소와 사람", "거꾸로 선 고향"], dArtist: ["피에트 몬드리안", "살바도르 달리", "에드바르트 뭉크"], dEng: ["Green Face, Red Village", "The Village and the Goat", "Memories Upside Down"] },
                { id: 's5', cat: 'surreal', title: '절규', eng: 'The Scream', artist: '에드바르 뭉크', year: '1893년', img: '../../assets/images/art/s5.jpg', tip: '해골 같은 인물이 귀를 막고 비명을 지르는 붉은 소용돌이 하늘을 감상하세요.', story: '자연을 찢는 강렬한 불안과 절규를 왜곡된 선과 강렬한 색채로 소리 높여 표현한 표현주의의 대명사입니다.', dTitle: ["붉은 하늘", "다리 위의 공포", "귀를 막은 사람"], dArtist: ["바실리 칸딘스키", "르네 마그리트", "구스타프 클림트"], dEng: ["Bridge under a Red Sky", "The Figure by the Fjord", "Hands over the Ears"] },
                { id: 's6', cat: 'surreal', title: '키스', eng: 'The Kiss', artist: '구스타프 클림트', year: '1908년', img: '../../assets/images/art/s6.jpg', tip: '진짜 금박으로 장식된 연인의 화려한 옷 문양과 꽃밭을 돋보기로 보세요.', story: '황금빛의 화가 클림트가 연인의 영원하고 황홀한 사랑의 순간을 찬란한 금빛으로 그린 아르누보의 대작입니다.', dTitle: ["사랑", "연인", "애인"], dArtist: ["살바도르 달리", "마르크 샤갈", "파블로 피카소"], dEng: ["Golden Embrace", "Two Figures in Gold", "A Gilded Couple"] },
                { id: 's7', cat: 'surreal', title: '우는 여인', eng: 'The Weeping Woman', artist: '파블로 피카소', year: '1937년', img: '../../assets/images/art/s7.jpg', tip: '여인의 얼굴이 정면과 측면이 동시에 입체적으로 쪼개진 모습을 보세요.', story: '입체파의 거장 피카소가 전쟁의 슬픔과 눈물을 흘리는 여인의 아픔을 기하학적 면으로 표현한 대표작입니다.', dTitle: ["눈물의 여인", "슬픔에 잠긴 여자", "손수건을 든 여인"], dArtist: ["르네 마그리트", "에드바르트 뭉크", "앙리 마티스"], dEng: ["Woman with a Handkerchief", "Face of Grief", "Tears in Color"] },
                { id: 's8', cat: 'surreal', title: '아비뇽의 처녀들', eng: 'Les Demoiselles d\'Avignon', artist: '파블로 피카소', year: '1907년', img: '../../assets/images/art/s8.jpg', tip: '전통적인 미의 형태를 깨뜨리고 아프리카 가면처럼 각진 입체 표현을 찾아보세요.', story: '서양 미술 500년 전통의 입체감을 완전히 뒤엎고 20세기 입체파(Cubism)의 문을 연 역사적 대작입니다.', dTitle: ["아비뇽의 여인들", "다섯 여인의 방", "각진 얼굴의 여인들"], dArtist: ["마르크 샤갈", "구스타프 클림트", "앙리 루소"], dEng: ["Five Women in a Room", "The Women of Barcelona", "Faces in Angles"] },
                { id: 's9', cat: 'surreal', title: '춤', eng: 'Dance', artist: '앙리 마티스', year: '1910년', img: '../../assets/images/art/s9.jpg', tip: '붉은 5명의 사람이 손을 잡고 강렬한 원색 바다 위에서 춤추는 원초적 생명력을 보세요.', story: '야수파의 거장 마티스가 복잡한 형태를 단순화하고 오직 강렬한 색과 선으로 인간의 기쁨을 표현했습니다.', dTitle: ["손잡은 사람들", "둥근 춤", "붉은 사람들의 원"], dArtist: ["에드바르트 뭉크", "파블로 피카소", "피에트 몬드리안"], dEng: ["Circle of Red Figures", "Hands around the Hill", "Figures on Green"] },
                { id: 's10', cat: 'surreal', title: '꿈', eng: 'The Dream', artist: '앙리 루소', year: '1910년', img: '../../assets/images/art/s10.jpg', tip: '밀림 숲속 소파에 누워 피리 소리를 듣는 여인과 숨은 사자 두 마리를 찾아보세요.', story: '독학 화가 앙리 루소가 정글에 가보지 않고도 몽환적인 상상력으로 완벽한 밀림의 꿈을 그렸습니다.', dTitle: ["밀림의 낮잠", "정글 속 소파", "숲속의 환상"], dArtist: ["구스타프 클림트", "앙리 마티스", "바실리 칸딘스키"], dEng: ["Jungle on the Sofa", "The Sleeping Visitor", "A Vision in the Forest"] },
                { id: 's11', cat: 'surreal', title: '빨강, 파랑, 노랑의 구성', eng: 'Composition with Red, Blue and Yellow', artist: '피에트 몬드리안', year: '1930년', img: '../../assets/images/art/s11.jpg', tip: '검은 수직·수평선과 삼원색(빨강, 노랑, 파랑)의 비율 균형을 느껴보세요.', story: '불필요한 묘사를 모두 없애고 가장 순수한 선과 색으로 세상의 질서와 균형을 표현한 기하학적 추상화의 정수입니다.', dTitle: ["세 가지 색의 구성", "선과 색의 구성", "빨강과 파랑의 질서"], dArtist: ["파블로 피카소", "앙리 루소", "살바도르 달리"], dEng: ["Grid of Primary Colors", "Lines in Balance", "Red, Blue, and Order"] },
                { id: 's12', cat: 'surreal', title: '구성 VIII', eng: 'Composition VIII', artist: '바실리 칸딘스키', year: '1923년', img: '../../assets/images/art/s12.jpg', tip: '동그라미, 세모, 선들이 음악 리듬처럼 오케스트라 연주를 하는 듯한 느낌을 관찰하세요.', story: '추상미술의 아버지 칸딘스키가 음악 소리를 눈에 보이는 그림 형태로 시각화한 순수 서정 추상명작입니다.', dTitle: ["도형의 구성", "원과 선의 구성", "기하학적 리듬"], dArtist: ["앙리 마티스", "피에트 몬드리안", "르네 마그리트"], dEng: ["Circles and Lines", "Geometry in Motion", "Rhythm of Shapes"] }
            ];

            // UI Elements
            const btnModeGallery = document.getElementById('btnModeGallery');
            const btnModeQuiz = document.getElementById('btnModeQuiz');
            const viewGallery = document.getElementById('viewGallery');
            const viewQuiz = document.getElementById('viewQuiz');
            const artGrid = document.getElementById('artGrid');
            const categoryBtns = document.querySelectorAll('.cat-btn');

            // Modal & Loupe Elements
            const docentModal = document.getElementById('docentModal');
            const btnCloseModal = document.getElementById('btnCloseModal');
            const loupeContainer = document.getElementById('loupeContainer');
            const modalImg = document.getElementById('modalImg');
            const loupeLens = document.getElementById('loupeLens');
            const modalTag = document.getElementById('modalTag');
            const modalTitle = document.getElementById('modalTitle');
            const modalMeta = document.getElementById('modalMeta');
            const modalTip = document.getElementById('modalTip');
            const modalStory = document.getElementById('modalStory');

            // Quiz Elements
            const quizScoreBadge = document.getElementById('quizScoreBadge');
            const quizQuestionText = document.getElementById('quizQuestionText');
            const quizImg = document.getElementById('quizImg');
            const quizOptions = document.getElementById('quizOptions');

            let currentCategory = 'all';
            let activeQuizMode = 'speed'; // 'speed' or 'detective'
            let quizQueue = [];
            let quizIndex = 0;
            let quizScore = 0;

            function playSfx(name) {
                if (window.ClassGameSfx) {
                    window.ClassGameSfx.play(name);
                }
            }

            // 1. Render Gallery Grid
            function renderGallery() {
                artGrid.innerHTML = '';
                const filtered = MASTERPIECES.filter(m => currentCategory === 'all' || m.cat === currentCategory);

                filtered.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'art-card';
                    card.innerHTML = `
                        <div class="art-thumb-wrap">
                            <img class="art-thumb" src="${m.img}" alt="${m.title}" loading="lazy" onerror="handleImgError(this, '${m.title.replace(/'/g, "\\'")}', '${m.artist.replace(/'/g, "\\'")}')">
                            <span class="art-tag">${getCatName(m.cat)}</span>
                        </div>
                        <div class="art-info">
                            <div>
                                <h3 class="art-title">${m.title} <small style="display:block; font-size:0.78em; color:var(--gold-light); font-weight:normal; opacity:0.85; margin-top:2px;">(${m.eng})</small></h3>
                                <div class="art-artist">${m.artist} (${m.year})</div>
                            </div>
                            <div class="art-desc-preview">${m.tip}</div>
                        </div>
                    `;
                    card.addEventListener('click', () => openDocentModal(m));
                    artGrid.appendChild(card);
                });
            }

            window.handleImgError = function(img, title, artist) {
                if (img.dataset.fallbackApplied) return;
                img.dataset.fallbackApplied = 'true';
                const cleanTitle = (title || '명화 감상').replace(/'/g, "");
                const cleanArtist = (artist || '작가 미상').replace(/'/g, "");
                const svgData = `<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2a1b12"/><stop offset="50%" stop-color="#4a2e16"/><stop offset="100%" stop-color="#190e07"/></linearGradient></defs><rect width="600" height="400" fill="url(#g)"/><rect x="16" y="16" width="568" height="368" fill="none" stroke="#d4af37" stroke-width="4" rx="10"/><rect x="26" y="26" width="548" height="348" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1"/><text x="300" y="160" fill="#f3e5ab" font-size="34" font-family="'Georgia', sans-serif" font-weight="900" text-anchor="middle">🎨 ${cleanTitle}</text><text x="300" y="220" fill="#d4af37" font-size="20" font-family="sans-serif" text-anchor="middle">✍️ ${cleanArtist}</text><text x="300" y="275" fill="#aaaaaa" font-size="14" font-family="sans-serif" text-anchor="middle">송화플레이 명화 갤러리</text></svg>`;
                const dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
                img.src = dataUrl;
                if (img.id === 'modalImg') {
                    const loupe = document.getElementById('loupeLens');
                    if (loupe) loupe.style.backgroundImage = `url("${dataUrl}")`;
                }
            };

            function getCatName(cat) {
                switch(cat) {
                    case 'korea': return '🇰🇷 한국명화';
                    case 'impression': return '🌻 인상파';
                    case 'renaissance': return '🏛️ 르네상스';
                    case 'surreal': return '🎨 현대미술';
                    default: return '명화';
                }
            }

            // 2. Docent Modal & Glass Loupe Zoom
            function openDocentModal(item) {
                playSfx('card');
                modalTag.textContent = getCatName(item.cat);
                modalTitle.innerHTML = `${item.title} <span style="display:block; font-size:0.65em; color:var(--gold-light); font-weight:normal; opacity:0.85; margin-top:4px;">${item.eng}</span>`;
                modalMeta.textContent = `${item.artist} · ${item.year}`;
                modalTip.textContent = item.tip;
                modalStory.textContent = item.story;

                modalImg.dataset.fallbackApplied = '';
                modalImg.onerror = function() { handleImgError(this, item.title, item.artist); };
                modalImg.src = item.img;

                loupeLens.style.backgroundImage = `url('${item.img}')`;
                loupeLens.style.display = 'none';

                docentModal.classList.add('active');
            }

            btnCloseModal.addEventListener('click', () => {
                playSfx('click');
                docentModal.classList.remove('active');
            });

            docentModal.addEventListener('click', (e) => {
                if (e.target === docentModal) {
                    playSfx('click');
                    docentModal.classList.remove('active');
                }
            });

            // Ultra-Smooth 60fps Loupe Magnifier with 100% Aspect-Ratio Protection
            let loupeRafId = null;

            function updateLoupe(clientX, clientY) {
                if (loupeRafId) cancelAnimationFrame(loupeRafId);

                loupeRafId = requestAnimationFrame(() => {
                    if (!modalImg.naturalWidth || !modalImg.naturalHeight) {
                        loupeLens.style.display = 'none';
                        return;
                    }

                    const containerRect = loupeContainer.getBoundingClientRect();
                    const cW = containerRect.width;
                    const cH = containerRect.height;

                    const nW = modalImg.naturalWidth;
                    const nH = modalImg.naturalHeight;

                    // Calculate actual rendered image dimensions inside object-fit: contain container
                    const containerRatio = cW / cH;
                    const naturalRatio = nW / nH;

                    let actualW, actualH, actualLeft, actualTop;
                    if (containerRatio > naturalRatio) {
                        // Letterboxed horizontally (black bars on left/right)
                        actualH = cH;
                        actualW = actualH * naturalRatio;
                        actualTop = 0;
                        actualLeft = (cW - actualW) / 2;
                    } else {
                        // Letterboxed vertically (black bars on top/bottom)
                        actualW = cW;
                        actualH = actualW / naturalRatio;
                        actualLeft = 0;
                        actualTop = (cH - actualH) / 2;
                    }

                    // Cursor position relative to container
                    const curX = clientX - containerRect.left;
                    const curY = clientY - containerRect.top;

                    // Check if cursor is over actual painting area
                    if (curX < actualLeft || curX > actualLeft + actualW || curY < actualTop || curY > actualTop + actualH) {
                        loupeLens.style.display = 'none';
                        return;
                    }

                    const lensRadius = 170; // 340px lens diameter (Giant Lens!)
                    const zoomFactor = 3.2;  // 3.2x high-resolution zoom

                    // Position lens centered under cursor
                    loupeLens.style.display = 'block';
                    loupeLens.style.left = `${curX - lensRadius}px`;
                    loupeLens.style.top = `${curY - lensRadius}px`;

                    // Cursor position relative to actual painting
                    const relX = curX - actualLeft;
                    const relY = curY - actualTop;

                    // Background size matching exact natural aspect ratio
                    const bgW = actualW * zoomFactor;
                    const bgH = actualH * zoomFactor;

                    // Background position centered under lens
                    const bgX = -(relX * zoomFactor - lensRadius);
                    const bgY = -(relY * zoomFactor - lensRadius);

                    loupeLens.style.backgroundSize = `${bgW}px ${bgH}px`;
                    loupeLens.style.backgroundPosition = `${bgX}px ${bgY}px`;
                });
            }

            loupeContainer.addEventListener('mousemove', (e) => {
                updateLoupe(e.clientX, e.clientY);
            });

            loupeContainer.addEventListener('touchmove', (e) => {
                if (e.touches && e.touches[0]) {
                    updateLoupe(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });

            loupeContainer.addEventListener('mouseleave', () => {
                if (loupeRafId) cancelAnimationFrame(loupeRafId);
                loupeLens.style.display = 'none';
            });

            loupeContainer.addEventListener('touchend', () => {
                if (loupeRafId) cancelAnimationFrame(loupeRafId);
                loupeLens.style.display = 'none';
            });

            // 3. Quiz Game Modes (20 Random Questions per Game)
            let currentQuizType = 'title'; // 'title', 'artist', 'eng'

            const btnQuizTypeTitle = document.getElementById('btnQuizTypeTitle');
            const btnQuizTypeArtist = document.getElementById('btnQuizTypeArtist');
            const btnQuizTypeEng = document.getElementById('btnQuizTypeEng');

            function setQuizType(type) {
                currentQuizType = type;
                [btnQuizTypeTitle, btnQuizTypeArtist, btnQuizTypeEng].forEach(btn => btn.classList.remove('active'));
                if (type === 'title') btnQuizTypeTitle.classList.add('active');
                if (type === 'artist') btnQuizTypeArtist.classList.add('active');
                if (type === 'eng') btnQuizTypeEng.classList.add('active');
                startQuiz();
            }

            btnQuizTypeTitle.addEventListener('click', () => { playSfx('click'); setQuizType('title'); });
            btnQuizTypeArtist.addEventListener('click', () => { playSfx('click'); setQuizType('artist'); });
            btnQuizTypeEng.addEventListener('click', () => { playSfx('click'); setQuizType('eng'); });

            function startQuiz() {
                quizIndex = 0;
                quizScore = 0;
                // Shuffle masterpieces for 20-question quiz set
                quizQueue = [...MASTERPIECES].sort(() => Math.random() - 0.5).slice(0, 20);
                
                viewGallery.classList.add('hidden');
                viewQuiz.classList.remove('hidden');

                btnModeGallery.classList.remove('active');
                btnModeQuiz.classList.add('active');

                renderQuizQuestion();
            }

            function renderQuizQuestion() {
                if (quizIndex >= quizQueue.length) {
                    // Quiz Finished (20 questions x 5 pts = 100 pts)
                    playSfx('success');
                    const totalPoints = quizScore * 5;
                    quizScoreBadge.textContent = `최종 점수: ${totalPoints}점 / 100점!`;
                    quizQuestionText.textContent = `🎉 축하합니다! 20문제 명화 퀴즈를 모두 완료했습니다. (정답: ${quizScore}/20)`;
                    quizImg.src = quizQueue[0].img;
                    quizOptions.innerHTML = `
                        <button class="quiz-opt-btn" style="grid-column: span 2;" onclick="location.reload()">🔄 다시 도전하기</button>
                    `;
                    return;
                }

                const current = quizQueue[quizIndex];
                const currentPts = quizScore * 5;
                quizScoreBadge.textContent = `점수: ${currentPts}점 (${quizIndex + 1} / 20 문제)`;

                quizImg.dataset.fallbackApplied = '';
                quizImg.onerror = function() { handleImgError(this, current.title, current.artist); };
                quizImg.src = current.img;

                let questionStr = '';
                let correctAns = '';
                let distractors = [];

                if (currentQuizType === 'title') {
                    questionStr = `[문제 ${quizIndex + 1}] 아래 명화의 한글 제목은 무엇일까요?`;
                    correctAns = current.title;
                    distractors = current.dTitle || [];
                } else if (currentQuizType === 'artist') {
                    questionStr = `[문제 ${quizIndex + 1}] 아래 명화를 그린 화가는 누구일까요?`;
                    correctAns = current.artist;
                    distractors = current.dArtist || [];
                } else if (currentQuizType === 'eng') {
                    questionStr = `[Q${quizIndex + 1}] What is the English title of this artwork?`;
                    correctAns = current.eng;
                    distractors = current.dEng || [];
                }

                quizQuestionText.textContent = questionStr;

                // Build 4 choices with exact distractors from dataset
                const choiceList = [
                    { text: correctAns, isCorrect: true },
                    ...distractors.map(d => ({ text: d, isCorrect: false }))
                ].sort(() => Math.random() - 0.5);

                quizOptions.innerHTML = '';
                choiceList.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'quiz-opt-btn';
                    btn.innerHTML = `<strong>${c.text}</strong>`;
                    btn.addEventListener('click', () => handleQuizAnswer(c.isCorrect));
                    quizOptions.appendChild(btn);
                });
            }

            function handleQuizAnswer(isCorrect) {
                if (isCorrect) {
                    playSfx('bell');
                    quizScore += 1;
                    alert('✨ 정답입니다!');
                } else {
                    playSfx('error');
                    alert('아쉽네요! 다음 문제를 도전해 보세요.');
                }
                quizIndex += 1;
                renderQuizQuestion();
            }

            // Mode Switching
            btnModeGallery.addEventListener('click', () => {
                playSfx('click');
                viewGallery.classList.remove('hidden');
                viewQuiz.classList.add('hidden');
                btnModeGallery.classList.add('active');
                btnModeQuiz.classList.remove('active');
            });

            btnModeQuiz.addEventListener('click', () => {
                playSfx('click');
                startQuiz();
            });

            // Category Filtering
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    playSfx('click');
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.cat;
                    renderGallery();
                });
            });

            // Initial Execution
            renderGallery();
        })();
    </script>
</body>
