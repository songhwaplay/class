<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Antique Tower of Hanoi - Perfect Arc Cone</title>
    <style>
        /* 심해 바다 느낌의 배경 */
        body { 
            background:
                linear-gradient(rgba(30, 20, 12, 0.18), rgba(18, 10, 6, 0.34)),
                url('../../../assets/images/hanoitowerbg.png') center / cover fixed;
            color: #e6cb9c; 
            font-family: 'Georgia', 'Times New Roman', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(circle at center, rgba(255, 218, 150, 0.08), transparent 40%),
                radial-gradient(circle at center, transparent 30%, rgba(26, 12, 6, 0.44) 100%);
        }
        
        /* 스타트 화면 스타일 */
        .start-screen {
            background:
                linear-gradient(rgba(43,26,14,.82), rgba(21,13,7,.90)),
                url('../../../assets/images/mainbg2.png') center / cover;
            border: 3px solid #a27d4f;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.6);
            width: 450px;
            padding: 40px;
            text-align: center;
            box-sizing: border-box;
        }

        .start-title {
            font-size: 2.2em;
            color: #bd9653;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px #000;
        }

        .start-subtitle {
            font-size: 1.1em;
            color: #8a5a36;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* 인게임 메인 컨테이너 */
        .game-container {
            display: none;
            width: 100%;
            max-width: 900px;
            flex-direction: column;
            align-items: center;
            background: url('../../../assets/images/mainbg2.png') center / cover no-repeat;
            padding: 16px;
            border: 2px solid rgba(138, 90, 54, 0.78);
            box-shadow: 0 12px 30px rgba(0,0,0,.45);
        }

        /* 상단 제어판 */
        .controls { 
            margin-bottom: 30px; 
            background: rgba(43,26,14,.78); 
            padding: 20px; 
            border: 3px solid #8a5a36; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5);
            text-align: center; 
            width: 100%;
            box-sizing: border-box;
        }
        .option-group { 
            margin: 12px 0; 
            color: #e6cb9c; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            font-size: 0.95em;
            letter-spacing: 1px;
        }
        
        .btn-container { display: flex; gap: 6px; align-items: center; }
        
        button { 
            cursor: pointer; 
            padding: 6px 14px;
            background: linear-gradient(to bottom, #c5a059 0%, #947132 100%); 
            border: 1px solid #61461b; 
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.4);
            font-weight: bold; 
            color: #261603;
            font-family: inherit;
            transition: all 0.1s ease;
        }
        button:active { 
            background: linear-gradient(to bottom, #947132 0%, #c5a059 100%); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }
        button.active { 
            background: linear-gradient(to bottom, #4a2f1b 0%, #1e1107 100%); 
            color: #e6cb9c; 
            border-color: #8a5a36;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.8);
        }
        
        .btn-start-action {
            background: linear-gradient(to bottom, #962d22 0%, #5c160f 100%) !important;
            color: #f7e1cd !important;
            border-color: #400f0a !important;
            padding: 10px 30px !important;
            font-size: 1.1em !important;
        }

        /* 볼륨 인디케이터 */
        .volume-bar-container {
            display: flex;
            background-color: #110904;
            border: 2px solid #54391e;
            padding: 4px 6px;
            gap: 4px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .vol-block {
            width: 20px;
            height: 16px;
            background-color: #24160c; 
            border: 1px solid #140d07;
            cursor: pointer;
            transition: background-color 0.1s;
        }
        .vol-block.active-level-1 { background: #61401b; border-color: #8c5d27; box-shadow: 0 0 4px #61401b; }
        .vol-block.active-level-2 { background: #8c5e27; border-color: #bd7e35; box-shadow: 0 0 6px #8c5e27; }
        .vol-block.active-level-3 { background: #b87c35; border-color: #e69d45; box-shadow: 0 0 8px #b87c35; }
        .vol-block.active-level-4 { background: #df9744; border-color: #fcae53; box-shadow: 0 0 10px #df9744; }
        .vol-block.active-level-5 { background: #ffaa42; border-color: #fff2cc; box-shadow: 0 0 12px #ffaa42; }

        .vol-mute-btn {
            padding: 4px 10px;
            font-size: 0.85em;
        }
        
        /* 하노이탑 보드 구역 (수정: 기둥 간 간격을 60px에서 20px로 좁힘) */
        .board-wrapper { 
            display: flex; 
            gap: 20px; 
            margin-top: 20px; 
            align-items: flex-end; 
            padding: 20px 40px;
            background: rgba(6, 17, 27, 0.34);
            border: 2px solid rgba(138, 90, 54, 0.78);
            border-radius: 8px;
            box-shadow:
                inset 0 0 26px rgba(0,0,0,0.58),
                0 10px 24px rgba(0,0,0,0.38);
        }
        
        /* 기둥 및 받침대 */
        .pole { 
            width: 240px; 
            height: 420px; 
            display: flex; 
            flex-direction: column-reverse; 
            align-items: center; 
            border-bottom: 24px solid #3e2312; 
            background: transparent;
            position: relative;
            box-shadow: 0 8px 12px rgba(0,0,0,0.6);
        }
        .pole::before {
            content: '';
            position: absolute;
            bottom: 0;
            width: 14px;
            height: 380px;
            background: linear-gradient(to right, #2b160a, #4a2815, #1a0d05);
            border-radius: 4px 4px 0 0;
            z-index: 1;
        }
        
        /* 원판 디자인 */
        .disk { 
            cursor: grab; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: -1px; 
            z-index: 10;
            box-sizing: border-box;
            
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.3em;
            text-shadow: 1px 2px 3px rgba(0, 0, 0, 0.9);
            
            box-shadow: 
                0 4px 5px rgba(0,0,0,0.3), 
                inset 0 4px 4px rgba(255,255,255,0.3), 
                inset 0 -4px 6px rgba(0,0,0,0.4);
            
            transition: transform 0.1s;

            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: element;
        }
        .disk:active { cursor: grabbing; transform: scale(1.03); }
        
        #info { 
            margin-top: 30px; 
            font-size: 1.4em; 
            font-weight: bold;
            letter-spacing: 2px;
            color: #c5a059;
            text-shadow: 2px 2px 4px #000; 
        }
        #moveCount { color: #e6cb9c; }

        /* 모달 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 200;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .antique-modal {
            background: linear-gradient(135deg, #2b1a0e 0%, #150d07 100%);
            border: 3px solid #a27d4f;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.6);
            width: 450px;
            padding: 25px;
            text-align: center;
            transform: scale(0.85);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.show .antique-modal { transform: scale(1); }

        .modal-title {
            font-size: 1.5em;
            color: #bd9653;
            letter-spacing: 3px;
            margin-bottom: 15px;
            border-bottom: 1px dashed #a27d4f;
            padding-bottom: 8px;
            text-shadow: 1px 1px 2px #000;
        }
        .modal-content {
            color: #ecd5b3;
            font-size: 1.1em;
            line-height: 1.8;
            text-align: left;
            margin-bottom: 20px;
            font-family: inherit;
        }
        .modal-content p { margin: 8px 0; }
    
/* iPad·터치 기기 공통 보완 */
button,
input,
select,
textarea,
[onclick],
.set-card,
.point,
.piece,
.gem,
.coin,
.pole,
.disk,
.quiz-btn,
.action-btn,
.option-btn,
.small-btn,
.primary-btn,
.secondary-btn,
.danger-btn,
.tab,
.room-tab,
.seg,
.music-segment,
.vol-block,
.diff-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

@media (pointer: coarse) {
    button,
    .action-btn,
    .option-btn,
    .small-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn,
    .tab,
    .room-tab,
    .quiz-btn,
    .diff-btn {
        min-height: 44px;
    }

    input,
    select,
    textarea {
        font-size: 16px; /* iOS Safari 자동 확대 방지 */
    }

    .point,
    .set-card,
    .gem,
    .coin,
    .pole,
    .disk {
        cursor: pointer;
    }
}

.tablet-landscape-hint {
    display: none;
}

@media (pointer: coarse) and (orientation: portrait) and (max-width: 900px) {
    .tablet-landscape-hint {
        display: block;
        position: fixed;
        left: 50%;
        bottom: max(10px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 10000;
        width: max-content;
        max-width: calc(100vw - 24px);
        padding: 8px 12px;
        border: 1px solid rgba(240, 215, 124, .65);
        border-radius: 7px;
        background: rgba(5, 7, 11, .90);
        color: #fff4cc;
        font: 12px/1.4 "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        text-align: center;
        box-shadow: 0 5px 18px rgba(0,0,0,.45);
        pointer-events: none;
    }
}


/* TODAY’S FINISHERS */
.player-entry {
    width: min(420px, 100%);
    margin: 0 auto 14px;
    text-align: left;
}
.player-entry label {
    display: block;
    margin-bottom: 6px;
    color: #b4c6da;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
}
.player-name-input {
    width: 100%;
    min-height: 43px;
    padding: 9px 12px;
    border: 1px solid #8a6c2d;
    background: rgba(4, 8, 13, .82);
    color: #f3e7c4;
    text-align: center;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    font-size: 17px;
    font-weight: bold;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
}
.player-name-input:focus {
    border-color: #f0d77c;
    box-shadow: 0 0 0 2px rgba(240, 215, 124, .15);
}
.player-name-help {
    min-height: 18px;

    font: 12px/1.4 "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;

}

.finishers-panel {
    width: min(460px, 100%);
    margin: 14px auto;
    padding: 11px 13px;
    border: 1px solid rgba(198, 170, 85, .34);
    background: rgba(2, 5, 9, .54);
    color: #e7e0ce;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
}
.finishers-title {
    margin-bottom: 8px;
    color: #f0d77c;
    font: bold 13px/1.3 Georgia, "Times New Roman", serif;
    letter-spacing: 1.4px;
    text-align: center;
}
.finishers-list {
    max-height: 132px;
    overflow-y: auto;
}
.finisher-row {
    display: grid;
    grid-template-columns: 46px minmax(54px, .75fr) minmax(110px, 1.4fr);
    gap: 8px;
    align-items: center;
    padding: 5px 3px;
    border-top: 1px solid rgba(198, 170, 85, .13);
    font-size: 12px;
}
.finisher-row:first-child { border-top: 0; }
.finisher-time { color: #91a0b3; font-family: Consolas, monospace; }
.finisher-name {
    overflow: hidden;
    color: #fff0b6;
    font-weight: bold;
    text-overflow: ellipsis;

}
.finisher-difficulty {
    overflow: hidden;
    color: #cbd4df;

    text-overflow: ellipsis;
    white-space: nowrap;
}
.finisher-empty {
    padding: 8px 4px;
    color: #8e9bab;
    font-size: 12px;
    text-align: center;
}
.result-finishers {
    margin-top: 14px;
}


/* 이름 입력·클리어 명단 컴팩트 보정 */
.player-entry {
    width: min(340px, 100%);
    margin: 0 auto 9px;
}
.player-entry label {
    margin-bottom: 4px;
    font-size: 11px;
}
.player-name-input {
    min-height: 36px;
    padding: 6px 10px;
    font-size: 16px;
}
.player-name-help {
    min-height: 15px;
    margin-top: 3px;
    font-size: 11px;
}
.finishers-panel {
    width: min(390px, 100%);
    margin: 9px auto;
    padding: 8px 10px;
}
.finishers-title {
    margin-bottom: 5px;
    font-size: 12px;
}
.finishers-list {
    max-height: 92px;
}
.finisher-row {
    grid-template-columns: 42px minmax(48px, .7fr) minmax(96px, 1.35fr);
    gap: 6px;
    padding: 3px 2px;
    font-size: 11px;
}
.finisher-empty {
    padding: 5px 3px;
    font-size: 11px;
}
.result-finishers {
    margin-top: 8px;
}


/* 터치·클릭 이동 방식 */
.pole {
    cursor: pointer;
    transition: box-shadow .14s ease, background-color .14s ease, transform .14s ease;
    -webkit-tap-highlight-color: transparent;
}

.pole.tap-target {
    background-color: rgba(240, 215, 124, .08);
    box-shadow:
        0 0 0 3px rgba(240, 215, 124, .42),
        0 0 24px rgba(240, 215, 124, .42),
        0 8px 12px rgba(0,0,0,.6);
}

.pole.tap-invalid {
    animation: pole-invalid-flash .28s ease;
}

.disk.tap-selected {
    outline: 4px solid #fff0a6;
    outline-offset: 3px;
    box-shadow:
        0 0 0 7px rgba(198, 170, 85, .40),
        0 0 26px 10px rgba(255, 222, 112, .78),
        0 4px 5px rgba(0,0,0,.3),
        inset 0 4px 4px rgba(255,255,255,.3),
        inset 0 -4px 6px rgba(0,0,0,.4);
    transform: translateY(-6px) scale(1.035);
    z-index: 30;
}

.disk.tap-selectable {
    cursor: pointer;
}

.disk:not(.tap-selectable) {
    cursor: default;
}

.tap-guide {
    margin-top: 10px;
    min-height: 20px;
    color: #efd998;
    font: bold 13px/1.45 "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    letter-spacing: .3px;
    text-align: center;
}

@keyframes pole-invalid-flash {
    0%, 100% { box-shadow: 0 8px 12px rgba(0,0,0,.6); }
    50% {
        background-color: rgba(224, 60, 50, .20);
        box-shadow:
            0 0 0 4px rgba(224, 60, 50, .60),
            0 0 24px rgba(224, 60, 50, .72);
    }
}


/* 모바일 가로모드 화면 맞춤 */
@media (max-height: 520px) and (orientation: landscape) {
    .controls .option-group:nth-of-type(3) { display:none!important; }

        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
    }

    body {
        padding: 4px;
        justify-content: flex-start;
    }

    .game-container {
        width: 100%;

    .controls {
        width: 100%;

    }

    .option-group {
        margin: 0;

        font-size: 11px;

    }

    .btn-container {

        flex-wrap: nowrap;
    }

    .controls button {
        min-height: 30px !important;

    }

    .volume-bar-container {

    }

    .vol-block {
        width: 14px;
        height: 12px;
    }

    .board-wrapper {
        width: min(100%, 820px);
        height: calc(100vh - 94px);

        margin-top: 0;

        gap: 6px;

        overflow: hidden;
    }

    .pole {

    #info {

        background: rgba(18,10,6,.78);
        border-radius: 5px;
        font-size: 11px;
    }

    .tablet-landscape-hint {
        display: none !important;
    }
}

}

                <button onclick="setDisk(1)">1</button><button onclick="setDisk(2)">2</button><button onclick="setDisk(3)" class="active">3</button>
                <button onclick="setDisk(4)">4</button><button onclick="setDisk(5)">5</button><button onclick="setDisk(6)">6</button>
                <button onclick="setDisk(7)">7</button><button onclick="setDisk(8)">8</button>
            </div>
        </div>
        <div class="option-group">
            MODE: 
            <div class="btn-container">
                <button id="modeNormal" onclick="setMode('normal')" class="active">NORMAL</button>
                <button id="modeRandom" onclick="setMode('random')">RANDOM</button>
            </div>
        </div>
        <div class="option-group legacy-music-control">
            MUSIC VOLUME: 
            <div class="btn-container">
                <button class="vol-mute-btn" id="muteBtn" onclick="setVolume(0)">MUTE</button>
                <div class="volume-bar-container">
                    <div class="vol-block" id="vb-1" onclick="setVolume(0.2)"></div>
                    <div class="vol-block" id="vb-2" onclick="setVolume(0.4)"></div>
                    <div class="vol-block" id="vb-3" onclick="setVolume(0.6)"></div>
                    <div class="vol-block" id="vb-4" onclick="setVolume(0.8)"></div>
                    <div class="vol-block" id="vb-5" onclick="setVolume(1.0)"></div>
                </div>
            </div>
        </div>
        <button onclick="initGame()" style="margin-top: 5px;">RESET GAME</button>
        <button onclick="showRules()" style="margin-top: 5px;">RULES</button>
    </div>

    <div class="board-wrapper">
        <div class="pole" id="pole0" onclick="handlePoleTap(0)" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        <div class="pole" id="pole1" onclick="handlePoleTap(1)" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        <div class="pole" id="pole2" onclick="handlePoleTap(2)" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>

    <div id="info">MOVES: <span id="moveCount">0</span></div>
    <div class="tap-guide" id="tap-guide">맨 위 원판을 톡 누른 뒤, 옮길 기둥 영역을 톡 누르세요.</div>
</div>

<div class="modal-overlay" id="rulesModal">
    <div class="antique-modal">
        <div class="modal-title">RULES</div>
        <div class="modal-content" id="modalText"></div>
        <button onclick="closeModal()" style="padding: 6px 25px; margin-top: 10px;">확인</button>
    </div>
</div>

<script>
    const customGradients = [
        'linear-gradient(to bottom, #aa3232, #851c1c)', 
        'linear-gradient(to bottom, #dfa837, #b88221)', 
        'linear-gradient(to bottom, #dfc664, #bca13f)', 
        'linear-gradient(to bottom, #306b49, #204c32)', 
        'linear-gradient(to bottom, #335580, #223a59)', 
        'linear-gradient(to bottom, #233452, #152034)', 
        'linear-gradient(to bottom, #593563, #3f2247)', 
        'linear-gradient(to bottom, #292420, #1c1815)'  
    ];

    let poles = [[], [], []];
    let initialPoles = [];
    let moveCount = 0;
    let totalDisks = 3;
    let mode = 'normal';
    let selectedPoleIndex = null;
    
    const bgm = document.getElementById('bgm');

    const FINISHER_GAME_ID = "hanoitower";
    const KOREAN_NAME_PATTERN = /^[가-힣]{2,6}$/;
    let playerName = "";

    function escapeFinisherHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function normalizeKoreanName(value) {
        return String(value || "").replace(/[^가-힣]/g, "").slice(0, 6);
    }

    function isValidKoreanName(value) {
        return KOREAN_NAME_PATTERN.test(String(value || ""));
    }

    function getSavedPlayerName() {
        const saved = normalizeKoreanName(localStorage.getItem("classPlayerName") || "");
        return isValidKoreanName(saved) ? saved : "";
    }

    const finisherBoard = ClassroomFinisherBoard.create({
        gameId: FINISHER_GAME_ID,
        getPlayerName: () => playerName,
        isValidPlayerName: isValidKoreanName
    });
    function loadTodayFinishers(targetId = "today-finishers-list") { return finisherBoard.load(targetId); }
    function registerFinisher(difficulty, rank, targetId = "result-finishers-list") {
        return finisherBoard.register({ difficulty, rank, targetId });
    }

    function initializePlayerEntry() {
        playerName = getSavedPlayerName();
        const entry = document.querySelector(".player-entry");
        const startButton = document.getElementById("start-game-button");

        if (playerName && entry) {
            entry.style.display = "none";
            const subtitle = document.querySelector(".start-subtitle");
            if (subtitle) subtitle.textContent = `PLAYER · ${playerName} · TOWER OF HANOI`;
        }

        if (startButton) {
            startButton.disabled = !playerName;
            startButton.textContent = playerName ? "START GAME" : "메인 화면에서 이름을 저장하세요";
        }

        loadTodayFinishers();
    }
    bgm.loop = true;
    bgm.volume = 0.6; 

    function setVolume(vol) {
        bgm.volume = vol;
        
        for (let i = 1; i <= 5; i++) {
            const block = document.getElementById(`vb-${i}`);
            block.className = 'vol-block'; 
        }
        
        const muteBtn = document.getElementById('muteBtn');
        if (vol === 0) {
            muteBtn.classList.add('active');
        } else {
            muteBtn.classList.remove('active');
            const activeCount = Math.round(vol * 5);
            for (let i = 1; i <= activeCount; i++) {
                document.getElementById(`vb-${i}`).classList.add(`active-level-${i}`);
            }
        }
    }

    function startGameEnvironment() {
        if (!isValidKoreanName(playerName)) {
            const input = document.getElementById("player-name");
            if (input) input.focus();
            return;
        }
        bgm.play().catch(e => console.log("배경음악 재생 차단: 파일 경로를 확인하세요."));
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        
        setVolume(0.6);
        initGame();
    }

    function playSound(diskSize) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const scale = [523.25, 493.88, 440.00, 392.00, 349.23, 329.63, 293.66, 261.63]; 
        const targetFreq = scale[(diskSize - 1) % 8] || 330;

        const bodyOsc = audioCtx.createOscillator();
        const bodyGain = audioCtx.createGain();
        bodyOsc.type = 'sine';
        bodyOsc.frequency.setValueAtTime(targetFreq, audioCtx.currentTime);

        const strikeOsc = audioCtx.createOscillator();
        const strikeGain = audioCtx.createGain();
        strikeOsc.type = 'triangle';
        strikeOsc.frequency.setValueAtTime(targetFreq * 3, audioCtx.currentTime);

        bodyOsc.connect(bodyGain);
        strikeOsc.connect(strikeGain);
        bodyGain.connect(audioCtx.destination);
        strikeGain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        bodyGain.gain.setValueAtTime(0, now);
        bodyGain.gain.linearRampToValueAtTime(0.25, now + 0.005);
        bodyGain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);

        strikeGain.gain.setValueAtTime(0, now);
        strikeGain.gain.linearRampToValueAtTime(0.18, now + 0.002);
        strikeGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);

        bodyOsc.start(now); strikeOsc.start(now);
        bodyOsc.stop(now + 0.33); strikeOsc.stop(now + 0.05);
    }

    function showCustomAlert(title, paragraphs) {
        const modal = document.getElementById('rulesModal');
        const titleEl = modal.querySelector('.modal-title');
        const contentEl = document.getElementById('modalText');
        
        titleEl.textContent = title;
        contentEl.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
        
        modal.classList.add('show');
    }

    function closeModal() {
        document.getElementById('rulesModal').classList.remove('show');
    }

    function showRules() {
        showCustomAlert("古塔 規則 (RULES)", [
            "1. 모든 원판을 가운데 기둥으로 옮겨 쌓아야 합니다.",
            "2. 맨 위 원판을 톡 누른 뒤, 옮길 기둥 영역을 톡 누르면 이동합니다.",
            "3. 큰 원판을 작은 원판 위에 쌓을 수 없습니다."
        ]);
    }

    function setDisk(n) {
        totalDisks = n;
        document.querySelectorAll('.option-group button').forEach((btn, i) => { 
            if(i < 8) btn.classList.toggle('active', i + 1 === n); 
        });
        initGame();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('modeNormal').classList.toggle('active', m === 'normal');
        document.getElementById('modeRandom').classList.toggle('active', m === 'random');
        initGame();
    }

    function initGame() {
        poles = [[], [], []];
        selectedPoleIndex = null;
        moveCount = 0;
        document.getElementById('moveCount').textContent = moveCount;
        if (mode === 'normal') {
            for (let i = totalDisks; i > 0; i--) poles[0].push(i);
        } else {
            let placed = false;
            while (!placed) {
                poles = [[], [], []];
                for (let i = totalDisks; i > 0; i--) poles[Math.floor(Math.random() * 3)].push(i);
                poles.forEach(p => p.sort((a,b) => b - a));
                if (poles[1].length < totalDisks && poles[1][0] !== totalDisks) placed = true;
            }
        }
        initialPoles = poles.map(p => [...p]);
        render();
    }

    function calculateMinMoves(currentPoles, disk, targetPole) {
        if (disk === 0) return 0;
        let from = -1;
        for(let i=0; i<3; i++) if(currentPoles[i].includes(disk)) from = i;
        if (from === targetPole) return calculateMinMoves(currentPoles, disk - 1, targetPole);
        else {
            const spare = 3 - from - targetPole;
            return calculateMinMoves(currentPoles, disk - 1, spare) + 1 + (Math.pow(2, disk - 1) - 1);
        }
    }

    function render() {
        const slopeStep = 24;
        const baseWidth = 56;

        for (let i = 0; i < 3; i++) {
            const poleEl = document.getElementById('pole' + i);
            poleEl.innerHTML = '';
            poleEl.classList.toggle('tap-target', selectedPoleIndex !== null && selectedPoleIndex !== i);

            poles[i].forEach((size, diskIndex) => {
                const disk = document.createElement('div');
                const isTopDisk = diskIndex === poles[i].length - 1;
                disk.className = 'disk' +
                    (isTopDisk ? ' tap-selectable' : '') +
                    (selectedPoleIndex === i && isTopDisk ? ' tap-selected' : '');

                const bottomWidth = size * slopeStep + baseWidth;
                disk.style.width = bottomWidth + 'px';
                disk.style.background = customGradients[size - 1];
                disk.textContent = size;

                const topWidth = (size - 1) * slopeStep + baseWidth;
                const cutPercent = ((bottomWidth - topWidth) / 2) / bottomWidth * 100;

                if (size === 1) {
                    disk.style.height = '64px';
                    disk.style.minHeight = '64px';
                    disk.style.paddingTop = '18px';
                    disk.style.clipPath =
                        `polygon(0% 100%, ${cutPercent}% 40%, 35% 15%, 44% 4%, 56% 4%, 65% 15%, ${100 - cutPercent}% 40%, 100% 100%)`;
                } else {
                    disk.style.height = '42px';
                    disk.style.minHeight = '42px';
                    disk.style.paddingTop = '0px';
                    disk.style.borderRadius = '0px';
                    disk.style.clipPath =
                        `polygon(${cutPercent}% 0%, ${100 - cutPercent}% 0%, 100% 100%, 0% 100%)`;
                }

                disk.draggable = isTopDisk;
                disk.style.webkitUserDrag = 'element';

                disk.ondragstart = (event) => {
                    event.dataTransfer.setData("text", i);
                    selectedPoleIndex = null;
                    updateTapGuide();
                };

                if (isTopDisk) {
                    disk.onclick = (event) => {
                        event.stopPropagation();
                        selectTopDisk(i);
                    };
                }

                poleEl.appendChild(disk);
            });
        }

        updateTapGuide();
    }

    function updateTapGuide(message = "") {
        const guide = document.getElementById('tap-guide');
        if (!guide) return;

        if (message) {
            guide.textContent = message;
        } else if (selectedPoleIndex === null) {
            guide.textContent = "맨 위 원판을 톡 누른 뒤, 옮길 기둥 영역을 톡 누르세요.";
        } else {
            const diskSize = poles[selectedPoleIndex][poles[selectedPoleIndex].length - 1];
            guide.textContent = `${diskSize}번 원판 선택됨 · 옮길 기둥을 톡 누르세요.`;
        }
    }

    function selectTopDisk(poleIndex) {
        if (!poles[poleIndex].length) return;

        if (selectedPoleIndex === poleIndex) {
            selectedPoleIndex = null;
            render();
            return;
        }

        selectedPoleIndex = poleIndex;
        render();
    }

    function flashInvalidPole(poleIndex) {
        const poleEl = document.getElementById('pole' + poleIndex);
        if (!poleEl) return;
        poleEl.classList.remove('tap-invalid');
        void poleEl.offsetWidth;
        poleEl.classList.add('tap-invalid');
        setTimeout(() => poleEl.classList.remove('tap-invalid'), 320);
    }

    function moveTopDisk(fromPoleIdx, toPoleIdx) {
        if (
            !Number.isInteger(fromPoleIdx) ||
            !Number.isInteger(toPoleIdx) ||
            fromPoleIdx === toPoleIdx ||
            !poles[fromPoleIdx].length
        ) {
            return false;
        }

        const diskSize = poles[fromPoleIdx][poles[fromPoleIdx].length - 1];
        const targetTopDisk = poles[toPoleIdx][poles[toPoleIdx].length - 1];

        if (targetTopDisk && diskSize > targetTopDisk) {
            return false;
        }

        poles[toPoleIdx].push(poles[fromPoleIdx].pop());
        selectedPoleIndex = null;
        moveCount++;
        document.getElementById('moveCount').textContent = moveCount;

        playSound(diskSize);
        render();
        checkWin();
        return true;
    }

    function handlePoleTap(toPoleIdx) {
        if (selectedPoleIndex === null) {
            if (poles[toPoleIdx].length) selectTopDisk(toPoleIdx);
            return;
        }

        if (selectedPoleIndex === toPoleIdx) {
            selectedPoleIndex = null;
            render();
            return;
        }

        const moved = moveTopDisk(selectedPoleIndex, toPoleIdx);
        if (!moved) {
            flashInvalidPole(toPoleIdx);
            updateTapGuide("큰 원판은 작은 원판 위에 놓을 수 없습니다.");
        }
    }

    function allowDrop(e) { e.preventDefault(); }

    function drop(e) {
        e.preventDefault();
        const fromPoleIdx = parseInt(e.dataTransfer.getData("text"));
        const targetPole = e.target.closest('.pole');
        if (!targetPole) return;

        const toPoleIdx = parseInt(targetPole.id.replace('pole', ''));
        if (!moveTopDisk(fromPoleIdx, toPoleIdx)) {
            flashInvalidPole(toPoleIdx);
            updateTapGuide("큰 원판은 작은 원판 위에 놓을 수 없습니다.");
        }
    }

    function checkWin() {
        if (poles[1].length === totalDisks) {
            const minMoves = calculateMinMoves(initialPoles, totalDisks, 1);
            setTimeout(() => {
                showCustomAlert("祝賀 ! (CONGRATULATIONS)", [
                    `축하합니다! 하노이의 탑을 완성하셨습니다.`,
                    `현재 이동 횟수: ${moveCount}회`,
                    `이론상 최소 횟수: ${minMoves}회`,
                    `<div class="finishers-panel result-finishers">
                        <div class="finishers-title">🏆 TODAY’S FINISHERS</div>
                        <div class="finishers-list" id="result-finishers-list"></div>
                    </div>`
                ]);
                const modeLabel = mode === "random" ? "RANDOM" : "NORMAL";
                registerFinisher(`원판 ${totalDisks}개 · ${modeLabel}`, totalDisks * 10 + (mode === "random" ? 1 : 0));
                initGame();
            }, 100);
        }
    }
    initializePlayerEntry();
</script>
</body>
</html>
