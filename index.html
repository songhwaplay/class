<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 게임 메뉴</title>
    <script src="assets/sound/music-control.js" defer></script>
    <style>
        :root {
            --bg: #2b1d1d;
            --panel: #3a210f;
            --panel-dark: #261204;
            --gold: #d7b47a;
            --gold-dark: #7d4a16;
            --gold-mid: #b56e20;
            --gold-bright: #ffb54a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(rgba(24, 14, 10, 0.28), rgba(16, 8, 6, 0.42)),
                url('assets/images/indexbg.png') center / cover fixed no-repeat;
            color: #ffffff;
            text-align: center;
            padding: 50px 18px;
            font-family: Georgia, "Times New Roman", serif;
        }

        .music-control {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            padding: 4px 6px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 0.5px;
            user-select: none;
        }

        .music-label {
            white-space: nowrap;
            font-size: 16px;
        }

        .volume-box {
            display: flex;
            gap: 3px;
            padding: 4px 5px;
            border: 2px solid var(--gold-dark);
            outline: 2px solid var(--panel-dark);
            background: #2d1607;
            box-shadow: inset 0 0 0 1px #1c0c02;
        }

        .volume-step {
            width: 22px;
            height: 21px;
            padding: 0;
            border: 1px solid #b9782c;
            background: #6b4218;
            box-shadow: inset 0 0 0 1px #3f2309;
            cursor: pointer;
        }

        .volume-step.active {
            background: linear-gradient(135deg, #b56d21, var(--gold-bright));
            border-color: #ffd18a;
            box-shadow: inset 0 0 0 1px #9f5918;
        }

        .volume-step:hover,
        .volume-step:focus-visible {
            filter: brightness(1.2);
        }

        h1 { margin-top: 0; }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .menu-container a {
            display: block;
            width: min(340px, calc(100vw - 40px));
            padding: 15px;
            background-color: #593131;
            color: white;
            text-decoration: none;
            border: 2px solid #8c6d6d;
            font-family: sans-serif;
            line-height: 1.4;
        }

        .menu-container a:hover { background-color: #7c4848; }

        .music-status {
            min-height: 18px;
            margin: -18px 0 18px;
            color: #c9ad87;
            font-family: sans-serif;
            font-size: 12px;
        }


        .player-profile {
            width: min(360px, 100%);
            margin: 0 auto 24px;
            padding: 14px 16px;
            border: 2px solid var(--gold-dark);
            outline: 2px solid var(--panel-dark);
            background: rgba(38, 18, 4, 0.88);
            box-shadow: inset 0 0 16px rgba(0,0,0,.35);
        }

        .player-profile-title {
            margin-bottom: 8px;
            color: var(--gold);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .player-profile-row {
            display: flex;
            gap: 8px;
        }

        .player-name-input {
            flex: 1;
            min-width: 0;
            height: 42px;
            padding: 8px 10px;
            border: 2px solid #76501e;
            background: #1b0d03;
            color: #fff0c7;
            text-align: center;
            font-family: "Malgun Gothic", sans-serif;
            font-size: 16px;
            font-weight: 700;
            outline: none;
        }

        .player-name-input:focus {
            border-color: var(--gold-bright);
            box-shadow: 0 0 0 2px rgba(255,181,74,.18);
        }

        .save-name-button {
            min-width: 72px;
            border: 2px solid #5d360f;
            background: linear-gradient(#d6a75a, #99631f);
            color: #1d1005;
            font-weight: 700;
            cursor: pointer;
        }

        .player-name-status {
            min-height: 18px;
            margin-top: 7px;
            color: #c9ad87;
            font-family: "Malgun Gothic", sans-serif;
            font-size: 12px;
        }

        .player-name-status.error {
            color: #ff8c84;
        }

        .saved-player {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            color: #fff0c7;
            font-family: "Malgun Gothic", sans-serif;
            font-weight: 700;
        }

        .change-name-button {
            padding: 5px 9px;
            border: 1px solid #76501e;
            background: #3a210f;
            color: var(--gold);
            cursor: pointer;
            font-size: 12px;
        }

        @media (max-width: 520px) {
            body { padding-top: 28px; }
            .music-control { gap: 7px; transform: scale(0.93); }
            .music-label { font-size: 14px; }
            .volume-step { width: 20px; }
        }
    </style>
</head>
<body>
    <audio id="bgm" src="assets/sound/index.mp3" autoplay loop preload="auto"></audio>


    <div class="player-profile">
        <div class="player-profile-title">PLAYER NAME · 한글 2~6자</div>

        <div id="nameEditArea">
            <div class="player-profile-row">
                <input id="playerNameInput" class="player-name-input" type="text"
                       maxlength="6" autocomplete="off" inputmode="text"
                       placeholder="한/영 키를 눌러 한글로 입력">
                <button id="saveNameButton" class="save-name-button" type="button">저장</button>
            </div>
            <div id="playerNameStatus" class="player-name-status"></div>
        </div>

        <div id="savedPlayerArea" class="saved-player">
            <span><strong id="savedPlayerName"></strong> 님</span>
            <button id="changeNameButton" class="change-name-button" type="button">이름 변경</button>
        </div>
    </div>

    <h1>게임 선택</h1>
    <div class="menu-container">
        <a href="games/fruitbell/fruitbell.html">할리갈리 (Halli Galli)</a>
        <a href="games/setgame/setgame.html">세트 (Set)</a>
        <a href="games/nimgame/nimgame.html">님 (Nim)</a>
        <a href="games/coinweighing/coinweighing.html">동전 저울 (Coin Weighing)</a>
        <a href="games/sphinx/sphinx.html">스핑크스 수수께끼 (Sphinx Riddles)</a>
        <a href="games/hanoitower/hanoitower.html">하노이의 탑 (Tower of Hanoi)</a>
        <a href="games/janggi/janggi.html">장기 (Janggi)</a>
        <a href="games/omok/omok.html">오목 (Omok)</a>
        <a href="games/loveletter/loveletter.html">러브레터 (Love Letter)</a>
        <a href="games/davincicode/davincicode.html">다빈치 코드 (Da Vinci Code)</a>
        <a href="games/traverse/traverse.html">트래버스 (Traverse)</a>
        <a href="games/avalon/avalon.html">레지스탕스: 아발론 (The Resistance: Avalon)</a>
        <a id="cds95GameLink" href="https://world-voyage-classroom.onrender.com/">대항해시대 (Age of Exploration)</a>
    </div>

    <script>
        (() => {
            const NAME_STORAGE_KEY = 'classPlayerName';
            const KOREAN_NAME_PATTERN = /^[가-힣]{2,6}$/;

            const playerNameInput = document.getElementById('playerNameInput');
            const saveNameButton = document.getElementById('saveNameButton');
            const changeNameButton = document.getElementById('changeNameButton');
            const playerNameStatus = document.getElementById('playerNameStatus');
            const nameEditArea = document.getElementById('nameEditArea');
            const savedPlayerArea = document.getElementById('savedPlayerArea');
            const savedPlayerName = document.getElementById('savedPlayerName');

            function normalizePlayerName(value) {
                return String(value || '').replace(/[^가-힣]/g, '').slice(0, 6);
            }

            function isValidPlayerName(value) {
                return KOREAN_NAME_PATTERN.test(String(value || ''));
            }

            function showSavedPlayer(name) {
                savedPlayerName.textContent = name;
                nameEditArea.style.display = 'none';
                savedPlayerArea.style.display = 'flex';
                const cds95GameLink = document.getElementById('cds95GameLink');
                if (cds95GameLink) {
                    const gameUrl = new URL(cds95GameLink.href);
                    gameUrl.searchParams.set('name', name);
                    cds95GameLink.href = gameUrl.toString();
                }
            }

            function showNameEditor(name = '') {
                playerNameInput.value = normalizePlayerName(name);
                nameEditArea.style.display = 'block';
                savedPlayerArea.style.display = 'none';
                playerNameStatus.textContent = '';
                playerNameStatus.classList.remove('error');
                setTimeout(() => playerNameInput.focus(), 0);
            }

            function savePlayerName() {
                const name = normalizePlayerName(playerNameInput.value);
                playerNameInput.value = name;

                if (!isValidPlayerName(name)) {
                    playerNameStatus.textContent = '한글 이름을 2~6자로 입력해야 합니다.';
                    playerNameStatus.classList.add('error');
                    playerNameInput.focus();
                    return;
                }

                localStorage.setItem(NAME_STORAGE_KEY, name);
                showSavedPlayer(name);
            }

            let composing = false;

            playerNameInput.addEventListener('compositionstart', () => {
                composing = true;
            });

            playerNameInput.addEventListener('compositionend', () => {
                composing = false;
                playerNameInput.value = normalizePlayerName(playerNameInput.value);
                playerNameStatus.textContent = '';
                playerNameStatus.classList.remove('error');
            });

            playerNameInput.addEventListener('beforeinput', (event) => {
                if (composing || event.inputType.startsWith('delete')) return;

                const incoming = String(event.data || '');
                if (incoming && /[A-Za-z0-9\s]/.test(incoming)) {
                    event.preventDefault();
                    playerNameStatus.textContent = '키보드를 한글 입력 상태로 전환해 주세요.';
                    playerNameStatus.classList.add('error');
                }
            });

            playerNameInput.addEventListener('input', () => {
                if (composing) return;

                const normalized = normalizePlayerName(playerNameInput.value);
                if (playerNameInput.value !== normalized) {
                    playerNameInput.value = normalized;
                    playerNameStatus.textContent = '한글 이름만 입력할 수 있습니다.';
                    playerNameStatus.classList.add('error');
                } else {
                    playerNameStatus.textContent = '';
                    playerNameStatus.classList.remove('error');
                }
            });

            playerNameInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' && !composing) savePlayerName();
            });
            saveNameButton.addEventListener('click', savePlayerName);
            changeNameButton.addEventListener('click', () => {
                showNameEditor(localStorage.getItem(NAME_STORAGE_KEY) || '');
            });

            const existingName = normalizePlayerName(localStorage.getItem(NAME_STORAGE_KEY) || '');
            if (isValidPlayerName(existingName)) {
                localStorage.setItem(NAME_STORAGE_KEY, existingName);
                showSavedPlayer(existingName);
            } else {
                localStorage.removeItem(NAME_STORAGE_KEY);
                showNameEditor();
            }

        })();
    </script>
</body>
</html>
