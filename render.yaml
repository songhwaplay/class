services:
  - type: web
    name: classroom-game-hub
    runtime: node
    plan: free
    buildCommand: npm --prefix game-hub-server ci
    startCommand: npm --prefix game-hub-server start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TEACHER_EMAILS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
