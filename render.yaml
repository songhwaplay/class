services:
  - type: web
    name: classroom-game-hub
    runtime: node
    plan: free
    buildCommand: npm --prefix game-hub-server install
    startCommand: npm --prefix game-hub-server start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TEACHER_EMAILS
        sync: false
      - key: ADMIN_EMAILS
        sync: false

  - type: web
    name: fraction-lab-20260720
    runtime: node
    plan: free
    rootDir: learning/basics/arithmetics
    buildCommand: npm install && npm run build
    startCommand: npm start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production

  - type: web
    name: hanguksa-hanip
    runtime: node
    plan: free
    rootDir: learning/basics/hanguksa-basic
    buildCommand: npm install && npm run build
    startCommand: npm start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production
